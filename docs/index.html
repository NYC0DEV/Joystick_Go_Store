<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joystick Go Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0d0d1a;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            line-height: 1.5;
        }
        .container {
            max-width: 720px;
            width: 100%;
            background: #16162e;
            border-radius: 24px;
            padding: 40px 36px;
            border: 1px solid #2a2a50;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.7);
        }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #88ffb0, #55ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #8888aa; font-size: 14px; margin-top: 4px; }
        .login-bar {
            background: #101020;
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222244;
            margin-bottom: 28px;
        }
        .login-bar .user { color: #9999bb; font-size: 13px; }
        .login-bar .user strong { color: #88ffb0; font-weight: 600; }
        .login-bar button {
            background: transparent;
            border: 1px solid #ff5566;
            color: #ff5566;
            padding: 4px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .login-bar button:hover { background: #ff5566; color: #fff; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #aaaacc;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: #0c0c1e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #eee;
            font-size: 14px;
            transition: 0.2s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #55ccff;
            box-shadow: 0 0 0 3px rgba(85, 204, 255, 0.1);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group select option { background: #16162e; }
        .drop-zone {
            border: 2px dashed #2a2a4a;
            border-radius: 12px;
            padding: 28px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            background: #0c0c1e;
        }
        .drop-zone:hover { border-color: #55ccff; background: #111128; }
        .drop-zone.dragover { border-color: #88ffb0; background: #141430; }
        .drop-zone .icon { font-size: 36px; margin-bottom: 6px; }
        .drop-zone .main-text { font-size: 14px; font-weight: 500; color: #ccccee; }
        .drop-zone .sub-text { font-size: 12px; color: #666688; margin-top: 2px; }
        .file-info { font-size: 12px; color: #666688; margin-top: 8px; display: none; }
        .file-info.visible { display: block; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #88ffb0, #55ccff);
            border: none;
            border-radius: 12px;
            color: #0d0d1a;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 4px;
        }
        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 24px rgba(85, 204, 255, 0.25);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .message {
            padding: 14px 18px;
            border-radius: 10px;
            margin-top: 16px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        .message.success {
            display: block;
            background: rgba(136, 255, 176, 0.08);
            border: 1px solid #88ffb0;
            color: #88ffb0;
        }
        .message.error {
            display: block;
            background: rgba(255, 85, 102, 0.08);
            border: 1px solid #ff5566;
            color: #ff5566;
        }
        .guidelines {
            background: #101020;
            border-radius: 12px;
            padding: 16px 20px;
            margin-top: 20px;
            border: 1px solid #1e1e3a;
        }
        .guidelines h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8888aa;
            margin-bottom: 6px;
        }
        .guidelines ul {
            list-style: none;
            padding: 0;
            font-size: 13px;
            color: #777799;
        }
        .guidelines ul li::before { content: "✓ "; color: #88ffb0; }
        .guidelines ul li { padding: 2px 0; }
        .hidden { display: none !important; }
        @media (max-width: 600px) {
            .container { padding: 24px 18px; }
            .header h1 { font-size: 24px; }
            .login-bar { flex-wrap: wrap; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <h1>🎮 Joystick Go Store</h1>
            <p>Submit your game or app to the community</p>
        </div>

        <!-- Login Bar -->
        <div class="login-bar" id="loginBar">
            <span class="user" id="userDisplay">👤 Not logged in</span>
            <button id="loginBtn">Login with GitHub</button>
        </div>

        <!-- Upload Form -->
        <form id="uploadForm" class="hidden">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="title" placeholder="e.g. Super Adventure" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="What does your app do?" required></textarea>
            </div>
            <div class="form-group">
                <label>Author</label>
                <input type="text" id="author" placeholder="Your name or handle" required>
            </div>
            <div class="form-group">
                <label>Version</label>
                <input type="text" id="version" placeholder="1.0" value="1.0">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="category" required>
                    <option value="game">🎯 Game</option>
                    <option value="emulator">🕹️ Emulator</option>
                    <option value="tool">🔧 Tool</option>
                </select>
            </div>
            <div class="form-group">
                <label>File (.zip)</label>
                <div class="drop-zone" id="dropZone">
                    <div class="icon">📁</div>
                    <div class="main-text">Drop your .zip here</div>
                    <div class="sub-text">or click to browse</div>
                    <input type="file" id="fileInput" accept=".zip" style="display:none;" required>
                </div>
                <div class="file-info" id="fileInfo">📎 <span id="fileName">No file selected</span></div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">🚀 Submit</button>
        </form>

        <!-- Message -->
        <div class="message" id="message"></div>

        <!-- Guidelines -->
        <div class="guidelines">
            <h3>📋 Guidelines</h3>
            <ul>
                <li>Submit as .zip</li>
                <li>Include a README inside</li>
                <li>No copyrighted content without permission</li>
                <li>All submissions are reviewed before going live</li>
            </ul>
        </div>

    </div>

    <script>
        // ── CONFIG ──
        // Your GitHub OAuth Client ID (from https://github.com/settings/developers)
        const CLIENT_ID = 'YOUR_GITHUB_CLIENT_ID_HERE';
        
        // Your Cloudflare Worker URL
        const PROXY_URL = 'https://joystick-store-proxy.nyc0dev.workers.dev';
        
        // Your GitHub Pages URL (where this HTML is hosted)
        const REDIRECT = 'https://nyc0dev.github.io/Joystick_Go_Store/';
        
        // ── NO SECRET HERE! ──
        // The CLIENT_SECRET is ONLY on Cloudflare, not in HTML!
        // ─────────────────────

        let user = null;
        let token = null;

        // ── DOM refs ──
        const userDisplay = document.getElementById('userDisplay');
        const loginBtn = document.getElementById('loginBtn');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('message');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');

        // ── Helpers ──
        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
            messageBox.style.display = 'block';
            clearTimeout(messageBox._timer);
            messageBox._timer = setTimeout(() => { messageBox.style.display = 'none'; }, 8000);
        }

        function updateUI() {
            if (user) {
                userDisplay.innerHTML = '👤 Logged in as <strong>' + user.login + '</strong>';
                loginBtn.textContent = 'Logout';
                loginBtn.onclick = logout;
                uploadForm.classList.remove('hidden');
            } else {
                userDisplay.textContent = '👤 Not logged in';
                loginBtn.textContent = 'Login with GitHub';
                loginBtn.onclick = loginWithGitHub;
                uploadForm.classList.add('hidden');
            }
        }

        // ── Auth ──
        function loginWithGitHub() {
            const url = 'https://github.com/login/oauth/authorize' +
                '?client_id=' + CLIENT_ID +
                '&redirect_uri=' + REDIRECT +
                '&scope=repo';
            window.location.href = url;
        }

        function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (!code) return;

            // ── Send code to Cloudflare Worker (PROXY) ──
            fetch(PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            })
            .then(r => r.json())
            .then(data => {
                if (!data.token) throw new Error('No token from proxy');
                token = data.token;
                return fetch('https://api.github.com/user', {
                    headers: { 'Authorization': 'token ' + token }
                });
            })
            .then(r => r.json())
            .then(u => {
                user = u;
                localStorage.setItem('github_user', JSON.stringify(u));
                localStorage.setItem('github_token', token);
                updateUI();
                window.history.replaceState({}, '', window.location.pathname);
            })
            .catch(err => {
                showMessage('Login failed: ' + err.message, 'error');
            });
        }

        function logout() {
            localStorage.removeItem('github_user');
            localStorage.removeItem('github_token');
            user = null;
            token = null;
            updateUI();
        }

        // ── File drop ──
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileLabel();
            }
        });
        fileInput.addEventListener('change', updateFileLabel);

        function updateFileLabel() {
            if (fileInput.files.length) {
                const f = fileInput.files[0];
                fileName.textContent = f.name + ' (' + (f.size / 1024 / 1024).toFixed(2) + ' MB)';
                fileInfo.classList.add('visible');
            } else {
                fileName.textContent = 'No file selected';
                fileInfo.classList.remove('visible');
            }
        }

        // ── Submit ──
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const author = document.getElementById('author').value.trim();
            const version = document.getElementById('version').value.trim() || '1.0';
            const category = document.getElementById('category').value;
            const file = fileInput.files[0];

            if (!file) {
                showMessage('Please select a .zip file', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Submitting...';

            try {
                const reader = new FileReader();
                const b64 = await new Promise((resolve) => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });

                const uploadUrl = 'https://api.github.com/repos/nyc0dev/Joystick_Go_Store/contents/uploads/' + encodeURIComponent(file.name);
                const uploadRes = await fetch(uploadUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Upload: ' + title,
                        content: b64,
                        branch: 'main'
                    })
                });

                if (!uploadRes.ok) throw new Error('Upload failed');

                const issueBody =
                    '## 🎮 New Submission\n\n' +
                    '**Title:** ' + title + '\n' +
                    '**Author:** ' + author + '\n' +
                    '**Version:** ' + version + '\n' +
                    '**Category:** ' + category + '\n' +
                    '**Submitted by:** @' + user.login + '\n\n' +
                    '**Description:**\n' + description + '\n\n' +
                    '**File:** [download](https://github.com/nyc0dev/Joystick_Go_Store/blob/main/uploads/' + encodeURIComponent(file.name) + ')';

                const issueRes = await fetch('https://api.github.com/repos/nyc0dev/Joystick_Go_Store/issues', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: 'Submission: ' + title,
                        body: issueBody,
                        labels: ['game-submission', 'pending-review']
                    })
                });

                if (!issueRes.ok) throw new Error('Failed to create issue');

                showMessage('✅ Submitted! You\'ll get a notification when approved.', 'success');
                document.getElementById('uploadForm').reset();
                fileInfo.classList.remove('visible');
                fileName.textContent = 'No file selected';

            } catch (err) {
                showMessage('❌ Error: ' + err.message, 'error');
            }

            submitBtn.disabled = false;
            submitBtn.textContent = '🚀 Submit';
        });

        // ── Init ──
        const savedUser = localStorage.getItem('github_user');
        const savedToken = localStorage.getItem('github_token');
        if (savedUser && savedToken) {
            user = JSON.parse(savedUser);
            token = savedToken;
        }

        handleCallback();
        updateUI();
    </script>
</body>
</html>
