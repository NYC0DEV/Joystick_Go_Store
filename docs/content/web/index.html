<script>
  // ─── API CONFIG ──────────────────────────────────────────────────────
  const API_BASE = 'https://joystick-store-proxy.joystick-go-store.workers.dev';
  const ADMIN_NAME = 'NYC0DEV';
  let currentUser = null;
  let registrationEnabled = true;
  let storeGames = [];
  let storePage = 1, storePerPage = 10, currentCategory = 'all', searchQuery = '';
  let myUploadsPage = 1, myUploadsPerPage = 10;

  const $ = id => document.getElementById(id);
  let toastTimer = null;

  function showToast(msg, type = 'success') {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }
  function formatFileSize(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
  }
  function getToken() { return localStorage.getItem('jgs_token'); }
  function getAuthHeaders() {
    const token = getToken();
    return token ? { 'Authorization': `Bearer ${token}` } : {};
  }

  async function apiFetch(endpoint, options = {}) {
    const url = API_BASE + endpoint;
    const headers = {
      'Content-Type': 'application/json',
      ...getAuthHeaders(),
      ...(options.headers || {})
    };
    try {
      const resp = await fetch(url, { ...options, headers });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        throw new Error(data.error || `HTTP ${resp.status}: ${resp.statusText}`);
      }
      return data;
    } catch (err) {
      // Network errors (Failed to fetch)
      if (err.message === 'Failed to fetch' || err.message.includes('fetch')) {
        throw new Error('Cannot reach API server. Make sure the Worker is deployed and the URL is correct.');
      }
      throw err;
    }
  }

  // ─── AUTH ──────────────────────────────────────────────────────────
  async function loginUser(username, password) {
    const data = await apiFetch('/api/login', {
      method: 'POST',
      body: JSON.stringify({ username, password })
    });
    localStorage.setItem('jgs_token', data.token);
    localStorage.setItem('jgs_user', JSON.stringify(data.user));
    currentUser = data.user;
    return { success: true };
  }

  async function registerUser(username, password) {
    const data = await apiFetch('/api/register', {
      method: 'POST',
      body: JSON.stringify({ username, password })
    });
    return { success: true, resetKey: data.resetKey };
  }

  function logoutUser() {
    apiFetch('/api/logout', { method: 'POST' }).catch(() => {});
    localStorage.removeItem('jgs_token');
    localStorage.removeItem('jgs_user');
    currentUser = null;
    showToast('Logged out', 'success');
    updateUI();
    switchView('login');
  }

  async function restoreSession() {
    const token = getToken();
    if (!token) return false;
    try {
      const data = await apiFetch('/api/user');
      currentUser = data.user;
      localStorage.setItem('jgs_user', JSON.stringify(currentUser));
      return true;
    } catch (e) {
      localStorage.removeItem('jgs_token');
      localStorage.removeItem('jgs_user');
      return false;
    }
  }

  // ─── VIEW SWITCHING ──────────────────────────────────────────────
  function switchView(view) {
    const loginView = $('viewLogin'), appView = $('viewApp');
    if (view === 'login') {
      loginView.classList.add('active');
      appView.classList.remove('active');
      handleOrientation();
    } else {
      loginView.classList.remove('active');
      appView.classList.add('active');
      handleOrientation();
      if (currentUser) { updateUI(); loadStore(); }
      else { updateUI(); loadStore(); }
    }
  }
  function setAppPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    const tabBtn = document.querySelector(`.tabs button[data-panel="${id}"]`);
    if (tabBtn) tabBtn.classList.add('active');
  }

  // ─── UI UPDATE ────────────────────────────────────────────────────
  function updateUI() {
    const isLoggedIn = !!currentUser;
    const isAdmin = currentUser && currentUser.is_admin;
    const nameDisplay = $('userNameDisplay');
    const avatar = $('userAvatar');
    const dropdownName = $('dropdownUserName');
    const dropdownStatus = $('dropdownUserStatus');
    if (isLoggedIn) {
      const color = currentUser.username_color || '#ffffff';
      nameDisplay.textContent = currentUser.display_name || currentUser.username;
      nameDisplay.style.color = color;
      avatar.textContent = (currentUser.display_name || currentUser.username).charAt(0).toUpperCase();
      dropdownName.textContent = currentUser.display_name || currentUser.username;
      dropdownName.style.color = color;
      dropdownStatus.textContent = 'Logged in' + (isAdmin ? ' · Admin' : '');
      fetchNotificationCount();
    } else {
      nameDisplay.textContent = 'Guest';
      nameDisplay.style.color = 'rgba(255,255,255,0.7)';
      avatar.textContent = '👤';
      dropdownName.textContent = 'Guest';
      dropdownName.style.color = 'rgba(255,255,255,0.7)';
      dropdownStatus.textContent = 'Not logged in';
      $('notifBadge').style.display = 'none';
    }
    const regMsg = $('registrationDisabledMsg'), regLink = $('registerToggleLink');
    if (!registrationEnabled) { regMsg.style.display = 'block'; regLink.style.display = 'none'; }
    else { regMsg.style.display = 'none'; regLink.style.display = 'block'; }
    const adminLink = $('adminLinkBtn');
    if (isAdmin) adminLink.classList.add('show');
    else adminLink.classList.remove('show');
    const contactBtn = $('contactFloating');
    if (isLoggedIn) contactBtn.classList.add('show');
    else contactBtn.classList.remove('show');
    const uploadTab = $('uploadTabBtn');
    const uploadEls = document.querySelectorAll('#uploadForm input, #uploadForm select, #uploadForm textarea, #submitBtn');
    const dropZones = document.querySelectorAll('#uploadForm .drop-zone');
    if (isLoggedIn) {
      uploadTab.disabled = false; uploadTab.style.opacity = '1'; uploadTab.style.cursor = 'pointer';
      uploadEls.forEach(el => el.disabled = false);
      dropZones.forEach(el => el.classList.remove('disabled'));
      $('uploadSubtext').textContent = 'fill in the details and drop your .zip';
    } else {
      uploadTab.disabled = true; uploadTab.style.opacity = '0.4'; uploadTab.style.cursor = 'not-allowed';
      uploadEls.forEach(el => el.disabled = true);
      dropZones.forEach(el => el.classList.add('disabled'));
      $('uploadSubtext').textContent = 'please log in to upload';
    }
    const dropdownLogout = $('dropdownLogoutBtn');
    if (dropdownLogout) {
      dropdownLogout.style.display = isLoggedIn ? 'flex' : 'none';
      dropdownLogout.onclick = isLoggedIn ? logoutUser : null;
    }
    $('logoutBtn').style.display = 'none';
  }

  async function fetchNotificationCount() {
    if (!currentUser) return;
    try {
      const data = await apiFetch('/api/user/notifications');
      const unread = data.filter(n => !n.is_read).length;
      const badge = $('notifBadge');
      if (unread > 0) { badge.style.display = 'inline'; badge.textContent = unread; }
      else { badge.style.display = 'none'; }
    } catch (e) { /* ignore */ }
  }

  // ─── STORE ────────────────────────────────────────────────────────
  async function loadStore() {
    try {
      const params = new URLSearchParams();
      if (currentCategory !== 'all') params.append('category', currentCategory);
      if (searchQuery) params.append('search', searchQuery);
      const games = await apiFetch('/api/store?' + params.toString());
      storeGames = games;
      renderStore(games);
    } catch (e) {
      showToast('Failed to load store: ' + e.message, 'error');
      $('storeList').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Failed to load store. Is the API running?</p></div>';
    }
  }

  function renderStore(games) {
    const container = $('storeList'), count = $('storeCount');
    const total = games.length;
    const totalPages = Math.ceil(total / storePerPage);
    if (storePage > totalPages) storePage = Math.max(1, totalPages);
    const start = (storePage - 1) * storePerPage, end = Math.min(start + storePerPage, total);
    const pageItems = games.slice(start, end);
    if (!pageItems.length) {
      container.innerHTML = '<div class="empty"><div class="icon">📦</div><p>nothing yet</p></div>';
      count.textContent = '0 apps available';
      $('storePagination').innerHTML = '';
      return;
    }
    count.textContent = total + ' app' + (total > 1 ? 's' : '') + ' available';
    const categoryMap = { game: 'Games', emulator: 'Emulators', tool: 'Tools' };
    container.innerHTML = pageItems.map(g => {
      const sizeStr = g.file_size ? formatFileSize(g.file_size) : '—';
      const dateStr = g.approved_at ? new Date(g.approved_at).toLocaleDateString() : '—';
      const authorColor = g.author_color || '#ffffff';
      return `
        <div class="card">
          <div class="info">
            <h4>
              ${g.title}
              <span class="category-badge">${categoryMap[g.category] || g.category}</span>
              <span class="size-badge">${sizeStr}</span>
            </h4>
            <p>by <span class="author-link" style="color:${authorColor};cursor:pointer;" onclick="openPublicProfile(${g.author_id})">${g.display_name || g.author_id}</span> · v${g.version} · added ${dateStr}</p>
            ${g.image_data ? `<img src="${g.image_data}" />` : ''}
            ${g.description ? `<p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px;">${g.description}</p>` : ''}
          </div>
          <div><button class="download-btn" onclick="downloadGame(${g.id})">⬇ Download</button></div>
        </div>
      `;
    }).join('');
    let pagHtml = '';
    if (totalPages > 1) {
      pagHtml = `
        <button onclick="storePage=Math.max(1,storePage-1);loadStore();" ${storePage<=1?'disabled':''}>◀</button>
        <span class="page-info">${storePage} / ${totalPages}</span>
        <button onclick="storePage=Math.min(${totalPages},storePage+1);loadStore();" ${storePage>=totalPages?'disabled':''}>▶</button>
      `;
    }
    $('storePagination').innerHTML = pagHtml;
  }

  async function downloadGame(id) {
    try {
      const resp = await fetch(`${API_BASE}/api/store/download?id=${id}`);
      if (!resp.ok) throw new Error('Download failed: ' + resp.status);
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const disp = resp.headers.get('Content-Disposition');
      let filename = 'game.zip';
      if (disp) { const m = disp.match(/filename="(.+)"/); if (m) filename = m[1]; }
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      showToast('⬇ Downloading...', 'success');
    } catch (e) {
      showToast('Download error: ' + e.message, 'error');
    }
  }

  // ─── UPLOAD ───────────────────────────────────────────────────────
  function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  $('uploadForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!currentUser) { showToast('Please log in', 'error'); return; }
    const title = $('uploadTitle').value.trim();
    const version = $('uploadVersion').value.trim() || '1.0';
    const category = $('uploadCategory').value;
    const description = $('uploadDescription').value.trim();
    const file = $('zipInput').files[0];
    const imageFile = $('imageInput').files[0];
    if (!title) { showToast('Please enter a title', 'error'); return; }
    if (title.length > 15) { showToast('Title max 15 characters', 'error'); return; }
    if (!file) { showToast('Please select a .zip file', 'error'); return; }
    try {
      const fileData = await readFileAsBase64(file);
      let imageData = '';
      if (imageFile) {
        const imgPreview = $('userPreviewImg');
        if (imgPreview.src) imageData = imgPreview.src;
        else imageData = await readFileAsBase64(imageFile);
      }
      await apiFetch('/api/submissions', {
        method: 'POST',
        body: JSON.stringify({
          title, version, category, description,
          file_name: file.name,
          file_data: fileData.split(',')[1],
          file_size: file.size,
          image_data: imageData,
        })
      });
      $('uploadMessage').textContent = '✅ submitted for review';
      $('uploadMessage').style.color = 'rgba(80,220,160,0.8)';
      $('uploadForm').reset();
      $('userPreviewImg').classList.remove('visible');
      $('imageInfo').textContent = 'no image selected';
      $('zipInfo').textContent = 'no file selected';
      $('zipFileSize').textContent = '';
      showToast('Game submitted for review!', 'success');
    } catch (e) {
      showToast('Upload failed: ' + e.message, 'error');
    }
  });

  // ─── RESET PASSWORD ─────────────────────────────────────────────────
  async function forgotPassword() {
    const username = prompt('Enter your username:');
    if (!username) return;
    const resetKey = prompt('Enter your reset key:');
    if (!resetKey) return;
    const newPassword = prompt('Enter new password (min 3 chars):');
    if (!newPassword || newPassword.length < 3) { showToast('Password too short', 'error'); return; }
    try {
      await apiFetch('/api/reset-password', {
        method: 'POST',
        body: JSON.stringify({ username, resetKey, newPassword })
      });
      showToast('Password reset successfully!', 'success');
    } catch (e) {
      showToast('Reset failed: ' + e.message, 'error');
    }
  }
  $('forgotPasswordLink').addEventListener('click', forgotPassword);

  // ─── PROFILE MODAL ──────────────────────────────────────────────
  async function openProfileModal() {
    if (!currentUser) { showToast('Please log in first', 'error'); return; }
    try {
      const data = await apiFetch('/api/user');
      currentUser = data.user;
      localStorage.setItem('jgs_user', JSON.stringify(currentUser));
    } catch (e) { /* use cached */ }
    const content = $('profileContent');
    const color = currentUser.username_color || '#ffffff';
    content.innerHTML = `
      <div class="form-group"><label>Username</label><div style="display:flex;align-items:center;gap:12px;"><span style="font-size:20px;font-weight:600;color:${color};cursor:pointer;" onclick="requestNameChange()">${currentUser.display_name}</span><button class="btn btn-secondary" style="padding:2px 12px;font-size:11px;" onclick="requestNameChange()">✎ Request Change</button></div><div style="font-size:12px;color:rgba(255,255,255,0.2);margin-top:4px;">Click your name or the button to request a name change.</div></div>
      <div class="form-group"><label>Bio</label><textarea id="profileBio" rows="3" maxlength="200" placeholder="Tell us about yourself">${currentUser.bio || ''}</textarea><div style="font-size:11px;color:rgba(255,255,255,0.2);text-align:right;">${(currentUser.bio || '').length} / 200</div><button class="btn btn-primary" style="margin-top:6px;width:100%;" onclick="saveBio()">Save Bio</button></div>
      <div class="form-group"><label>Username Color</label><div class="color-picker-row"><input type="color" id="profileColorPicker" value="${color}" /><span class="color-hex" id="profileColorHex">${color}</span><button class="btn btn-secondary" style="padding:6px 16px;flex:0;" onclick="resetProfileColor()">Reset to white</button></div><div style="font-size:12px;color:rgba(255,255,255,0.2);margin-top:4px;">This color will be used for your name in the store.</div></div>
      <div class="actions"><button class="btn btn-secondary" onclick="closeProfileModal()">Close</button></div>
      <a href="https://forums.atariage.com/profile/92465-nyco/" target="_blank" class="support-link">Need help? Contact Nyco on AtariAge</a>
    `;
    $('profileModal').classList.add('show');
    const picker = document.getElementById('profileColorPicker');
    if (picker) picker.addEventListener('input', function() {
      document.getElementById('profileColorHex').textContent = this.value;
      const span = content.querySelector('span[style*="font-size:20px"]');
      if (span) span.style.color = this.value;
    });
    const bioEl = document.getElementById('profileBio');
    if (bioEl) bioEl.addEventListener('input', function() {
      const counter = this.closest('.form-group').querySelector('div[style*="text-align:right"]');
      if (counter) counter.textContent = this.value.length + ' / 200';
    });
  }

  async function saveBio() {
    if (!currentUser) return;
    const bio = document.getElementById('profileBio').value.trim();
    if (bio.length > 200) { showToast('Bio max 200 characters', 'error'); return; }
    try {
      await apiFetch('/api/user', { method: 'PUT', body: JSON.stringify({ bio }) });
      currentUser.bio = bio;
      localStorage.setItem('jgs_user', JSON.stringify(currentUser));
      showToast('Bio saved!', 'success');
      openProfileModal();
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }

  async function saveProfileColor() {
    const color = document.getElementById('profileColorPicker').value;
    try {
      await apiFetch('/api/user', { method: 'PUT', body: JSON.stringify({ username_color: color }) });
      currentUser.username_color = color;
      localStorage.setItem('jgs_user', JSON.stringify(currentUser));
      showToast('Color updated!', 'success');
      openProfileModal();
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }

  function resetProfileColor() {
    const picker = document.getElementById('profileColorPicker');
    if (picker) { picker.value = '#ffffff'; document.getElementById('profileColorHex').textContent = '#ffffff'; }
  }

  async function requestNameChange() {
    if (!currentUser) return;
    const newName = prompt('Enter new display name (max 7 chars, letters/numbers):');
    if (!newName) return;
    if (newName.length > 7) { showToast('Max 7 characters', 'error'); return; }
    if (!/^[a-zA-Z0-9]+$/.test(newName)) { showToast('Only letters and numbers', 'error'); return; }
    try {
      await apiFetch('/api/user/name-request', { method: 'POST', body: JSON.stringify({ requestedName: newName }) });
      showToast('Name change request sent to admin.', 'success');
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }
  function closeProfileModal() { $('profileModal').classList.remove('show'); }

  // ─── SETTINGS MODAL ─────────────────────────────────────────────
  async function openSettingsModal() {
    if (!currentUser) { showToast('Please log in first', 'error'); return; }
    const content = $('settingsContent');
    content.innerHTML = `
      <div style="margin-bottom:12px;font-size:14px;color:rgba(255,255,255,0.4);">Username: <strong style="color:${currentUser.username_color || '#ffffff'};">${currentUser.display_name}</strong></div>
      <div class="form-group"><label>Current password</label><input type="password" id="settingsCurrentPwd" placeholder="Enter current password" /></div>
      <div class="form-group"><label>New password</label><input type="password" id="settingsNewPwd" placeholder="Enter new password" /></div>
      <div class="form-group"><label>Confirm new password</label><input type="password" id="settingsConfirmPwd" placeholder="Confirm new password" /></div>
      <button class="btn btn-primary" id="settingsChangePwdBtn" style="width:100%;margin:8px 0;">Change Password</button>
      <div id="settingsPwdStatus" class="status-msg"></div>
      <hr style="border-color:rgba(255,255,255,0.04);margin:16px 0;" />
      <div style="font-size:14px;color:rgba(255,255,255,0.3);margin-bottom:4px;">Your Reset Key</div>
      <div class="key-display" id="settingsResetKey">${currentUser.reset_key || 'Not set'}</div>
      <div style="display:flex;gap:8px;margin-top:8px;"><button class="btn btn-secondary" style="flex:1;" onclick="copySettingsKey()">Copy Key</button><button class="btn btn-warning" style="flex:1;background:rgba(255,200,50,0.08);border-color:rgba(255,200,50,0.15);color:#ffd866;" onclick="regenerateKey()">Regenerate Key</button></div>
      <div id="settingsKeyStatus" class="status-msg"></div>
      <hr style="border-color:rgba(255,255,255,0.04);margin:16px 0;" />
      <a href="https://forums.atariage.com/profile/92465-nyco/" target="_blank" class="support-link">Need help? Contact Nyco on AtariAge</a>
      <div class="actions"><button class="btn btn-secondary" onclick="closeSettingsModal()">Close</button></div>
    `;
    $('settingsModal').classList.add('show');
    document.getElementById('settingsChangePwdBtn').addEventListener('click', async function() {
      const current = document.getElementById('settingsCurrentPwd').value.trim();
      const newPwd = document.getElementById('settingsNewPwd').value.trim();
      const confirm = document.getElementById('settingsConfirmPwd').value.trim();
      const status = document.getElementById('settingsPwdStatus');
      if (!current || !newPwd || !confirm) { status.textContent = 'Fill in all fields.'; status.className = 'status-msg error'; return; }
      if (newPwd.length < 3) { status.textContent = 'Min 3 chars.'; status.className = 'status-msg error'; return; }
      if (newPwd !== confirm) { status.textContent = 'Passwords do not match.'; status.className = 'status-msg error'; return; }
      try {
        await apiFetch('/api/user/password', { method: 'PUT', body: JSON.stringify({ currentPassword: current, newPassword: newPwd }) });
        status.textContent = 'Password updated!'; status.className = 'status-msg success';
        showToast('Password changed!', 'success');
        document.getElementById('settingsCurrentPwd').value = '';
        document.getElementById('settingsNewPwd').value = '';
        document.getElementById('settingsConfirmPwd').value = '';
      } catch (e) {
        status.textContent = 'Error: ' + e.message; status.className = 'status-msg error';
      }
    });
  }
  function closeSettingsModal() { $('settingsModal').classList.remove('show'); }
  function copySettingsKey() {
    const el = document.getElementById('settingsResetKey');
    if (!el) return;
    navigator.clipboard.writeText(el.textContent).then(() => showToast('Copied!', 'success')).catch(() => {
      const range = document.createRange(); range.selectNode(el);
      window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
      document.execCommand('copy'); showToast('Copied!', 'success');
    });
  }
  async function regenerateKey() {
    if (!confirm('Regenerate reset key?')) return;
    showToast('Regenerate key: use admin panel or contact admin.', 'info');
  }

  // ─── MY UPLOADS ──────────────────────────────────────────────────
  async function openMyUploadsModal() {
    if (!currentUser) { showToast('Please log in first', 'error'); return; }
    const content = $('myUploadsContent');
    try {
      const data = await apiFetch('/api/submissions');
      const userSubs = data.filter(s => s.author_id === currentUser.id);
      const total = userSubs.length;
      const totalPages = Math.ceil(total / myUploadsPerPage);
      if (myUploadsPage > totalPages) myUploadsPage = Math.max(1, totalPages);
      const start = (myUploadsPage - 1) * myUploadsPerPage;
      const pageItems = userSubs.slice().reverse().slice(start, start + myUploadsPerPage);
      let html = '';
      if (!pageItems.length) {
        html = `<div style="text-align:center;padding:30px 0;color:rgba(255,255,255,0.2);"><div style="font-size:40px;margin-bottom:12px;">📭</div><p>You haven't uploaded any games yet.</p></div>`;
      } else {
        html = pageItems.map(s => {
          const downloadBtn = s.file_data ? `<button class="btn-sm download" style="margin-left:6px;padding:2px 10px;font-size:11px;" onclick="downloadSubmission(${s.id})">⬇ Download</button>` : '';
          const viewBtn = s.status === 'approved' ? `<button class="btn-sm view" style="margin-left:6px;padding:2px 10px;font-size:11px;" onclick="viewInStore('${s.title}')">View in Store</button>` : '';
          return `<div class="user-game-item"><div><span class="title">${s.title || 'Untitled'}</span><span class="status-badge ${s.status}">${s.status}</span>${viewBtn}${downloadBtn}</div><span class="meta">${s.category || 'game'} · v${s.version || '1.0'} · ${s.created_at ? new Date(s.created_at).toLocaleDateString() : '—'} · ${s.file_size ? formatFileSize(s.file_size) : ''}</span></div>`;
        }).join('');
        if (totalPages > 1) {
          html += `<div class="pagination"><button onclick="myUploadsPage=Math.max(1,myUploadsPage-1);openMyUploadsModal();" ${myUploadsPage<=1?'disabled':''}>◀</button><span class="page-info">${myUploadsPage} / ${totalPages}</span><button onclick="myUploadsPage=Math.min(${totalPages},myUploadsPage+1);openMyUploadsModal();" ${myUploadsPage>=totalPages?'disabled':''}>▶</button></div>`;
        }
      }
      content.innerHTML = html + `<div class="actions"><button class="btn btn-secondary" onclick="closeMyUploadsModal()">Close</button></div>`;
      $('myUploadsModal').classList.add('show');
    } catch (e) {
      showToast('Error loading uploads: ' + e.message, 'error');
    }
  }
  function closeMyUploadsModal() { $('myUploadsModal').classList.remove('show'); }
  async function downloadSubmission(id) {
    try {
      const data = await apiFetch('/api/submissions');
      const sub = data.find(s => s.id === id);
      if (!sub || !sub.file_data) { showToast('No file', 'error'); return; }
      const binary = Uint8Array.from(atob(sub.file_data), c => c.charCodeAt(0));
      const blob = new Blob([binary], { type: 'application/zip' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = sub.file_name || 'submission.zip'; a.click(); URL.revokeObjectURL(url);
      showToast('Downloaded', 'success');
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }
  function viewInStore(title) {
    closeMyUploadsModal();
    setAppPanel('panelStore');
    $('storeSearchInput').value = title;
    searchQuery = title;
    loadStore();
    showToast(`Showing results for "${title}"`, 'info');
  }

  // ─── NOTIFICATIONS ──────────────────────────────────────────────
  async function openNotificationsModal() {
    if (!currentUser) { showToast('Please log in', 'error'); return; }
    try {
      const data = await apiFetch('/api/user/notifications');
      const content = $('notificationsContent');
      if (!data.length) {
        content.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.2);">No notifications</div>';
      } else {
        let html = data.map(n => `
          <div class="notif-item">
            <div><div class="msg">${n.message}</div><div class="time">${new Date(n.created_at).toLocaleString()}</div></div>
            <div class="actions"><button onclick="deleteNotification(${n.id})">🗑</button></div>
          </div>
        `).join('');
        html += `<div style="margin-top:12px;text-align:center;"><button class="btn btn-danger" onclick="clearAllNotifications()" style="padding:6px 16px;font-size:12px;">Clear All</button></div>`;
        content.innerHTML = html;
      }
      $('notificationsModal').classList.add('show');
      const badge = $('notifBadge');
      badge.style.display = 'none';
    } catch (e) { showToast('Error loading notifications: ' + e.message, 'error'); }
  }
  function closeNotificationsModal() { $('notificationsModal').classList.remove('show'); }
  async function deleteNotification(id) {
    if (!confirm('Delete?')) return;
    try {
      await apiFetch(`/api/user/notifications/${id}`, { method: 'DELETE' });
      showToast('Deleted', 'success');
      openNotificationsModal();
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }
  async function clearAllNotifications() {
    if (!confirm('Clear all notifications?')) return;
    try {
      await apiFetch('/api/user/notifications/clear', { method: 'DELETE' });
      showToast('Cleared', 'success');
      openNotificationsModal();
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }

  // ─── PUBLIC PROFILE ─────────────────────────────────────────────
  async function openPublicProfile(userId) {
    const games = storeGames.filter(g => g.author_id === userId);
    const content = $('publicProfileContent');
    if (!games.length) {
      content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.2);padding:20px;">This user has no approved games yet.</div>';
    } else {
      const user = games[0];
      const color = user.author_color || '#ffffff';
      content.innerHTML = `
        <div style="font-size:24px;font-weight:600;color:${color};">${user.display_name || user.author_id}</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.2);margin-bottom:12px;">${games.length} game(s) in store</div>
        ${games.map(g => `
          <div class="user-game-item" style="cursor:pointer;" onclick="viewInStore('${g.title}')">
            <div><span class="title">${g.title}</span><span class="category-badge" style="font-size:10px;background:rgba(255,255,255,0.04);padding:1px 10px;border-radius:40px;color:rgba(255,255,255,0.3);margin-left:6px;">${g.category}</span><button class="btn-sm download" style="margin-left:6px;padding:2px 10px;font-size:11px;" onclick="event.stopPropagation();downloadGame(${g.id})">⬇ Download</button></div>
            <span class="meta">v${g.version} · ${g.file_size ? formatFileSize(g.file_size) : ''}</span>
          </div>
        `).join('')}
      `;
    }
    content.innerHTML += `<div class="actions"><button class="btn btn-secondary" onclick="closePublicProfileModal()">Close</button></div>`;
    $('publicProfileModal').classList.add('show');
  }
  function closePublicProfileModal() { $('publicProfileModal').classList.remove('show'); }

  // ─── CONTACT ADMIN ──────────────────────────────────────────────
  $('contactFloating').addEventListener('click', async function() {
    if (!currentUser) { showToast('Please log in first', 'error'); return; }
    const msg = prompt('Write your message to the admin:');
    if (!msg) return;
    try {
      await apiFetch('/api/contact', { method: 'POST', body: JSON.stringify({ message: msg.trim() }) });
      showToast('Message sent!', 'success');
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  });

  // ─── TEMPLATE DOWNLOAD ──────────────────────────────────────────
  function downloadTemplate(e) {
    e.preventDefault();
    const selected = document.querySelector('input[name="template"]:checked');
    if (!selected) return;
    const template = selected.value;
    const urls = {
      size1: 'https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/game/size1.png?raw=true',
      size2: 'https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/game/size2.png?raw=true',
      size3: 'https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/game/size3.png?raw=true'
    };
    const url = urls[template];
    if (!url) return;
    const a = document.createElement('a'); a.href = url; a.download = 'template_' + template + '.png'; a.click();
  }
  // ─── CATEGORY FILTERS ──────────────────────────────────────────
  document.querySelectorAll('.panel-category-filter button').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.panel-category-filter button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentCategory = this.dataset.category;
      storePage = 1;
      $('storeHeading').textContent = currentCategory === 'all' ? 'available apps' : 'available ' + currentCategory + 's';
      loadStore();
    });
  });
  $('storeSearchInput').addEventListener('input', function() {
    searchQuery = this.value.trim().toLowerCase();
    storePage = 1;
    loadStore();
  });

  // ─── USER DROPDOWN ──────────────────────────────────────────────
  let dropdownOpen = false;
  function toggleDropdown(e) {
    e.stopPropagation(); dropdownOpen = !dropdownOpen;
    const dropdown = $('userDropdown'), arrow = $('userMenuArrow');
    if (dropdownOpen) { dropdown.classList.add('open'); arrow.classList.add('open'); }
    else { dropdown.classList.remove('open'); arrow.classList.remove('open'); }
  }
  function closeDropdown() {
    dropdownOpen = false;
    $('userDropdown').classList.remove('open');
    $('userMenuArrow').classList.remove('open');
  }
  $('userMenuBtn').addEventListener('click', toggleDropdown);
  document.addEventListener('click', function(e) {
    const container = document.getElementById('userMenuContainer');
    if (container && !container.contains(e.target)) closeDropdown();
  });
  document.querySelectorAll('.dropdown-item').forEach(item => item.addEventListener('click', closeDropdown));

  // ─── LOGIN / REGISTER UI ──────────────────────────────────────
  $('showRegister').addEventListener('click', function() {
    if (!registrationEnabled) { showToast('Registration disabled.', 'error'); return; }
    $('loginForm').style.display = 'none'; $('registerForm').style.display = 'block';
    $('loginStatus').textContent = ''; $('registerStatus').textContent = '';
  });
  $('showLogin').addEventListener('click', function() {
    $('loginForm').style.display = 'block'; $('registerForm').style.display = 'none';
    $('loginStatus').textContent = ''; $('registerStatus').textContent = '';
  });

  // ─── LOGIN ACTION ──────────────────────────────────────────────
  $('loginBtnAction').addEventListener('click', async function() {
    const username = $('loginUsername').value.trim();
    const password = $('loginPassword').value.trim();
    if (!username || !password) {
      $('loginStatus').textContent = 'Please fill in both fields';
      $('loginStatus').className = 'status-msg error';
      return;
    }
    try {
      const result = await loginUser(username, password);
      $('loginStatus').textContent = 'Login successful!';
      $('loginStatus').className = 'status-msg success';
      switchView('app');
      updateUI();
      loadStore();
      showToast('Welcome back, ' + username + '!', 'success');
    } catch (e) {
      $('loginStatus').textContent = e.message || 'Login failed';
      $('loginStatus').className = 'status-msg error';
    }
  });
  ['loginUsername','loginPassword'].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') $('loginBtnAction').click(); }));

  // ─── REGISTER ACTION ───────────────────────────────────────────
  $('registerBtnAction').addEventListener('click', async function() {
    const username = $('registerUsername').value.trim();
    const password = $('registerPassword').value.trim();
    const confirm = $('registerPasswordConfirm').value.trim();
    if (!username || !password || !confirm) {
      $('registerStatus').textContent = 'Please fill in all fields';
      $('registerStatus').className = 'status-msg error';
      return;
    }
    if (password !== confirm) {
      $('registerStatus').textContent = 'Passwords do not match';
      $('registerStatus').className = 'status-msg error';
      return;
    }
    if (username.toLowerCase() === ADMIN_NAME.toLowerCase()) {
      $('registerStatus').textContent = 'This username is reserved.';
      $('registerStatus').className = 'status-msg error';
      return;
    }
    try {
      const result = await registerUser(username, password);
      $('registerStatus').textContent = 'Account created! Reset key: ' + result.resetKey;
      $('registerStatus').className = 'status-msg success';
      showToast('Account created! Save your reset key.', 'success');
      setTimeout(() => {
        $('registerForm').style.display = 'none';
        $('loginForm').style.display = 'block';
        $('loginUsername').value = username;
        $('loginPassword').value = password;
        $('registerStatus').textContent = '';
        $('loginStatus').textContent = 'Account created! Please log in.';
        $('loginStatus').className = 'status-msg success';
      }, 1500);
    } catch (e) {
      $('registerStatus').textContent = e.message || 'Registration failed';
      $('registerStatus').className = 'status-msg error';
    }
  });
  ['registerUsername','registerPassword','registerPasswordConfirm'].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') $('registerBtnAction').click(); }));

  // ─── BROWSE STORE ──────────────────────────────────────────────
  $('browseStoreBtn').addEventListener('click', function() {
    currentUser = null;
    localStorage.removeItem('jgs_token');
    localStorage.removeItem('jgs_user');
    switchView('app');
    updateUI();
    loadStore();
    showToast('Browsing as guest', 'success');
  });

  // ─── TABS ───────────────────────────────────────────────────────
  document.querySelectorAll('.tabs button').forEach(btn => {
    btn.addEventListener('click', function() {
      if (this.disabled) { showToast('Please log in to upload', 'error'); return; }
      setAppPanel(this.dataset.panel);
      if (this.dataset.panel === 'panelStore') loadStore();
    });
  });

  // ─── REGISTRATION SETTING ──────────────────────────────────────
  async function fetchRegistrationSetting() {
    try {
      const data = await apiFetch('/api/settings/registration');
      registrationEnabled = data.enabled;
      updateUI();
    } catch (e) { registrationEnabled = true; }
  }

  // ─── ORIENTATION ──────────────────────────────────────────────
  function handleOrientation() {
    const isPortrait = window.matchMedia('(orientation: portrait)').matches;
    const overlay = $('rotateOverlay');
    const viewLogin = $('viewLogin');
    const viewApp = $('viewApp');
    if (viewLogin.classList.contains('active')) { overlay.style.display = 'none'; return; }
    if (viewApp.classList.contains('active')) {
      overlay.style.display = isPortrait ? 'flex' : 'none';
    }
  }
  window.addEventListener('resize', handleOrientation);
  window.addEventListener('orientationchange', () => setTimeout(handleOrientation, 300));

  // ─── MUSIC ──────────────────────────────────────────────────────
  let audio = null, isMusicMuted = true;
  function initMusic() {
    try {
      audio = new Audio('https://github.com/NYC0DEV/Joystick_Go_Store/raw/refs/heads/main/docs/content/tracks/Glass_Marble.mp3');
      audio.loop = true; audio.volume = 0.5;
      $('musicToggle').addEventListener('click', toggleMusic);
    } catch (e) { /* ignore */ }
  }
  function toggleMusic() {
    if (!audio) return;
    if (isMusicMuted) { audio.play().catch(() => {}); isMusicMuted = false; $('musicToggle').textContent = '🎵'; $('musicToggle').classList.remove('muted'); }
    else { audio.pause(); isMusicMuted = true; $('musicToggle').textContent = '🔇'; $('musicToggle').classList.add('muted'); }
  }

  // ─── GITHUB OAUTH (unchanged – keep if needed) ──────────────
  function handleGitHubCallback() {
    // Keep original implementation if you have one
  }

  // ─── INIT ──────────────────────────────────────────────────────
  async function initApp() {
    await fetchRegistrationSetting();
    const restored = await restoreSession();
    if (restored) {
      switchView('app');
      updateUI();
      loadStore();
      showToast('Welcome back, ' + currentUser.display_name + '!', 'success');
    } else {
      switchView('login');
      handleGitHubCallback();
    }
    initMusic();
    handleOrientation();
  }
  initApp();
  console.log('Joystick Go Store (API v2) loaded.');
</script>
