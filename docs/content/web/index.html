<!DOCTYPE html>
<html>
<head>
  <title>Joystick Go Store</title>
</head>
<body>
  <button id="login">Login with GitHub</button>
  <div id="result"></div>

  <script>
    const CONFIG = {
      clientId: 'Ov23limVqQtNIyPGAZtr',
      proxyUrl: 'https://joystick-store-proxy.joystick-go-store.workers.dev',
      redirect: 'https://joystick-go-store.pages.dev/',
    };

    document.getElementById('login').onclick = () => {
      const url = 'https://github.com/login/oauth/authorize' +
        '?client_id=' + CONFIG.clientId +
        '&redirect_uri=' + CONFIG.redirect +
        '&scope=read:user user:email';
      window.location.href = url;
    };

    // ── Handle the OAuth callback ──
    const code = new URLSearchParams(window.location.search).get('code');
    const resultDiv = document.getElementById('result');

    if (code) {
      resultDiv.textContent = '⏳ Exchanging code...';
      resultDiv.style.color = 'yellow';

      fetch(CONFIG.proxyUrl + '/callback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      })
      .then(async (response) => {
        // ── Get the response as JSON ──
        const data = await response.json();
        console.log('Response:', data);

        // ── Check for errors ──
        if (data.error) {
          resultDiv.textContent = '❌ Error: ' + data.error;
          resultDiv.style.color = 'red';
          return;
        }

        if (!data.user) {
          resultDiv.textContent = '❌ No user data received';
          resultDiv.style.color = 'red';
          console.error('Missing user in response:', data);
          return;
        }

        // ── Success ──
        resultDiv.textContent = '✅ Logged in as: ' + data.user.login;
        resultDiv.style.color = 'lime';
        console.log('User data:', data.user);
      })
      .catch((err) => {
        resultDiv.textContent = '❌ Network error: ' + err.message;
        resultDiv.style.color = 'red';
        console.error('Fetch error:', err);
      });
    }
  </script>
</body>
</html>
