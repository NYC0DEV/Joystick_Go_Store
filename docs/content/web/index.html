<script>
        // ─── CONFIG ──────────────────────────────────────────────────────────
        const CONFIG = {
            clientId: 'Ov23limVqQtNIyPGAZtr',
            proxyUrl: 'https://joystick-store-proxy.joystick-go-store.workers.dev',
            redirect: 'https://joystick-go-store.pages.dev/',
            owner: 'NYC0DEV'
        };
        const ADMIN_NAME = 'NYC0DEV';
        let MAX_FILE_SIZE = 50 * 1024 * 1024;
        let MAX_UPLOAD_UNIT = 'MB';
        let currentUser = null;
        let githubToken = null;
        let users = [];
        let submissions = [];
        let storeGames = [];
        let audio = null;
        let isMusicMuted = true;
        let currentCategory = 'all';
        let resetUserTarget = null;
        let storePage = 1;
        let storePerPage = 10;
        let myUploadsPage = 1;
        let myUploadsPerPage = 10;
        let searchQuery = '';
        const $ = id => document.getElementById(id);
        let registrationEnabled = true;
        let isUploading = false;
        let myUploadsInterval = null;

        let storeRefreshInterval = null;

        function startStorePolling() {
            stopStorePolling();
            if (!currentUser) return;
            storeRefreshInterval = setInterval(() => {
                const storePanel = document.getElementById('panelStore');
                if (storePanel && storePanel.classList.contains('active')) {
                    loadStore();
                }
            }, 30000);
        }

        function stopStorePolling() {
            if (storeRefreshInterval) {
                clearInterval(storeRefreshInterval);
                storeRefreshInterval = null;
            }
        }

        let toastTimer = null;

        function showToast(msg, type = 'success') {
            const el = $('toast');
            el.textContent = msg;
            el.className = 'toast ' + type + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
        }

        function initMusic() {
            try {
                audio = new Audio(
                    'https://github.com/NYC0DEV/Joystick_Go_Store/raw/refs/heads/main/docs/content/tracks/Glass_Marble.mp3'
                );
                audio.loop = true;
                audio.volume = 0.5;
                $('musicToggle').addEventListener('click', toggleMusic);
            } catch (e) { /* ignore */ }
        }

        function toggleMusic() {
            if (!audio) return;
            if (isMusicMuted) {
                audio.play().catch(() => {});
                isMusicMuted = false;
                $('musicToggle').textContent = '🎵';
                $('musicToggle').classList.remove('muted');
            } else {
                audio.pause();
                isMusicMuted = true;
                $('musicToggle').textContent = '🔇';
                $('musicToggle').classList.add('muted');
            }
        }

        function handleOrientation() {
            const isPortrait = window.matchMedia('(orientation: portrait)').matches;
            const overlay = $('rotateOverlay');
            const viewLogin = $('viewLogin');
            const viewApp = $('viewApp');
            if (viewLogin.classList.contains('active')) { overlay.style.display = 'none'; return; }
            if (viewApp.classList.contains('active')) {
                overlay.style.display = isPortrait ? 'flex' : 'none';
            }
        }

        function getToken() { return localStorage.getItem('jgs_token'); }
        function setToken(token) { token ? localStorage.setItem('jgs_token', token) : localStorage.removeItem('jgs_token'); }
        function getAuthHeaders() {
            const token = getToken();
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function apiFetch(endpoint, options = {}) {
            const url = CONFIG.proxyUrl + endpoint;
            const headers = {
                'Content-Type': 'application/json',
                ...getAuthHeaders(),
                ...(options.headers || {})
            };
            const resp = await fetch(url, { ...options, headers });
            const data = await resp.json().catch(() => ({}));
            if (!resp.ok) {
                throw new Error(data.error || `HTTP ${resp.status}: ${resp.statusText}`);
            }
            return data;
        }

        let maxUploadSizePollInterval = null;

        async function fetchMaxUploadSize() {
            try {
                const data = await apiFetch('/api/settings/max-upload-size');
                if (data && data.maxSize) {
                    MAX_FILE_SIZE = data.maxSize;
                    MAX_UPLOAD_UNIT = data.unit || 'MB';
                    updateMaxUploadIndicator();
                }
            } catch (e) {
                // Fallback to default
            }
        }

        function updateMaxUploadIndicator() {
            const el = document.getElementById('maxUploadSizeDisplay');
            const unitEl = document.getElementById('maxUploadSizeUnitDisplay');
            if (el) {
                let value;
                if (MAX_UPLOAD_UNIT === 'MB') {
                    value = MAX_FILE_SIZE / (1024 * 1024);
                } else {
                    value = MAX_FILE_SIZE / 1024;
                }
                if (Number.isInteger(value)) {
                    el.textContent = value;
                } else {
                    el.textContent = value.toFixed(1);
                }
                if (unitEl) unitEl.textContent = MAX_UPLOAD_UNIT;
            }
        }

        function startMaxUploadPolling() {
            stopMaxUploadPolling();
            fetchMaxUploadSize();
            maxUploadSizePollInterval = setInterval(fetchMaxUploadSize, 15000);
        }

        function stopMaxUploadPolling() {
            if (maxUploadSizePollInterval) {
                clearInterval(maxUploadSizePollInterval);
                maxUploadSizePollInterval = null;
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        function getCategoryHeading(cat) {
            const map = {
                'all': 'available games',
                'game': 'available games',
                'emulator': 'available emulators',
                'tool': 'available tools'
            };
            return map[cat] || 'available games';
        }

        async function loginUser(username, password) {
            const data = await apiFetch('/api/login', { method: 'POST', body: JSON.stringify({ username, password }) });
            setToken(data.token);
            localStorage.setItem('jgs_current_user', JSON.stringify(data.user));
            currentUser = data.user;
            if (currentUser.username === ADMIN_NAME) currentUser.is_admin = true;
            return true;
        }

        async function registerUser(username, password) {
            const data = await apiFetch('/api/register', { method: 'POST', body: JSON.stringify({ username, password }) });
            return { success: true, msg: 'Account created!', resetKey: data.resetKey };
        }

        function logoutUser() {
            apiFetch('/api/logout', { method: 'POST' }).catch(() => {});
            setToken(null);
            localStorage.removeItem('jgs_current_user');
            localStorage.removeItem('github_token');
            currentUser = null;
            githubToken = null;
            showToast('Logged out', 'success');
            stopStorePolling();
            stopMaxUploadPolling();
            updateUI();
            switchView('login');
        }

        async function restoreSession() {
            const token = getToken();
            if (!token) return false;
            try {
                const data = await apiFetch('/api/user');
                currentUser = data.user;
                if (currentUser.username === ADMIN_NAME) currentUser.is_admin = true;
                localStorage.setItem('jgs_current_user', JSON.stringify(currentUser));
                if (currentUser.is_admin) {
                    const storedToken = localStorage.getItem('github_token');
                    if (storedToken) githubToken = storedToken;
                }
                await fetchMaxUploadSize();
                startMaxUploadPolling();
                return true;
            } catch (e) {
                if (e.message && (e.message.includes('401') || e.message.includes('Unauthorized'))) {
                    setToken(null);
                    localStorage.removeItem('jgs_current_user');
                    return false;
                }
                const cached = localStorage.getItem('jgs_current_user');
                if (cached) {
                    try {
                        currentUser = JSON.parse(cached);
                        if (currentUser.username === ADMIN_NAME) currentUser.is_admin = true;
                        return true;
                    } catch (parseErr) {
                        // cached data is corrupt, fall through to false
                    }
                }
                return false;
            }
        }

        function loginWithGitHub(adminPassword = '') {
            if (!navigator.onLine) { showToast('No internet connection', 'error'); return; }
            $('loginStatus').textContent = '⏳ Redirecting to GitHub...';
            $('loginStatus').className = 'status-msg info';
            $('loginBtnAction').disabled = true;
            sessionStorage.setItem('admin_login_password', adminPassword);
            const url = 'https://github.com/login/oauth/authorize' +
                '?client_id=' + CONFIG.clientId +
                '&redirect_uri=' + CONFIG.redirect +
                '&scope=read:user user:email';
            window.location.href = url;
        }

        async function handleGitHubCallback() {
            const code = new URLSearchParams(window.location.search).get('code');
            if (!code) return;
            if (!navigator.onLine) { showToast('No internet connection', 'error'); return; }
            $('loginStatus').textContent = '⏳ Verifying with GitHub...';
            $('loginStatus').className = 'status-msg info';
            const storedPassword = sessionStorage.getItem('admin_login_password') || '';

            try {
                const data = await apiFetch('/api/auth/github', {
                    method: 'POST',
                    body: JSON.stringify({ code, password: storedPassword })
                });
                setToken(data.token);
                localStorage.setItem('jgs_current_user', JSON.stringify(data.user));
                currentUser = data.user;
                if (currentUser.username === ADMIN_NAME) currentUser.is_admin = true;
                if (currentUser.is_admin) {
                    localStorage.setItem('github_token', data.token);
                    githubToken = data.token;
                }
                window.history.replaceState({}, '', window.location.pathname);
                sessionStorage.removeItem('admin_login_password');
                showToast('Admin verified via GitHub!', 'success');
                $('loginStatus').textContent = '✅ Admin verified!';
                $('loginStatus').className = 'status-msg success';
                $('loginBtnAction').disabled = false;
                updateUI();
                switchView('app');
                loadStore();
                startNotificationPolling();
                startStorePolling();
                startMaxUploadPolling();
                await fetchMaxUploadSize();
            } catch (err) {
                showToast('GitHub verification failed: ' + err.message, 'error');
                $('loginStatus').textContent = '❌ Verification failed: ' + err.message;
                $('loginStatus').className = 'status-msg error';
                $('loginBtnAction').disabled = false;
                sessionStorage.removeItem('admin_login_password');
            }
        }

        let resetVerifiedUser = null;

        function openResetModal() {
            const modal = $('resetModal');
            document.getElementById('resetStep1').style.display = 'block';
            document.getElementById('resetStep2').style.display = 'none';
            document.getElementById('resetModalStatus').textContent = '';
            document.getElementById('resetModalStatus').className = 'status-msg';
            document.getElementById('resetUsernameInput').value = '';
            document.getElementById('resetKeyInput').value = '';
            document.getElementById('resetNewPassword').value = '';
            document.getElementById('resetConfirmPassword').value = '';
            document.getElementById('resetStep2Status').textContent = '';
            document.getElementById('resetStep2Status').className = 'status-msg';
            resetVerifiedUser = null;
            modal.classList.add('show');
        }

        function closeResetModal() {
            $('resetModal').classList.remove('show');
            resetVerifiedUser = null;
        }

        document.getElementById('resetVerifyBtn').addEventListener('click', async function() {
            const username = document.getElementById('resetUsernameInput').value.trim();
            const resetKey = document.getElementById('resetKeyInput').value.trim();
            const status = document.getElementById('resetModalStatus');
            if (!username || !resetKey) {
                status.textContent = 'Please enter both username and reset key.';
                status.className = 'status-msg error';
                return;
            }
            try {
                const data = await apiFetch('/api/verify-reset-key', {
                    method: 'POST',
                    body: JSON.stringify({ username, resetKey })
                });
                if (data.valid) {
                    resetVerifiedUser = { username, resetKey };
                    document.getElementById('resetStep1').style.display = 'none';
                    document.getElementById('resetStep2').style.display = 'block';
                    status.textContent = '✅ Key verified! Enter your new password.';
                    status.className = 'status-msg success';
                } else {
                    status.textContent = '❌ Invalid reset key for this user.';
                    status.className = 'status-msg error';
                }
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
                status.className = 'status-msg error';
            }
        });

        document.getElementById('resetConfirmBtn').addEventListener('click', async function() {
            if (!resetVerifiedUser) {
                document.getElementById('resetStep2Status').textContent = 'Please verify your key first.';
                document.getElementById('resetStep2Status').className = 'status-msg error';
                return;
            }
            const newPwd = document.getElementById('resetNewPassword').value.trim();
            const confirmPwd = document.getElementById('resetConfirmPassword').value.trim();
            const status = document.getElementById('resetStep2Status');
            if (!newPwd || !confirmPwd) {
                status.textContent = 'Please fill in both fields.';
                status.className = 'status-msg error';
                return;
            }
            if (newPwd.length < 3) {
                status.textContent = 'Password must be at least 3 characters.';
                status.className = 'status-msg error';
                return;
            }
            if (newPwd !== confirmPwd) {
                status.textContent = 'Passwords do not match.';
                status.className = 'status-msg error';
                return;
            }
            try {
                await apiFetch('/api/reset-password', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: resetVerifiedUser.username,
                        resetKey: resetVerifiedUser.resetKey,
                        newPassword: newPwd
                    })
                });
                status.textContent = '✅ Password reset successfully! You can now log in.';
                status.className = 'status-msg success';
                showToast('Password reset successfully!', 'success');
                setTimeout(() => {
                    closeResetModal();
                }, 1500);
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
                status.className = 'status-msg error';
            }
        });

        let notificationPollInterval = null;

        function startNotificationPolling() {
            clearNotificationPolling();
            if (!currentUser) return;
            fetchNotificationCount();
            notificationPollInterval = setInterval(fetchNotificationCount, 15000);
            document.addEventListener('visibilitychange', handleVisibilityChange);
        }

        function clearNotificationPolling() {
            if (notificationPollInterval) {
                clearInterval(notificationPollInterval);
                notificationPollInterval = null;
            }
            document.removeEventListener('visibilitychange', handleVisibilityChange);
        }

        function handleVisibilityChange() {
            if (document.visibilityState === 'visible' && currentUser) {
                fetchNotificationCount();
            }
        }

        async function fetchNotificationCount() {
            if (!currentUser) return;
            try {
                const data = await apiFetch('/api/user/notifications');
                const unread = data.filter(n => !n.is_read).length;
                const badge = $('notifBadge');
                const headerBadge = $('notifBadgeHeader');
                if (unread > 0) {
                    badge.style.display = 'inline';
                    badge.textContent = unread;
                    headerBadge.style.display = 'inline';
                    headerBadge.textContent = unread;
                } else {
                    badge.style.display = 'none';
                    headerBadge.style.display = 'none';
                }
                window._latestNotifications = data;
            } catch (e) { /* ignore */ }
        }

        async function openNotificationsModal() {
            if (!currentUser) { showToast('Please log in first', 'error'); return; }
            const modal = $('notificationsModal');
            const content = $('notificationsContent');

            try {
                let data = window._latestNotifications;
                if (!data) {
                    data = await apiFetch('/api/user/notifications');
                    window._latestNotifications = data;
                }
                let html = '';
                if (data.length === 0) {
                    html = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.2);">No notifications</div>';
                } else {
                    html = data.map(n => `
                        <div class="notif-item">
                            <div>
                                <div class="msg">${n.message}</div>
                                <div class="time">${new Date(n.created_at).toLocaleString()}</div>
                            </div>
                            <div class="actions">
                                <button onclick="deleteNotification(${n.id})" title="Delete">🗑</button>
                            </div>
                        </div>
                    `).join('');
                    html += `
                        <div style="margin-top:12px;text-align:center;">
                            <button class="btn btn-danger" onclick="clearAllNotifications()" style="padding:6px 16px;font-size:12px;">Clear All</button>
                        </div>
                    `;
                }
                content.innerHTML = html;
                modal.classList.add('show');
                $('notifBadge').style.display = 'none';
                $('notifBadgeHeader').style.display = 'none';
                try {
                    await apiFetch('/api/user/notifications/read-all', { method: 'POST' });
                    fetchNotificationCount();
                } catch (e) { /* ignore */ }
            } catch (e) {
                showToast('Error loading notifications: ' + e.message, 'error');
            }
        }

        function closeNotificationsModal() {
            $('notificationsModal').classList.remove('show');
        }

        async function deleteNotification(id) {
            if (!confirm('Delete?')) return;
            try {
                await apiFetch(`/api/user/notifications/${id}`, { method: 'DELETE' });
                showToast('Deleted', 'success');
                window._latestNotifications = await apiFetch('/api/user/notifications');
                openNotificationsModal();
                fetchNotificationCount();
            } catch (e) { showToast('Error: ' + e.message, 'error'); }
        }

        async function clearAllNotifications() {
            if (!confirm('Clear all notifications?')) return;
            try {
                await apiFetch('/api/user/notifications/clear', { method: 'DELETE' });
                showToast('Cleared', 'success');
                window._latestNotifications = [];
                openNotificationsModal();
                fetchNotificationCount();
            } catch (e) { showToast('Error: ' + e.message, 'error'); }
        }

        async function openProfileModal() {
            if (!currentUser) { showToast('Please log in first', 'error'); return; }
            try {
                const data = await apiFetch('/api/user');
                currentUser = data.user;
                if (currentUser.username === ADMIN_NAME) currentUser.is_admin = true;
                localStorage.setItem('jgs_current_user', JSON.stringify(currentUser));
            } catch (e) { /* use cached */ }

            let userSubs = [];
            try {
                const allSubs = await apiFetch('/api/submissions');
                userSubs = allSubs.filter(s => s.author_id === currentUser.id);
            } catch (e) { /* ignore */ }

            const approved = userSubs.filter(s => s.status === 'approved').length;
            const pending = userSubs.filter(s => s.status === 'pending').length;
            const rejected = userSubs.filter(s => s.status === 'rejected').length;

            const modal = $('profileModal');
            const content = $('profileContent');
            $('profileModalTitle').textContent = '👤 Profile';
            const color = currentUser.username_color || '#ffffff';

            content.innerHTML = `
                <div class="form-group">
                    <label>Username</label>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <span style="font-size:20px;font-weight:600;color:${color};">${currentUser.display_name || currentUser.username}</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="profileBio" rows="3" maxlength="200" placeholder="Tell us about yourself">${currentUser.bio || ''}</textarea>
                    <div style="font-size:11px;color:rgba(255,255,255,0.2);text-align:right;">${(currentUser.bio || '').length} / 200</div>
                </div>
                <div class="form-group">
                    <label>Username Color</label>
                    <div class="color-picker-row">
                        <input type="color" id="profileColorPicker" value="${color}" />
                        <span class="color-hex" id="profileColorHex">${color}</span>
                        <button class="btn btn-secondary" style="padding:6px 16px;flex:0;" onclick="resetProfileColor()">Reset to white</button>
                    </div>
                    <div style="font-size:12px;color:rgba(255,255,255,0.2);margin-top:4px;">This color will be used for your name in the store.</div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;">
                    <div style="background:rgba(255,255,255,0.02);border-radius:12px;padding:10px;text-align:center;">
                        <div style="font-size:22px;font-weight:600;color:#50dca0;">${approved}</div>
                        <div style="font-size:11px;color:rgba(255,255,255,0.3);">Approved</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.02);border-radius:12px;padding:10px;text-align:center;">
                        <div style="font-size:22px;font-weight:600;color:#ffd866;">${pending}</div>
                        <div style="font-size:11px;color:rgba(255,255,255,0.3);">Pending</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.02);border-radius:12px;padding:10px;text-align:center;">
                        <div style="font-size:22px;font-weight:600;color:#ff6b6b;">${rejected}</div>
                        <div style="font-size:11px;color:rgba(255,255,255,0.3);">Rejected</div>
                    </div>
                </div>
                <div style="font-size:13px;color:rgba(255,255,255,0.3);margin-bottom:8px;">Total uploads: ${userSubs.length}</div>
                <div style="margin-top:8px;">
                    ${userSubs.length === 0 ? '<div style="text-align:center;color:rgba(255,255,255,0.2);padding:12px;">No uploads yet</div>' :
                    userSubs.slice(0, 5).map(s => `
                        <div class="user-game-item">
                            <div>
                                <span class="title">${s.title || 'Untitled'}</span>
                                <span class="status-badge ${s.status || 'pending'}">${s.status || 'pending'}</span>
                                ${s.status === 'approved' && s.file_data ? `<button class="btn-sm download" style="padding:2px 10px;font-size:11px;" onclick="downloadSubmission(${s.id})">⬇ Download</button>` : ''}
                            </div>
                            <span class="meta">${s.category || 'game'} · v${s.version || '1.0'} · ${s.file_size ? formatFileSize(s.file_size) : ''}</span>
                        </div>
                    `).join('') + (userSubs.length > 5 ? `<div style="text-align:center;color:rgba(255,255,255,0.15);font-size:12px;padding:4px;">+${userSubs.length - 5} more</div>` : '')}
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="saveProfileChanges()">Save</button>
                    <button class="btn btn-secondary" onclick="closeProfileModal()">Close</button>
                </div>
            `;
            modal.classList.add('show');

            const picker = document.getElementById('profileColorPicker');
            const hex = document.getElementById('profileColorHex');
            if (picker) {
                picker.addEventListener('input', function() {
                    hex.textContent = this.value;
                    const nameSpan = content.querySelector('span[style*="font-size:20px"]');
                    if (nameSpan) nameSpan.style.color = this.value;
                });
            }
            const bioEl = document.getElementById('profileBio');
            if (bioEl) {
                bioEl.addEventListener('input', function() {
                    const counter = this.closest('.form-group').querySelector('div[style*="text-align:right"]');
                    if (counter) counter.textContent = this.value.length + ' / 200';
                });
            }
        }

        function closeProfileModal() {
            $('profileModal').classList.remove('show');
        }

        function resetProfileColor() {
            const picker = document.getElementById('profileColorPicker');
            const hex = document.getElementById('profileColorHex');
            if (picker) {
                picker.value = '#ffffff';
                hex.textContent = '#ffffff';
                const content = $('profileContent');
                const nameSpan = content.querySelector('span[style*="font-size:20px"]');
                if (nameSpan) nameSpan.style.color = '#ffffff';
            }
        }

        async function saveProfileChanges() {
            if (!currentUser) return;
            const bio = document.getElementById('profileBio').value.trim();
            if (bio.length > 200) { showToast('Bio max 200 characters', 'error'); return; }
            const color = document.getElementById('profileColorPicker').value;
            try {
                await apiFetch('/api/user', { method: 'PUT', body: JSON.stringify({ bio, username_color: color }) });
                currentUser.bio = bio;
                currentUser.username_color = color;
                localStorage.setItem('jgs_current_user', JSON.stringify(currentUser));
                updateUI();
                showToast('Profile saved!', 'success');
                openProfileModal();
            } catch (e) { showToast('Error: ' + e.message, 'error'); }
        }

        async function openSettingsModal() {
            if (!currentUser) { showToast('Please log in first', 'error'); return; }
            const modal = $('settingsModal');
            const content = $('settingsContent');

            const resetKey = currentUser.reset_key || 'Not set';
            content.innerHTML = `
                <div style="margin-bottom:12px;font-size:14px;color:rgba(255,255,255,0.4);">Username: <strong style="color:${currentUser.username_color || '#ffffff'};">${currentUser.display_name || currentUser.username}</strong></div>
                <div class="form-group">
                    <label>Current password</label>
                    <input type="password" id="settingsCurrentPwd" placeholder="Enter current password" />
                </div>
                <div class="form-group">
                    <label>New password</label>
                    <input type="password" id="settingsNewPwd" placeholder="Enter new password" />
                </div>
                <div class="form-group">
                    <label>Confirm new password</label>
                    <input type="password" id="settingsConfirmPwd" placeholder="Confirm new password" />
                </div>
                <button class="btn btn-primary" id="settingsChangePwdBtn" style="width:100%;margin:8px 0;">Change Password</button>
                <div id="settingsPwdStatus" class="status-msg"></div>

                <hr style="border-color:rgba(255,255,255,0.04);margin:16px 0;" />

                        ${resetKey !== 'Not set' ? `
                        <div style="display:flex;gap:8px;margin-top:8px;">
                            <button class="btn btn-secondary" style="flex:1;" onclick="copySettingsKey()">Copy Key</button>
                            <button class="btn btn-warning" style="flex:1;background:rgba(255,200,50,0.08);border-color:rgba(255,200,50,0.15);color:#ffd866;" onclick="regenerateKey()">Regenerate Key</button>

                const newPwd = document.getElementById('settingsNewPwd').value.trim();
                const confirm = document.getElementById('settingsConfirmPwd').value.trim();
                const status = document.getElementById('settingsPwdStatus');
                if (!current || !newPwd || !confirm) {
                    status.textContent = 'Please fill in all fields.';
                    status.className = 'status-msg error';
                    return;
                }
                if (newPwd.length < 3) {
                    status.textContent = 'New password must be at least 3 characters.';

                    return;
                }
                if (newPwd !== confirm) {

                    status.className = 'status-msg error';
                    return;
                }
                try {
                    await apiFetch('/api/user/password', { method: 'PUT', body: JSON.stringify({ currentPassword: current, newPassword: newPwd }) });

                    status.className = 'status-msg success';

                    document.getElementById('settingsCurrentPwd').value = '';
                    document.getElementById('settingsNewPwd').value = '';
                    document.getElementById('settingsConfirmPwd').value = '';

            });

        function copySettingsKey() {
            const keyEl = document.getElementById('settingsResetKey');
            if (!keyEl) return;
            const key = keyEl.textContent;
            if (key && key !== 'Not set') {
                navigator.clipboard.writeText(key).then(() => {
                    showToast('Key copied!', 'success');
                }).catch(() => {
                    const range = document.createRange();
                    range.selectNode(keyEl);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    showToast('Key copied!', 'success');
                });
            } else {
                showToast('No key to copy.', 'error');
            }
        }

        async function refreshMyUploadsContent() {
            if (!currentUser) return;
            const content = $('myUploadsContent');
            try {
                const data = await apiFetch('/api/submissions');
                const userSubs = data.filter(s => s.author_id === currentUser.id);
                const total = userSubs.length;
                const totalPages = Math.ceil(total / myUploadsPerPage);
                if (myUploadsPage > totalPages) myUploadsPage = Math.max(1, totalPages);
                const start = (myUploadsPage - 1) * myUploadsPerPage;
                const pageItems = userSubs.slice().reverse().slice(start, start + myUploadsPerPage);

                let html = '';
                if (!pageItems.length) {
                    html = `
                        <div style="text-align:center;padding:30px 0;color:rgba(255,255,255,0.2);">
                            <div style="font-size:40px;margin-bottom:12px;">📭</div>

                        </div>
                    `;
                } else {
                    html = pageItems.map(s => {
                        const downloadBtn = s.file_data ? `<button class="btn-sm download" style="margin-left:6px;padding:2px 10px;font-size:11px;" onclick="downloadSubmission(${s.id})">⬇ Download</button>` : '';
                        const viewBtn = s.status === 'approved' ? `<button class="btn-sm view" style="margin-left:6px;padding:2px 10px;font-size:11px;" onclick="viewInStore('${s.title}')">View in Store</button>` : '';
                        return `
                            <div class="user-game-item">
                                <div>
                                    <span class="title">${s.title || 'Untitled'}</span>
                                    <span class="status-badge ${s.status || 'pending'}">${s.status || 'pending'}</span>
                                    ${viewBtn}
                                    ${downloadBtn}
                                </div>
                                <span class="meta">${s.category || 'game'} · v${s.version || '1.0'} · ${s.created_at ? new Date(s.created_at).toLocaleDateString() : '—'} · ${s.file_size ? formatFileSize(s.file_size) : ''}</span>
                            </div>
                        `;
                    }).join('');

                    if (totalPages > 1) {
                        html += `<div class="pagination">
                            <button onclick="myUploadsPage=Math.max(1,myUploadsPage-1);refreshMyUploadsContent();" ${myUploadsPage<=1?'disabled':''}>◀</button>
                            <span class="page-info">${myUploadsPage} / ${totalPages}</span>
                            <button onclick="myUploadsPage=Math.min(${totalPages},myUploadsPage+1);refreshMyUploadsContent();" ${myUploadsPage>=totalPages?'disabled':''}>▶</button>

        async function downloadSubmission(id) {
            try {
                const data = await apiFetch('/api/submissions');
                const sub = data.find(s => s.id === id);
                if (!sub || !sub.file_data) { showToast('No file', 'error'); return; }
                const binary = Uint8Array.from(atob(sub.file_data), c => c.charCodeAt(0));
                const blob = new Blob([binary], { type: 'application/zip' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = sub.file_name || 'submission.zip';
                a.click();
                URL.revokeObjectURL(url);
                showToast('Downloaded', 'success');
            } catch (e) { showToast('Error: ' + e.message, 'error'); }
        }

            );

        async function loadStore() {
            try {
                const params = new URLSearchParams();
                if (currentCategory !== 'all') params.append('category', currentCategory);
                if (searchQuery) params.append('search', searchQuery);
                const games = await apiFetch('/api/store?' + params.toString());
                storeGames = games;
                renderStore(games);
            } catch (e) {
                showToast('Failed to load store: ' + e.message, 'error');
                $('storeList').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Failed to load store.</p></div>';
            }
        }

        function renderStore(games) {
            const container = $('storeList');
            const count = $('storeCount');

            const total = games.length;
            const totalPages = Math.ceil(total / storePerPage);
            if (storePage > totalPages) storePage = Math.max(1, totalPages);
            const start = (storePage - 1) * storePerPage;
            const end = start + storePerPage;
            const pageItems = games.slice(start, end);

            if (!pageItems.length) {
                container.innerHTML = '<div class="empty"><div class="icon">📦</div><p>nothing yet</p></div>';
                count.textContent = '0 games available';
                document.getElementById('storePagination').innerHTML = '';
                return;
            }
            count.textContent = total + ' game' + (total > 1 ? 's' : '') + ' available';

            const categoryMap = { game: 'Games', emulator: 'Emulators', tool: 'Tools' };

            container.innerHTML = pageItems.map(g => {
                const sizeStr = g.file_size ? formatFileSize(g.file_size) : '—';
                const dateStr = g.approved_at ? new Date(g.approved_at).toLocaleDateString() : '—';
                const authorColor = g.author_color || '#ffffff';
                return `
                    <div class="card">
                        <div class="info">
                            <h4>
                                ${g.title}
                                <span class="category-badge">${categoryMap[g.category] || g.category}</span>
                                <span class="size-badge">${sizeStr}</span>
                            </h4>
                            <p>by <span class="author-link" style="color:${authorColor};cursor:pointer;" onclick="openPublicProfile('${g.display_name || g.author}')">${g.display_name || g.author}</span> · v${g.version} · added ${dateStr}</p>
                            ${g.image_data ? `<img src="${g.image_data}" />` : ''}
                            ${g.description ? `<p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px;">${g.description}</p>` : ''}
                        </div>
                        <div>
                            <button class="download-btn" onclick="downloadGame('${g.id}')">⬇ Download</button>
                        </div>
                    </div>
                `;
            }).join('');

            let pagHtml = '';
            if (totalPages > 1) {
                pagHtml = `
                    <button onclick="storePage=Math.max(1,storePage-1);loadStore();" ${storePage<=1?'disabled':''}>◀</button>
                    <span class="page-info">${storePage} / ${totalPages}</span>
                    <button onclick="storePage=Math.min(${totalPages},storePage+1);loadStore();" ${storePage>=totalPages?'disabled':''}>▶</button>
                `;
            }
            document.getElementById('storePagination').innerHTML = pagHtml;
        }

        async function downloadGame(id) {
            try {
                const game = storeGames.find(g => g.id == id);
                if (!game) {
                    showToast('Game not found', 'error');
                    return;
                }
                const resp = await fetch(CONFIG.proxyUrl + '/api/store/download?id=' + id);
                if (!resp.ok) throw new Error('Download failed: ' + resp.status);
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const filename = game.title.replace(/[^a-zA-Z0-9_\-]/g, '_') + '.zip';
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
                showToast('⬇ Downloading...', 'success');
            } catch (e) {
                showToast('Download error: ' + e.message, 'error');
            }
        }

        function downloadTemplate(e) {
            e.preventDefault();
            const selected = document.querySelector('input[name="template"]:checked');
            if (!selected) return;
            const template = selected.value;
            const urls = {
                size1: 'https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/game/size1.png?raw=true',
                size2: 'https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/game/size2.png?raw=true',
                size3: 'https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/game/size3.png?raw=true'
            };
            const url = urls[template];
            if (!url) return;
            const a = document.createElement('a');
            a.href = url;
            a.download = 'template_' + template + '.png';
            a.click();
        }

        document.querySelectorAll('input[name="template"]').forEach(radio => {

                const template = this.value;
                const urls = {
                    size1: 'https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/game/size1.png?raw=true',
                    size2: 'https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/game/size2.png?raw=true',
                    size3: 'https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/game/size3.png?raw=true'
                };
                $('templateBg').src = urls[template] || urls.size1;
            });
        });

        $('uploadCategory').addEventListener('change', function() {
            const cat = this.value;
            const header = $('uploadHeader'),
                desc = $('uploadDescription');
            if (cat === 'game') { header.textContent = 'upload your game';
                desc.placeholder = 'what does your game do?'; } else if (cat === 'emulator') { header.textContent =
                    'upload your emulator';
                desc.placeholder = 'what system does it emulate?'; } else { header.textContent = 'upload your tool';
                desc.placeholder = 'what does your tool do?'; }
            updateCharCount();
        });

        $('uploadDescription').addEventListener('input', updateCharCount);

        function updateCharCount() {
            const desc = $('uploadDescription');
            const count = $('descCount');
            count.textContent = desc.value.length + ' / 50';
            count.style.color = desc.value.length >= 50 ? 'rgba(255,70,70,0.7)' : 'rgba(255,255,255,0.2)';
        }

        $('zipInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const sizeDisplay = $('zipFileSize');
            if (file) {
                sizeDisplay.textContent = 'File size: ' + formatFileSize(file.size);
                if (file.size > MAX_FILE_SIZE) {
                    showToast('File exceeds max upload size of ' + (MAX_FILE_SIZE / 1024).toFixed(0) + ' KB', 'error');
                    this.value = '';
                    sizeDisplay.textContent = '';
                    document.getElementById('zipInfo').textContent = 'no file selected';
                }
            } else {
                sizeDisplay.textContent = '';
            }
        });

        $('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const previewImg = $('userPreviewImg');
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 154;
                        canvas.height = 115;
                        const ratio = Math.max(154 / img.width, 115 / img.height);
                        const sw = img.width * ratio,
                            sh = img.height * ratio;
                        const sx = (img.width - sw) / 2,
                            sy = (img.height - sh) / 2;
                        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 154, 115);
                        previewImg.src = canvas.toDataURL('image/png', 0.92);
                        previewImg.classList.add('visible');
                        $('imageInfo').textContent = '📎 ' + file.name + ' (154x115)';
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                previewImg.src = '';
                previewImg.classList.remove('visible');
                $('imageInfo').textContent = 'no image selected';
            }
        });

        ['image', 'zip'].forEach(type => {
            const zone = $(`${type}DropZone`),
                input = $(`${type}Input`),
                info = $(`${type}Info`);
            zone.addEventListener('click', () => {
                if (!currentUser) { showToast('Please log in first', 'error'); return; }
                input.click();
            });
            zone.addEventListener('dragover', e => { e.preventDefault(); if (currentUser) zone.style.borderColor =
                    'rgba(255,255,255,0.2)'; });
            zone.addEventListener('dragleave', () => zone.style.borderColor = 'rgba(255,255,255,0.08)');
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.style.borderColor = 'rgba(255,255,255,0.08)';
                if (!currentUser) { showToast('Please log in first', 'error'); return; }
                if (e.dataTransfer.files.length) {
                    input.files = e.dataTransfer.files;
                    info.textContent = '📎 ' + input.files[0].name;
                    if (type === 'zip' && input.files[0].size > MAX_FILE_SIZE) {
                        showToast('File exceeds max upload size of ' + (MAX_FILE_SIZE / 1024).toFixed(0) + ' KB',
                        'error');
                        input.value = '';
                        info.textContent = 'no file selected';
                        document.getElementById('zipFileSize').textContent = '';
                    }
                }
            });
            input.addEventListener('change', () => { if (input.files.length) info.textContent = '📎 ' + input.files[0]
                    .name; });
        });

        document.getElementById('submitBtn').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('uploadForm').dispatchEvent(new Event('submit'));
        });

        // ─── UPLOAD HANDLER – uses FormData ──────────────────────────────
        $('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!currentUser) { showToast('Please log in first', 'error'); return; }
            if (!navigator.onLine) { showToast('No internet connection', 'error'); return; }

            if (isUploading) {
                showToast('Upload already in progress, please wait.', 'error');
                return;
            }

            const title = $('uploadTitle').value.trim();
            const version = $('uploadVersion').value.trim() || '1.0';
            const category = $('uploadCategory').value;
            const description = $('uploadDescription').value.trim();
            const file = $('zipInput').files[0];
            const imageFile = $('imageInput').files[0];

            if (!file) {
                showToast('Please select a .zip file', 'error');
                return;
            }
            if (!title) { showToast('Please enter a title', 'error'); return; }
            if (title.length > 15) { showToast('Title max 15 characters', 'error'); return; }
            if (version.length > 10) { showToast('Version max 10 characters', 'error'); return; }
            if (file.size > MAX_FILE_SIZE) {
                showToast('File too large (max ' + (MAX_FILE_SIZE / 1024).toFixed(0) + ' KB)', 'error');
                return;
            }

            isUploading = true;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Uploading...';

            const progressContainer = document.getElementById('uploadProgressContainer');
            const progressFill = document.getElementById('uploadProgressFill');
            const progressText = document.getElementById('uploadProgressText');
            progressContainer.classList.add('active');
            progressFill.style.width = '0%';
            progressText.textContent = '0%';

            try {
                const formData = new FormData();
                formData.append('title', title);
                formData.append('version', version);
                formData.append('category', category);
                formData.append('description', description);
                formData.append('file', file, file.name);

                if (imageFile) {
                    const preview = $('userPreviewImg');
                    if (preview.src && preview.src.startsWith('data:')) {
                        const res = await fetch(preview.src);
                        const blob = await res.blob();
                        formData.append('image', blob, imageFile.name);
                    } else {
                        formData.append('image', imageFile, imageFile.name);
                    }
                }

                const xhr = new XMLHttpRequest();
                const uploadPromise = new Promise((resolve, reject) => {
                    xhr.open('POST', CONFIG.proxyUrl + '/api/submissions');
                    const token = getToken();
                    if (token) xhr.setRequestHeader('Authorization', 'Bearer ' + token);
                    xhr.timeout = 600000;
                    xhr.ontimeout = function() {
                        reject(new Error('Upload timed out. Please try with a smaller file.'));
                    };
                    xhr.upload.addEventListener('progress', function(ev) {
                        if (ev.lengthComputable) {
                            const pct = Math.round((ev.loaded / ev.total) * 100);
                            progressFill.style.width = pct + '%';
                            progressText.textContent = pct + '%';
                        }
                    });
                    xhr.onload = function() {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            try {
                                resolve(JSON.parse(xhr.responseText));
                            } catch (e) {
                                reject(new Error('Invalid response from server'));
                            }
                        } else {
                            try {
                                const errData = JSON.parse(xhr.responseText);
                                reject(new Error(errData.error || 'Upload failed'));
                            } catch (e) {
                                reject(new Error('Upload failed with status ' + xhr.status));
                            }
                        }
                    };
                    xhr.onerror = function() {
                        reject(new Error('Network error during upload'));
                    };
                    xhr.send(formData);
                });

                await uploadPromise;

                $('uploadMessage').textContent = '✅ submitted for review';
                $('uploadMessage').style.color = 'rgba(80,220,160,0.8)';
                $('uploadForm').reset();
                $('userPreviewImg').classList.remove('visible');
                $('imageInfo').textContent = 'no image selected';
                $('zipInfo').textContent = 'no file selected';
                $('zipFileSize').textContent = '';
                showToast('Game submitted for review!', 'success');
                loadStore();
            } catch (e) {
                let errorMsg = e.message;
                if (errorMsg && errorMsg.includes('SQLITE_TOOBIG')) {
                    errorMsg = 'File is too large for the database. Please compress your file or reduce its size.';
                }
                showToast('Upload failed: ' + errorMsg, 'error');
                $('uploadMessage').textContent = '❌ ' + errorMsg;
                $('uploadMessage').style.color = '#ff6b6b';
            } finally {
                isUploading = false;
                submitBtn.disabled = false;
                submitBtn.textContent = 'submit';
                setTimeout(() => {
                    progressContainer.classList.remove('active');
                    progressFill.style.width = '0%';
                    progressText.textContent = '0%';
                }, 300);
            }
        });

        document.querySelectorAll('.tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                const panelId = this.dataset.panel;
                if (this.disabled) { showToast('Please log in to upload', 'error'); return; }
                setAppPanel(panelId);
                if (panelId === 'panelStore') loadStore();
            });
        });

        $('showRegister').addEventListener('click', function() {
            if (!registrationEnabled) {
                showToast('Registration is currently disabled.', 'error');
                return;
            }
            $('loginForm').style.display = 'none';
            $('registerForm').style.display = 'block';
            $('loginStatus').textContent = '';
            $('registerStatus').textContent = '';
            $('loginBtnAction').disabled = false;
            $('loginPassword').disabled = false;
            $('loginPassword').placeholder = 'Enter your password';
        });
        $('showLogin').addEventListener('click', function() {
            $('loginForm').style.display = 'block';
            $('registerForm').style.display = 'none';
            $('loginStatus').textContent = '';
            $('registerStatus').textContent = '';
            $('loginBtnAction').disabled = false;
            $('loginPassword').disabled = false;
            $('loginPassword').placeholder = 'Enter your password';
        });

        document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
            e.preventDefault();
            openResetModal();
        });

        $('loginBtnAction').addEventListener('click', async function() {
            const username = $('loginUsername').value.trim();
            const password = $('loginPassword').value.trim();

            if (username === ADMIN_NAME) {
                if (password) {
                    sessionStorage.setItem('admin_login_password', password);
                }
                loginWithGitHub(password);
                return;
            }

            if (!username || !password) {
                $('loginStatus').textContent = 'Please fill in both fields';
                $('loginStatus').className = 'status-msg error';
                return;
            }

            try {
                await loginUser(username, password);
                $('loginStatus').textContent = 'Login successful!';
                $('loginStatus').className = 'status-msg success';
                switchView('app');
                updateUI();
                loadStore();
                if (currentUser && currentUser.display_name && currentUser.display_name !== username) {
                    showToast('Your display name is now "' + currentUser.display_name + '". You still log in with "' + username + '".', 'info');
                }
                showToast('Welcome back, ' + username + '!', 'success');
                await fetchMaxUploadSize();
                startMaxUploadPolling();
            } catch (e) {
                $('loginStatus').textContent = e.message || 'Invalid username or password';
                $('loginStatus').className = 'status-msg error';
            }
        });

        ['loginUsername', 'loginPassword'].forEach(id => {
            $(id).addEventListener('keydown', function(e) {
                if (e.key === 'Enter') $('loginBtnAction').click();
            });
        });

        $('browseStoreBtn').addEventListener('click', function() {
            currentUser = null;
            setToken(null);
            localStorage.removeItem('jgs_current_user');
            clearNotificationPolling();
            stopStorePolling();
            stopMaxUploadPolling();
            switchView('app');
            updateUI();
            loadStore();
            showToast('Browsing as guest', 'success');
        });

        $('registerBtnAction').addEventListener('click', async function() {
            const username = $('registerUsername').value.trim();
            const password = $('registerPassword').value.trim();
            const confirm = $('registerPasswordConfirm').value.trim();

            if (!username || !password || !confirm) {
                $('registerStatus').textContent = 'Please fill in all fields';
                $('registerStatus').className = 'status-msg error';
                return;
            }
            if (password !== confirm) {
                $('registerStatus').textContent = 'Passwords do not match';
                $('registerStatus').className = 'status-msg error';
                return;
            }
            if (username.toLowerCase() === ADMIN_NAME.toLowerCase()) {
                $('registerStatus').textContent = 'This username is reserved.';
                $('registerStatus').className = 'status-msg error';
                return;
            }
            try {
                const result = await registerUser(username, password);
                showRegistrationSuccess(result.resetKey);
                $('registerStatus').textContent = 'Account created!';
                $('registerStatus').className = 'status-msg success';
                setTimeout(() => {
                    $('registerForm').style.display = 'none';
                    $('loginForm').style.display = 'block';
                    $('loginUsername').value = username;
                    $('loginPassword').value = password;
                    $('registerStatus').textContent = '';
                    $('loginStatus').textContent = 'Account created! Please log in.';
                    $('loginStatus').className = 'status-msg success';
                }, 300);
            } catch (e) {
                $('registerStatus').textContent = e.message || 'Registration failed';
                $('registerStatus').className = 'status-msg error';
            }
        });

        let regSuccessKey = '';

        function showRegistrationSuccess(key) {
            regSuccessKey = key;
            document.getElementById('regSuccessKey').textContent = key;
            document.getElementById('registrationSuccessModal').classList.add('show');
        }

        function closeRegistrationSuccessModal() {
            document.getElementById('registrationSuccessModal').classList.remove('show');
        }

        function copyRegKey() {
            const key = regSuccessKey;
            if (key) {
                navigator.clipboard.writeText(key).then(() => {
                    document.getElementById('regSuccessStatus').textContent = '✅ Copied to clipboard!';
                    document.getElementById('regSuccessStatus').className = 'status-msg success';
                }).catch(() => {
                    const range = document.createRange();
                    const el = document.getElementById('regSuccessKey');
                    range.selectNode(el);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    document.getElementById('regSuccessStatus').textContent = '✅ Copied!';
                    document.getElementById('regSuccessStatus').className = 'status-msg success';
                });
            }
        }

        ['registerUsername', 'registerPassword', 'registerPasswordConfirm'].forEach(id => {
            $(id).addEventListener('keydown', function(e) {
                if (e.key === 'Enter') $('registerBtnAction').click();
            });
        });

        async function fetchRegistrationSetting() {
            try {
                const data = await apiFetch('/api/settings/registration');
                registrationEnabled = data.enabled;
                updateUI();
            } catch (e) { registrationEnabled = true; }
        }

        window.addEventListener('online', () => { showToast('Back online!', 'success'); });
        window.addEventListener('offline', () => { showToast('No internet connection', 'error'); });
        window.addEventListener('resize', handleOrientation);
        window.addEventListener('orientationchange', () => { setTimeout(handleOrientation, 300); });

        async function initApp() {
            await fetchRegistrationSetting();
            handleGitHubCallback();

            const restored = await restoreSession();
            if (restored) {
                if (currentUser && currentUser.is_admin) {
                    const token = localStorage.getItem('github_token');
                    if (token) githubToken = token;
                }
                switchView('app');
                updateUI();
                loadStore();
                startStorePolling();
                startMaxUploadPolling();
                await fetchMaxUploadSize();
                showToast('Welcome back, ' + (currentUser.display_name || currentUser.username) + '!', 'success');
            } else {
                switchView('login');
                $('loginPassword').disabled = false;
                $('loginPassword').placeholder = 'Enter your password';
                fetchMaxUploadSize();
                startMaxUploadPolling();
            }

            updateUI();
            initMusic();
            handleOrientation();
            $('loginBtnAction').disabled = false;
        }

        initApp();
        console.log('Joystick Go Store loaded. Admin: NYC0DEV');
        console.log('Click your username for Profile, Settings, My Uploads, and Notifications.');
        console.log('Registration can be disabled by admin.');
        console.log('Max upload size is configurable from admin panel (Settings tab).');
        console.log('Store auto-refreshes every 30s when on Store tab.');
        console.log('Notifications badge updates every 15s without page refresh.');
        console.log('Max upload size indicator updates automatically every 15s.');
        console.log('Reset key is hidden by default; click the eye to show/hide it.');
        console.log('Contact options are in the floating dropdown.');
        console.log('Click the notification badge to open the notifications center.');
    </script>
