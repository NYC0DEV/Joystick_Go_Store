    <div class="password-section">

    <!-- Tab panels (identical structure, but content generated by JS) -->
    <div id="tabSubmissions" class="tab-panel active">…</div>
    <div id="tabStore" class="tab-panel">…</div>
    <div id="tabUsers" class="tab-panel">…</div>
    <div id="tabRequests" class="tab-panel">…</div>
    <div id="tabMessages" class="tab-panel">…</div>

  <script>
    // ============================================================
    //  admin.js – Admin panel using D1 API
    // ============================================================

    const API_BASE = 'https://joystick-store-proxy.joystick-go-store.workers.dev';
    const ADMIN_NAME = 'NYC0DEV';

    // ─── Helpers ────────────────────────────────────────────────

    function getToken() {
      return localStorage.getItem('jgs_token');
    }

    function getAuthHeaders() {
      const token = getToken();
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    async function apiFetch(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const headers = {
        'Content-Type': 'application/json',
        ...getAuthHeaders(),
        ...(options.headers || {})
      };
      const resp = await fetch(url, { ...options, headers });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        throw new Error(data.error || `HTTP ${resp.status}`);
      }
      return data;
    }

    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + type + ' show';
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    function formatFileSize(bytes) {
      if (!bytes) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
      return (bytes/1048576).toFixed(1) + ' MB';
    }

    // ─── Auth guard ─────────────────────────────────────────────

    (async function authGuard() {
      try {
        const userData = await apiFetch('/api/user');
        if (!userData.user || !userData.user.is_admin) {
          window.location.replace('/');
        }
        // User is admin
        document.getElementById('adminUsername').textContent = userData.user.display_name || userData.user.username;
      } catch (e) {
        window.location.replace('/');
      }
    })();

    // ─── Load data from API ────────────────────────────────────

    let users = [], submissions = [], storeGames = [], nameRequests = [], contactMessages = [];
    let installPath = 'sd:\\bin\\Joystick_Go_Store\\games\\';
    let miscPath = 'sd:\\Games\\Misc\\';

    async function loadAdminData() {
      try {
        const [usersData, subsData, storeData, requestsData, msgsData] = await Promise.all([
          apiFetch('/api/admin/users'),
          apiFetch('/api/submissions'),
          apiFetch('/api/store'),
          apiFetch('/api/admin/name-requests'),
          apiFetch('/api/admin/contact')
        ]);
        users = usersData || [];
        submissions = subsData || [];
        storeGames = storeData || [];
        nameRequests = requestsData || [];
        contactMessages = msgsData || [];

        renderStats();
        renderSubmissions();
        renderStoreGames();
        renderUsers();
        renderRequests();
        renderMessages();
      } catch (e) {
        showToast('Error loading data: ' + e.message, 'error');
      }
    }

    function renderStats() {
      const pending = submissions.filter(s => s.status === 'pending').length;
      const pendingRequests = nameRequests.filter(r => r.status === 'pending').length;
      document.getElementById('statUsers').textContent = users.length;
      document.getElementById('statSubmissions').textContent = submissions.length;
      document.getElementById('statGames').textContent = storeGames.length;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statMessages').textContent = contactMessages.length;
      document.getElementById('statRequests').textContent = pendingRequests;
    }

    // ─── Submissions ────────────────────────────────────────────

    let submissionSearch = '';

    function renderSubmissions() {
      const container = document.getElementById('submissionList');
      let filtered = submissions;
      if (submissionSearch) {
        const q = submissionSearch.toLowerCase();
        filtered = filtered.filter(s =>
          (s.title && s.title.toLowerCase().includes(q)) ||
          (s.display_name && s.display_name.toLowerCase().includes(q)) ||
          (s.category && s.category.toLowerCase().includes(q))
        );
      }
      const pendingCount = filtered.filter(s => s.status === 'pending').length;
      document.getElementById('submissionCount').textContent = pendingCount + ' pending';

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No submissions</p></div>';
        return;
      }

      container.innerHTML = filtered.map(s => `
        <div class="item-card">
          <div class="info">
            <h4>
              ${s.title}
              <span class="badge-status ${s.status}">${s.status}</span>
              ${s.file_size ? `<span class="size-badge">${formatFileSize(s.file_size)}</span>` : ''}
            </h4>
            <p>by ${s.display_name || s.author_id} · ${s.category} · v${s.version} ${s.file_name ? '· 📎 ' + s.file_name : ''}</p>
            ${s.description ? `<p style="font-size:11px;color:rgba(255,255,255,0.25);">${s.description}</p>` : ''}
          </div>
          <div class="actions">
            <button class="btn-sm view" onclick="openSubmissionDetail(${s.id})">👁 View</button>
            ${s.status === 'pending' ? `
              <button class="btn-sm approve" onclick="approveSubmission(${s.id})">✓ Approve</button>
              <button class="btn-sm reject" onclick="rejectSubmission(${s.id})">✕ Reject</button>
            ` : ''}
            ${s.file_data ? `<button class="btn-sm download" onclick="downloadSubmissionFile(${s.id})">⬇ Download</button>` : ''}
            <button class="btn-sm delete" onclick="deleteSubmission(${s.id})">🗑 Delete</button>
          </div>
        </div>
      `).join('');
    }

    // ─── Submission actions ─────────────────────────────────────

    async function approveSubmission(id) {
      if (!confirm('Approve this submission?')) return;
      try {
        await apiFetch(`/api/submissions/${id}/approve`, { method: 'POST' });
        showToast('Approved and added to store!', 'success');
        await loadAdminData();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function rejectSubmission(id) {
      if (!confirm('Reject this submission?')) return;
      try {
        await apiFetch(`/api/submissions/${id}/reject`, { method: 'POST' });
        showToast('Rejected', 'error');
        await loadAdminData();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function deleteSubmission(id) {
      if (!confirm('Delete permanently?')) return;
      try {
        await apiFetch(`/api/submissions/${id}/delete`, { method: 'DELETE' });
        showToast('Deleted', 'error');
        await loadAdminData();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function downloadSubmissionFile(id) {
      try {
        const sub = submissions.find(s => s.id === id);
        if (!sub || !sub.file_data) { showToast('No file data', 'error'); return; }
        const binary = Uint8Array.from(atob(sub.file_data), c => c.charCodeAt(0));
        const blob = new Blob([binary], { type: 'application/zip' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = sub.file_name || 'submission.zip';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Downloaded', 'success');
      } catch (e) {
        showToast('Download error: ' + e.message, 'error');
      }
    }

    // ─── Store Games ────────────────────────────────────────────

    let storeSearch = '';
    let storeCategory = 'all';

    function renderStoreGames() {
      const container = document.getElementById('storeGameList');
      let filtered = storeGames;
      if (storeSearch) {
        const q = storeSearch.toLowerCase();
        filtered = filtered.filter(g =>
          g.title.toLowerCase().includes(q) ||
          (g.display_name && g.display_name.toLowerCase().includes(q)) ||
          g.category.toLowerCase().includes(q)
        );
      }
      if (storeCategory !== 'all') {
        filtered = filtered.filter(g => g.category === storeCategory);
      }
      document.getElementById('storeGameCount').textContent = filtered.length + ' total';

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🛒</div><p>No games in store</p></div>';
        return;
      }

      container.innerHTML = filtered.map(g => `
        <div class="item-card">
          <div class="info">
            <div class="checkbox-wrap">
              <input type="checkbox" class="store-select" data-id="${g.id}" />
              <div>
                <h4>
                  ${g.title}
                  <span class="badge-status approved">approved</span>
                  <span class="size-badge">${formatFileSize(g.file_size)}</span>
                </h4>
                <p>by <span style="color:${g.author_color || '#ffffff'};">${g.display_name || g.author_id}</span> · ${g.category} · v${g.version} · added ${g.approved_at ? new Date(g.approved_at).toLocaleDateString() : '—'}</p>
                ${g.image_data ? `<img src="${g.image_data}" style="max-width:60px;height:auto;border-radius:4px;margin-top:4px;" />` : ''}
                ${g.description ? `<p style="font-size:11px;color:rgba(255,255,255,0.25);">${g.description}</p>` : ''}
                <p style="font-size:10px;color:rgba(255,255,255,0.15);">Install: ${g.install_folder || '—'} · Misc: ${g.misc_folder || '—'}</p>
              </div>
            </div>
          </div>
          <div class="actions">
            <button class="btn-sm view" onclick="openEditGameModal(${g.id})">✎ Edit</button>
            ${g.file_data ? `<button class="btn-sm download" onclick="downloadStoreGame(${g.id})">⬇ Download</button>` : ''}
            <button class="btn-sm delete" onclick="deleteStoreGame(${g.id})">🗑 Delete</button>
          </div>
        </div>
      `).join('');

      // Re-bind select all, etc.
      // (omitted for brevity – similar to original)
    }

    // ─── Store game actions ────────────────────────────────────

    async function deleteStoreGame(id) {
      if (!confirm('Delete this game from store?')) return;
      try {
        await apiFetch(`/api/store/${id}`, { method: 'DELETE' });
        showToast('Deleted', 'error');
        await loadAdminData();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function downloadStoreGame(id) {
      try {
        const game = storeGames.find(g => g.id === id);
        if (!game || !game.file_data) { showToast('No file', 'error'); return; }
        const binary = Uint8Array.from(atob(game.file_data), c => c.charCodeAt(0));
        const blob = new Blob([binary], { type: 'application/zip' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = game.title + '.zip';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Downloaded', 'success');
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    // ─── Edit Game Modal ────────────────────────────────────────

    async function openEditGameModal(id) {
      // Fetch game details, populate modal, etc.
      // Similar to original but use API to update.
      const game = storeGames.find(g => g.id === id);
      if (!game) return;
      // ... render modal with current values
      // On save: call apiFetch(`/api/store/${id}`, { method: 'PUT', body: {...} })
      // Then reload data.
    }

    // ─── Users ──────────────────────────────────────────────────

    let userSearch = '';

    function renderUsers() {
      const container = document.getElementById('userList');
      let filtered = users;
      if (userSearch) {
        const q = userSearch.toLowerCase();
        filtered = filtered.filter(u =>
          u.username.toLowerCase().includes(q) ||
          (u.display_name && u.display_name.toLowerCase().includes(q))
        );
      }
      document.getElementById('userCount').textContent = filtered.length + ' total';
      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">👤</div><p>No users</p></div>';
        return;
      }
      container.innerHTML = filtered.map(u => {
        const isAdmin = u.is_admin;
        const banned = u.banned ? '🚫' : '✅';
        return `
          <div class="item-card">
            <div class="info">
              <h4>${u.display_name || u.username} ${isAdmin ? ' ⭐ <span style="font-weight:400;font-size:12px;color:rgba(255,255,255,0.3);">(admin)</span>' : ''} <span style="font-size:12px;color:${u.banned ? '#ff6b6b' : '#50dca0'};">${banned}</span></h4>
              <p>${u.username} · Reset Key: <span style="font-family:monospace;color:#b8b8ff;">${u.reset_key || 'N/A'}</span> · Created: ${u.created_at ? u.created_at.slice(0,10) : 'recently'}</p>
              ${u.banned ? `<p style="font-size:11px;color:#ff6b6b;">Banned: ${u.ban_reason || 'No reason'} ${u.ban_until ? 'until ' + new Date(u.ban_until).toLocaleString() : 'permanently'}</p>` : ''}
            </div>
            <div class="actions">
              ${!isAdmin ? `
                <button class="btn-sm view" onclick="openEditUserModal(${u.id})">✎ Edit</button>
                <button class="btn-sm reset-pwd" onclick="resetUserPassword(${u.id})">🔑 Reset Password</button>
                <button class="btn-sm delete" onclick="deleteUser(${u.id})">🗑 Delete</button>
              ` : `<span style="font-size:12px;color:rgba(255,255,255,0.15);">🔒 protected</span>`}
            </div>
          </div>
        `;
      }).join('');
    }

    // ─── User actions ───────────────────────────────────────────

    async function resetUserPassword(id) {
      if (!confirm('Reset password for this user?')) return;
      try {
        const data = await apiFetch(`/api/admin/users/${id}/reset-password`, { method: 'POST' });
        showToast(`New password: ${data.newPassword}`, 'success');
        await loadAdminData();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function deleteUser(id) {
      if (!confirm('Delete user permanently?')) return;
      try {
        await apiFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
        showToast('User deleted', 'error');
        await loadAdminData();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    // ─── Name Requests ──────────────────────────────────────────

    function renderRequests() {
      const container = document.getElementById('requestList');
      const pending = nameRequests.filter(r => r.status === 'pending');
      document.getElementById('requestCount').textContent = pending.length + ' pending';
      if (!pending.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📩</div><p>No pending requests</p></div>';
        return;
      }
      container.innerHTML = pending.map(r => `
        <div class="item-card">
          <div class="info">
            <h4>${r.requested_name}</h4>
            <p>From: ${r.current_name} (ID: ${r.user_id}) · ${new Date(r.created_at).toLocaleString()}</p>
          </div>
          <div class="actions">
            <button class="btn-sm approve" onclick="approveNameRequest(${r.id})">✓ Approve</button>
            <button class="btn-sm reject" onclick="rejectNameRequest(${r.id})">✕ Reject</button>
          </div>
        </div>
      `).join('');
    }

    async function approveNameRequest(id) {
      try {
        await apiFetch(`/api/admin/name-requests/${id}/approve`, { method: 'POST' });
        showToast('Name changed', 'success');
        await loadAdminData();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function rejectNameRequest(id) {
      try {
        await apiFetch(`/api/admin/name-requests/${id}/reject`, { method: 'POST' });
        showToast('Rejected', 'error');
        await loadAdminData();
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    // ─── Messages ──────────────────────────────────────────────

    function renderMessages() {
      const container = document.getElementById('messageList');
      document.getElementById('messageCount').textContent = contactMessages.length + ' total';
      if (!contactMessages.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>No messages</p></div>';
        return;
      }
      const sorted = [...contactMessages].reverse();
      container.innerHTML = sorted.map(m => `
        <div class="item-card">
          <div class="info">
            <h4>
              ${m.display_name || m.user_id}
              <span class="badge-status ${m.status}">${m.status}</span>
            </h4>
            <p>${new Date(m.created_at).toLocaleString()}</p>
            <div class="message-text">${m.message}</div>
          </div>
          <div class="actions">
            ${m.status === 'unread' ? `<button class="btn-sm read" onclick="markMessageRead(${m.id})">✓ Mark read</button>` : ''}
            <button class="btn-sm delete" onclick="deleteMessage(${m.id})">🗑 Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function markMessageRead(id) {
      try {
        await apiFetch(`/api/admin/contact/${id}/read`, { method: 'POST' });
        await loadAdminData();
        showToast('Marked read', 'success');
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function deleteMessage(id) {
      if (!confirm('Delete message?')) return;
      try {
        await apiFetch(`/api/admin/contact/${id}/delete`, { method: 'DELETE' });
        await loadAdminData();
        showToast('Deleted', 'error');
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    // ─── Broadcast ─────────────────────────────────────────────

    async function sendBroadcast() {
      const msg = document.getElementById('broadcastMessage').value.trim();
      if (!msg) { showToast('Enter a message', 'error'); return; }
      if (!confirm(`Send "${msg}" to all users?`)) return;
      try {
        await apiFetch('/api/admin/broadcast', {
          method: 'POST',
          body: JSON.stringify({ message: msg })
        });
        showToast('Broadcast sent', 'success');
        document.getElementById('broadcastMessage').value = '';
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    // ─── Registration toggle ────────────────────────────────────

    async function saveRegistrationSetting() {
      const enabled = document.getElementById('registrationToggle').checked;
      try {
        await apiFetch('/api/settings/registration', {
          method: 'PUT',
          body: JSON.stringify({ enabled })
        });
        showToast(`Registration ${enabled ? 'enabled' : 'disabled'}`, 'success');
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    // ─── Paths (still stored in localStorage for now, but can be moved to DB) ──

    function savePaths() {
      const ip = document.getElementById('installPath').value.trim();
      const mp = document.getElementById('miscPath').value.trim();
      if (ip) localStorage.setItem('jgs_installPath', ip);
      if (mp) localStorage.setItem('jgs_miscPath', mp);
      document.getElementById('pathStatus').textContent = '✅ Paths saved!';
      setTimeout(() => document.getElementById('pathStatus').textContent = '', 3000);
      showToast('Paths saved', 'success');
    }

    // ─── Admin password (via API) ──────────────────────────────

    async function setAdminPassword() {
      // Use the /api/user/password endpoint with admin user
      const current = document.getElementById('adminCurrentPwd').value.trim();
      const newPwd = document.getElementById('adminNewPwd').value.trim();
      const confirm = document.getElementById('adminNewPwdConfirm').value.trim();
      if (!newPwd || newPwd.length < 3) {
        document.getElementById('adminPwdStatus').textContent = 'New password at least 3 chars';
        return;
      }
      if (newPwd !== confirm) {
        document.getElementById('adminPwdStatus').textContent = 'Passwords do not match';
        return;
      }
      try {
        await apiFetch('/api/user/password', {
          method: 'PUT',
          body: JSON.stringify({ currentPassword: current, newPassword: newPwd })
        });
        document.getElementById('adminPwdStatus').textContent = '✅ Password updated!';
        document.getElementById('adminPwdStatus').style.color = '#50dca0';
        showToast('Admin password updated', 'success');
      } catch (e) {
        document.getElementById('adminPwdStatus').textContent = 'Error: ' + e.message;
        document.getElementById('adminPwdStatus').style.color = '#ff6b6b';
      }
    }

    // ─── Tabs ────────────────────────────────────────────────────

    document.querySelectorAll('.admin-tabs button').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.admin-tabs button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        const panel = document.getElementById(this.dataset.tab);
        if (panel) panel.classList.add('active');
        // Re-render active tab
        const tab = this.dataset.tab;
        if (tab === 'tabSubmissions') renderSubmissions();
        if (tab === 'tabStore') renderStoreGames();
        if (tab === 'tabUsers') renderUsers();
        if (tab === 'tabRequests') renderRequests();
        if (tab === 'tabMessages') renderMessages();
      });
    });

    // ─── Event bindings ─────────────────────────────────────────

    document.getElementById('adminSetPasswordBtn').addEventListener('click', setAdminPassword);
    document.getElementById('adminRemovePasswordBtn').addEventListener('click', async function() {
      // Remove password – not supported via API, but we can set empty? We'll skip.
      showToast('Password removal not supported via API', 'error');
    });

    document.getElementById('broadcastButton')?.addEventListener('click', sendBroadcast);
    document.getElementById('saveRegSettingBtn')?.addEventListener('click', saveRegistrationSetting);

    // ─── Init ────────────────────────────────────────────────────

    loadAdminData();
    console.log('Admin panel (API v2) loaded.');
  </script>
</body>
</html>
