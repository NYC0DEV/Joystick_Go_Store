<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0b0b18;
            color: #e0e0ee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(18, 18, 40, 0.95);
            border-radius: 24px;
            padding: 32px;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; color: #f0f0ff; }
        .sub { font-size: 13px; color: rgba(255,255,255,0.3); margin-bottom: 24px; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
        input {
            width: 100%; padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            color: #eee; font-size: 15px;
            outline: none; transition: 0.2s;
        }
        input:focus { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }
        button {
            width: 100%; padding: 13px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            color: #eee; font-size: 15px; font-weight: 500;
            cursor: pointer; transition: 0.2s; font-family: inherit;
            margin-top: 4px;
        }
        button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-secondary {
            background: rgba(255,255,255,0.02);
            border-color: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.5);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); }
        .status {
            margin-top: 12px;
            font-size: 14px;
            min-height: 24px;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            word-break: break-word;
        }
        .status.error { color: #ff6b6b; background: rgba(255,70,70,0.05); }
        .status.success { color: #50dca0; background: rgba(80,220,160,0.05); }
        .status.info { color: #8c7eff; background: rgba(140,126,255,0.05); }
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 16px 0; color: rgba(255,255,255,0.08);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05);
        }
        .toggle-link {
            text-align: center; margin-top: 12px;
            font-size: 13px; color: rgba(255,255,255,0.3);
        }
        .toggle-link span {
            color: #b8b8ff; cursor: pointer; transition: 0.2s;
        }
        .toggle-link span:hover { color: #d0d0ff; }
        .debug {
            margin-top: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            font-family: monospace;
            color: rgba(255,255,255,0.2);
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .api-url {
            margin-bottom: 12px;
        }
        .api-url input {
            padding: 6px 10px;
            font-size: 12px;
            font-family: monospace;
            color: #8c7eff;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🔐 Login Test</h1>
    <div class="sub">Test your D1 API</div>

    <!-- API URL -->
    <div class="api-url">
        <label>API URL</label>
        <input type="text" id="apiUrl" value="https://joystick-store-proxy.joystick-go-store.workers.dev" />
    </div>

    <!-- Login Form -->
    <div id="loginForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Enter username" value="NYC0DEV" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password" value="admin123" />
        </div>
        <button id="loginBtn">Log In</button>
        <div id="loginStatus" class="status"></div>
        <div class="divider">or</div>
        <button id="showRegisterBtn" class="btn-secondary">Create Account</button>
    </div>

    <!-- Register Form (hidden by default) -->
    <div id="registerForm" style="display: none;">
        <div class="form-group">
            <label>Username (2-20 chars, letters/numbers)</label>
            <input type="text" id="registerUsername" placeholder="Choose a username" />
        </div>
        <div class="form-group">
            <label>Password (min 3 chars)</label>
            <input type="password" id="registerPassword" placeholder="Choose a password" />
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="registerPasswordConfirm" placeholder="Confirm password" />
        </div>
        <button id="registerBtn">Create Account</button>
        <div id="registerStatus" class="status"></div>
        <div class="toggle-link">
            Already have an account? <span id="showLoginBtn">Log in</span>
        </div>
    </div>

    <!-- Debug log -->
    <div class="debug" id="debugLog">Ready. Click "Test Connection" below first.</div>
    <div style="margin-top: 8px; display: flex; gap: 8px;">
        <button id="testBtn" style="flex:1; padding: 6px; font-size: 12px;" class="btn-secondary">🌐 Test Connection</button>
        <button id="clearTokenBtn" style="flex:1; padding: 6px; font-size: 12px;" class="btn-secondary">🗑 Clear Token</button>
        <button id="checkTokenBtn" style="flex:1; padding: 6px; font-size: 12px;" class="btn-secondary">🔍 Check Token</button>
    </div>
</div>

<script>
    // ─── Get API URL ──────────────────────────────────────────────
    function getApiBase() {
        let url = document.getElementById('apiUrl').value.trim();
        if (!url) return 'https://joystick-store-proxy.joystick-go-store.workers.dev';
        return url.replace(/\/$/, '');
    }

    // ─── Debug log ────────────────────────────────────────────────
    function debug(msg) {
        const el = document.getElementById('debugLog');
        el.textContent = '> ' + msg + '\n' + el.textContent;
        if (el.textContent.length > 2000) {
            el.textContent = el.textContent.slice(0, 1500) + '\n... (truncated)';
        }
    }

    function setStatus(el, msg, type = '') {
        el.textContent = msg;
        el.className = 'status ' + type;
    }

    // ─── Token helpers ────────────────────────────────────────────
    function getToken() { return localStorage.getItem('jgs_token'); }
    function setToken(token) { token ? localStorage.setItem('jgs_token', token) : localStorage.removeItem('jgs_token'); }

    // ─── API call ─────────────────────────────────────────────────
    async function apiCall(endpoint, method = 'GET', body = null) {
        const url = getApiBase() + endpoint;
        const options = {
            method: method,
            headers: { 'Content-Type': 'application/json' }
        };
        // Add token if we have one
        const token = getToken();
        if (token) {
            options.headers['Authorization'] = 'Bearer ' + token;
        }
        if (body) {
            options.body = JSON.stringify(body);
        }
        debug('→ ' + method + ' ' + endpoint);
        const resp = await fetch(url, options);
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
            throw new Error(data.error || `HTTP ${resp.status}: ${resp.statusText}`);
        }
        return data;
    }

    // ─── Test Connection ──────────────────────────────────────────
    async function testConnection() {
        const statusEl = document.getElementById('loginStatus');
        setStatus(statusEl, '⏳ Testing connection...', 'info');
        debug('Testing connection to: ' + getApiBase());
        try {
            const data = await apiCall('/api/store');
            const count = Array.isArray(data) ? data.length : 0;
            setStatus(statusEl, '✅ API is reachable! Store has ' + count + ' games.', 'success');
            debug('✓ Connection OK. Store count: ' + count);
        } catch (err) {
            setStatus(statusEl, '❌ API Error: ' + err.message, 'error');
            debug('✗ Connection failed: ' + err.message);
        }
    }

    // ─── Login ────────────────────────────────────────────────────
    async function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const statusEl = document.getElementById('loginStatus');

        if (!username || !password) {
            setStatus(statusEl, 'Please enter username and password.', 'error');
            return;
        }

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        setStatus(statusEl, '⏳ Logging in...', 'info');
        debug('Logging in as: ' + username);

        try {
            const data = await apiCall('/api/login', 'POST', { username, password });
            setToken(data.token);
            const user = data.user;
            setStatus(statusEl, '✅ Welcome ' + (user.display_name || user.username) + '!', 'success');
            debug('✓ Login successful! Token: ' + data.token.slice(0, 20) + '…');
            debug('✓ User: ' + JSON.stringify(user, null, 2));
        } catch (err) {
            setStatus(statusEl, '❌ ' + err.message, 'error');
            debug('✗ Login failed: ' + err.message);
        } finally {
            btn.disabled = false;
        }
    }

    // ─── Register ─────────────────────────────────────────────────
    async function doRegister() {
        const username = document.getElementById('registerUsername').value.trim();
        const password = document.getElementById('registerPassword').value.trim();
        const confirm = document.getElementById('registerPasswordConfirm').value.trim();
        const statusEl = document.getElementById('registerStatus');

        if (!username || !password || !confirm) {
            setStatus(statusEl, 'Please fill in all fields.', 'error');
            return;
        }
        if (password !== confirm) {
            setStatus(statusEl, 'Passwords do not match.', 'error');
            return;
        }
        if (username.length < 2 || username.length > 20) {
            setStatus(statusEl, 'Username must be 2-20 characters.', 'error');
            return;
        }
        if (!/^[a-zA-Z0-9]+$/.test(username)) {
            setStatus(statusEl, 'Username: letters and numbers only.', 'error');
            return;
        }
        if (password.length < 3) {
            setStatus(statusEl, 'Password must be at least 3 characters.', 'error');
            return;
        }

        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        setStatus(statusEl, '⏳ Creating account...', 'info');
        debug('Registering: ' + username);

        try {
            const data = await apiCall('/api/register', 'POST', { username, password });
            setStatus(statusEl, '✅ Account created! Reset Key: ' + data.resetKey, 'success');
            debug('✓ Registration successful! Reset Key: ' + data.resetKey);
            // Auto-fill login form
            document.getElementById('loginUsername').value = username;
            document.getElementById('loginPassword').value = password;
            // Switch to login
            showLoginForm();
            document.getElementById('loginStatus').textContent = 'Account created! Please log in.';
            document.getElementById('loginStatus').className = 'status success';
        } catch (err) {
            setStatus(statusEl, '❌ ' + err.message, 'error');
            debug('✗ Registration failed: ' + err.message);
        } finally {
            btn.disabled = false;
        }
    }

    // ─── Check Token ──────────────────────────────────────────────
    async function checkToken() {
        const token = getToken();
        const statusEl = document.getElementById('loginStatus');
        if (!token) {
            setStatus(statusEl, 'No token found. Please log in first.', 'error');
            debug('No token in localStorage.');
            return;
        }
        setStatus(statusEl, '⏳ Checking token...', 'info');
        debug('Checking token: ' + token.slice(0, 20) + '…');
        try {
            const data = await apiCall('/api/user');
            setStatus(statusEl, '✅ Token valid! User: ' + data.user.display_name, 'success');
            debug('✓ Token valid. User: ' + JSON.stringify(data.user, null, 2));
        } catch (err) {
            setStatus(statusEl, '❌ Token invalid: ' + err.message, 'error');
            debug('✗ Token invalid: ' + err.message);
            localStorage.removeItem('jgs_token');
        }
    }

    // ─── UI Toggle ─────────────────────────────────────────────────
    function showRegisterForm() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('loginStatus').textContent = '';
        document.getElementById('registerStatus').textContent = '';
    }

    function showLoginForm() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginStatus').textContent = '';
        document.getElementById('registerStatus').textContent = '';
    }

    // ─── Clear Token ──────────────────────────────────────────────
    function clearToken() {
        setToken(null);
        const statusEl = document.getElementById('loginStatus');
        setStatus(statusEl, 'Token cleared.', 'info');
        debug('Token removed from localStorage.');
    }

    // ─── Enter key support ────────────────────────────────────────
    document.getElementById('loginUsername').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('loginPassword').focus();
    });
    document.getElementById('loginPassword').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });
    document.getElementById('registerUsername').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('registerPassword').focus();
    });
    document.getElementById('registerPassword').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('registerPasswordConfirm').focus();
    });
    document.getElementById('registerPasswordConfirm').addEventListener('keydown', e => {
        if (e.key === 'Enter') doRegister();
    });

    // ─── Event Bindings ────────────────────────────────────────────
    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('registerBtn').addEventListener('click', doRegister);
    document.getElementById('showRegisterBtn').addEventListener('click', showRegisterForm);
    document.getElementById('showLoginBtn').addEventListener('click', showLoginForm);
    document.getElementById('testBtn').addEventListener('click', testConnection);
    document.getElementById('clearTokenBtn').addEventListener('click', clearToken);
    document.getElementById('checkTokenBtn').addEventListener('click', checkToken);

    // ─── Init ──────────────────────────────────────────────────────
    debug('Page loaded. API: ' + getApiBase());
    const token = getToken();
    if (token) {
        debug('Found token: ' + token.slice(0, 20) + '…');
        // Auto-check token on load
        checkToken();
    } else {
        debug('No token found.');
    }
    debug('Click "Test Connection" first to verify the API is reachable.');
</script>

</body>
</html>
