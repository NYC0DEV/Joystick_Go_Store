<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joystick Go Store</title>
    <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/oa/3706422?s=240&u=fd57d24ce5ca6e9c346d9bebaaa54653601a5003&v=4">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d1a;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            line-height: 1.6;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a0a1a 50%, #0a0a2a 100%);
        }
        .container {
            max-width: 720px;
            width: 100%;
            background: rgba(22, 22, 46, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 44px 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }
        /* Gradient Glow Effect */
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 105, 180, 0.08), rgba(100, 150, 255, 0.08), transparent);
            animation: rotateGlow 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .container > * {
            position: relative;
            z-index: 1;
        }

        .header { text-align: center; margin-bottom: 32px; }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 14px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(255, 105, 180, 0.15);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ff6b9d, #ff9a9e, #a8c0ff, #6b9dff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease-in-out infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-top: 4px;
            font-weight: 400;
        }

        .login-bar {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
        }
        .login-bar .user {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 400;
        }
        .login-bar .user strong {
            color: #ff9a9e;
            font-weight: 600;
        }
        .login-bar button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.8);
            padding: 6px 18px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .login-bar button:hover {
            background: rgba(255, 105, 180, 0.15);
            border-color: rgba(255, 105, 180, 0.3);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.05);
        }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: #eee;
            font-size: 14px;
            transition: all 0.25s ease;
            font-family: inherit;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: rgba(255, 105, 180, 0.3);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.04);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group select option { background: #16162e; }

        .drop-zone {
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.02);
        }
        .drop-zone:hover {
            border-color: rgba(255, 105, 180, 0.25);
            background: rgba(255, 255, 255, 0.04);
        }
        .drop-zone.dragover {
            border-color: rgba(100, 150, 255, 0.4);
            background: rgba(100, 150, 255, 0.04);
        }
        .drop-zone .icon { font-size: 32px; margin-bottom: 6px; opacity: 0.5; }
        .drop-zone .main-text { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.6); }
        .drop-zone .sub-text { font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 2px; }

        .file-info { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 8px; display: none; }
        .file-info.visible { display: block; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b9d, #a8c0ff);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 6px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px rgba(255, 105, 180, 0.15);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.25);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            padding: 14px 18px;
            border-radius: 12px;
            margin-top: 16px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        .message.success {
            display: block;
            background: rgba(136, 255, 176, 0.06);
            border: 1px solid rgba(136, 255, 176, 0.15);
            color: #88ffb0;
        }
        .message.error {
            display: block;
            background: rgba(255, 85, 102, 0.06);
            border: 1px solid rgba(255, 85, 102, 0.15);
            color: #ff5566;
        }

        .guidelines {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 18px 22px;
            margin-top: 22px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .guidelines h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 6px;
        }
        .guidelines ul {
            list-style: none;
            padding: 0;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
        }
        .guidelines ul li::before { content: "✓ "; color: #ff9a9e; }
        .guidelines ul li { padding: 2px 0; }

        .hidden { display: none !important; }
        @media (max-width: 600px) {
            .container { padding: 28px 20px; }
            .header h1 { font-size: 24px; }
            .login-bar { flex-wrap: wrap; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <img src="https://avatars.githubusercontent.com/oa/3706422?s=240&u=fd57d24ce5ca6e9c346d9bebaaa54653601a5003&v=4" alt="Logo" class="logo">
            <h1>Joystick Go Store</h1>
            <p>Submit your game or app to the community</p>
        </div>

        <div class="login-bar" id="loginBar">
            <span class="user" id="userDisplay">👤 Not logged in</span>
            <button id="loginBtn">Login with GitHub</button>
        </div>

        <form id="uploadForm" class="hidden">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="title" placeholder="e.g. Super Adventure" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="What does your app do?" required></textarea>
            </div>
            <div class="form-group">
                <label>Author</label>
                <input type="text" id="author" placeholder="Your name or handle" required>
            </div>
            <div class="form-group">
                <label>Version</label>
                <input type="text" id="version" placeholder="1.0" value="1.0">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="category" required>
                    <option value="game">🎯 Game</option>
                    <option value="emulator">🕹️ Emulator</option>
                    <option value="tool">🔧 Tool</option>
                </select>
            </div>
            <div class="form-group">
                <label>File (.zip)</label>
                <div class="drop-zone" id="dropZone">
                    <div class="icon">📁</div>
                    <div class="main-text">Drop your .zip here</div>
                    <div class="sub-text">or click to browse</div>
                    <input type="file" id="fileInput" accept=".zip" style="display:none;" required>
                </div>
                <div class="file-info" id="fileInfo">📎 <span id="fileName">No file selected</span></div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">🚀 Submit</button>
        </form>

        <div class="message" id="message"></div>

        <div class="guidelines">
            <h3>📋 Guidelines</h3>
            <ul>
                <li>Submit as .zip</li>
                <li>Include a README inside</li>
                <li>No copyrighted content without permission</li>
                <li>All submissions are reviewed before going live</li>
            </ul>
        </div>

    </div>

    <script>
        // ── PUBLIC CONFIGURATION ──
        const CLIENT_ID = 'Ov23livK161kkVTHh12J';
        const PROXY_URL = 'https://joystick-store-proxy.joystick-go-store.workers.dev';
        const REDIRECT = 'https://joystick-go-store.pages.dev/';

        let user = null;
        let token = null;

        const userDisplay = document.getElementById('userDisplay');
        const loginBtn = document.getElementById('loginBtn');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('message');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
            messageBox.style.display = 'block';
            clearTimeout(messageBox._timer);
            messageBox._timer = setTimeout(() => { messageBox.style.display = 'none'; }, 8000);
        }

        function updateUI() {
            if (user) {
                userDisplay.innerHTML = '👤 Logged in as <strong>' + user.login + '</strong>';
                loginBtn.textContent = 'Logout';
                loginBtn.onclick = logout;
                uploadForm.classList.remove('hidden');
            } else {
                userDisplay.textContent = '👤 Not logged in';
                loginBtn.textContent = 'Login with GitHub';
                loginBtn.onclick = loginWithGitHub;
                uploadForm.classList.add('hidden');
            }
        }

        function loginWithGitHub() {
            const url = 'https://github.com/login/oauth/authorize' +
                '?client_id=' + CLIENT_ID +
                '&redirect_uri=' + REDIRECT +
                '&scope=repo';
            window.location.href = url;
        }

        function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (!code) return;

            fetch(PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            })
            .then(r => r.json())
            .then(data => {
                if (!data.token) throw new Error('No token from proxy');
                token = data.token;
                return fetch('https://api.github.com/user', {
                    headers: { 'Authorization': 'token ' + token }
                });
            })
            .then(r => r.json())
            .then(u => {
                user = u;
                localStorage.setItem('github_user', JSON.stringify(u));
                localStorage.setItem('github_token', token);
                updateUI();
                window.history.replaceState({}, '', window.location.pathname);
            })
            .catch(err => {
                showMessage('Login failed: ' + err.message, 'error');
            });
        }

        function logout() {
            localStorage.removeItem('github_user');
            localStorage.removeItem('github_token');
            user = null;
            token = null;
            updateUI();
        }

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileLabel();
            }
        });
        fileInput.addEventListener('change', updateFileLabel);

        function updateFileLabel() {
            if (fileInput.files.length) {
                const f = fileInput.files[0];
                fileName.textContent = f.name + ' (' + (f.size / 1024 / 1024).toFixed(2) + ' MB)';
                fileInfo.classList.add('visible');
            } else {
                fileName.textContent = 'No file selected';
                fileInfo.classList.remove('visible');
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const author = document.getElementById('author').value.trim();
            const version = document.getElementById('version').value.trim() || '1.0';
            const category = document.getElementById('category').value;
            const file = fileInput.files[0];

            if (!file) {
                showMessage('Please select a .zip file', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Submitting...';

            try {
                const reader = new FileReader();
                const b64 = await new Promise((resolve) => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });

                const uploadUrl = 'https://api.github.com/repos/nyc0dev/Joystick_Go_Store/contents/uploads/' + encodeURIComponent(file.name);
                const uploadRes = await fetch(uploadUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Upload: ' + title,
                        content: b64,
                        branch: 'main'
                    })
                });

                if (!uploadRes.ok) throw new Error('Upload failed');

                const issueBody =
                    '## 🎮 New Submission\n\n' +
                    '**Title:** ' + title + '\n' +
                    '**Author:** ' + author + '\n' +
                    '**Version:** ' + version + '\n' +
                    '**Category:** ' + category + '\n' +
                    '**Submitted by:** @' + user.login + '\n\n' +
                    '**Description:**\n' + description + '\n\n' +
                    '**File:** [download](https://github.com/nyc0dev/Joystick_Go_Store/blob/main/uploads/' + encodeURIComponent(file.name) + ')';

                const issueRes = await fetch('https://api.github.com/repos/nyc0dev/Joystick_Go_Store/issues', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: 'Submission: ' + title,
                        body: issueBody,
                        labels: ['game-submission', 'pending-review']
                    })
                });

                if (!issueRes.ok) throw new Error('Failed to create issue');

                showMessage('✅ Submitted! You\'ll get a notification when approved.', 'success');
                document.getElementById('uploadForm').reset();
                fileInfo.classList.remove('visible');
                fileName.textContent = 'No file selected';

            } catch (err) {
                showMessage('❌ Error: ' + err.message, 'error');
            }

            submitBtn.disabled = false;
            submitBtn.textContent = '🚀 Submit';
        });

        const savedUser = localStorage.getItem('github_user');
        const savedToken = localStorage.getItem('github_token');
        if (savedUser && savedToken) {
            user = JSON.parse(savedUser);
            token = savedToken;
        }

        handleCallback();
        updateUI();
    </script>
</body>
</html>
