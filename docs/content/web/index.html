<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joystick Go Store</title>
  <style>
    /* ─── Full CSS (same as your original, omitted for brevity) ─── */
    /* Use your existing styles – they remain unchanged */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Roboto,sans-serif; background:#0b0b18; color:#e0e0ee; min-height:100vh; overflow:hidden; }
    /* ... all styles as before ... */
  </style>
</head>
<body>
  <!-- ─── Same HTML structure as before ─── -->
  <div id="app">
    <div id="viewLogin" class="view active"> ... </div>
    <div id="viewApp" class="view"> ... </div>
  </div>

  <script>
    // ─── CONFIG ──────────────────────────────────────────────────────────────
    const API_BASE = 'https://joystick-store-proxy.joystick-go-store.workers.dev';
    const ADMIN_NAME = 'NYC0DEV';
    const GITHUB_CLIENT_ID = 'Ov23limVqQtNIyPGAZtr';
    const REDIRECT_URI = 'https://joystick-go-store.pages.dev/';

    // ─── HELPERS ────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    let currentUser = null;
    let storeGames = [];
    let registrationEnabled = true;

    function showToast(msg, type = 'success') { /* ... */ }
    function formatFileSize(bytes) { /* ... */ }

    // ─── API HELPERS ──────────────────────────────────────────────────────
    function getToken() { return localStorage.getItem('jgs_token'); }

    function setToken(token) { if (token) localStorage.setItem('jgs_token', token); else localStorage.removeItem('jgs_token'); }

    function getAuthHeaders() {
      const token = getToken();
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    async function apiFetch(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const headers = {
        'Content-Type': 'application/json',
        ...getAuthHeaders(),
        ...(options.headers || {})
      };
      const resp = await fetch(url, { ...options, headers });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
      return data;
    }

    // ─── AUTH ──────────────────────────────────────────────────────────────
    async function loginUser(username, password) {
      const data = await apiFetch('/api/login', {
        method: 'POST',
        body: JSON.stringify({ username, password })
      });
      setToken(data.token);
      currentUser = data.user;
      localStorage.setItem('jgs_user', JSON.stringify(currentUser));
    }

    async function registerUser(username, password) {
      const data = await apiFetch('/api/register', {
        method: 'POST',
        body: JSON.stringify({ username, password })
      });
      return data;
    }

    function logoutUser() {
      apiFetch('/api/logout', { method: 'POST' }).catch(() => {});
      setToken(null);
      localStorage.removeItem('jgs_user');
      currentUser = null;
      showToast('Logged out', 'success');
      updateUI();
      switchView('login');
    }

    async function restoreSession() {
      const token = getToken();
      if (!token) return false;
      try {
        const data = await apiFetch('/api/user');
        currentUser = data.user;
        localStorage.setItem('jgs_user', JSON.stringify(currentUser));
        return true;
      } catch {
        setToken(null);
        localStorage.removeItem('jgs_user');
        return false;
      }
    }

    // ─── GITHUB OAUTH ────────────────────────────────────────────────────
    function loginWithGitHub() {
      const url = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=read:user`;
      window.location.href = url;
    }

    async function handleGitHubCallback() {
      const code = new URLSearchParams(window.location.search).get('code');
      if (!code) return;
      try {
        const data = await apiFetch('/api/auth/github', {
          method: 'POST',
          body: JSON.stringify({ code })
        });
        setToken(data.token);
        currentUser = data.user;
        localStorage.setItem('jgs_user', JSON.stringify(currentUser));
        window.history.replaceState({}, '', window.location.pathname);
        showToast('Admin login successful!', 'success');
        switchView('app');
        updateUI();
        loadStore();
      } catch (err) {
        showToast('GitHub login failed: ' + err.message, 'error');
      }
    }

    // ─── UI FUNCTIONS ──────────────────────────────────────────────────
    function switchView(view) {
      const loginView = $('viewLogin');
      const appView = $('viewApp');
      if (view === 'login') {
        loginView.classList.add('active');
        appView.classList.remove('active');
      } else {
        loginView.classList.remove('active');
        appView.classList.add('active');
        if (currentUser) { updateUI(); loadStore(); }
      }
    }

    function updateUI() {
      const isLoggedIn = !!currentUser;
      const isAdmin = currentUser && currentUser.is_admin;

      const nameDisplay = $('userNameDisplay');
      const avatar = $('userAvatar');
      const dropdownName = $('dropdownUserName');
      const dropdownStatus = $('dropdownUserStatus');

      if (isLoggedIn) {
        const color = currentUser.username_color || '#ffffff';
        nameDisplay.textContent = currentUser.display_name || currentUser.username;
        nameDisplay.style.color = color;
        avatar.textContent = (currentUser.display_name || currentUser.username).charAt(0).toUpperCase();
        dropdownName.textContent = currentUser.display_name || currentUser.username;
        dropdownName.style.color = color;
        dropdownStatus.textContent = 'Logged in' + (isAdmin ? ' · Admin' : '');
        fetchNotificationCount();
      } else {
        nameDisplay.textContent = 'Guest';
        nameDisplay.style.color = 'rgba(255,255,255,0.7)';
        avatar.textContent = '👤';
        dropdownName.textContent = 'Guest';
        dropdownName.style.color = 'rgba(255,255,255,0.7)';
        dropdownStatus.textContent = 'Not logged in';
        $('notifBadge').style.display = 'none';
      }

      // Registration disabled message
      const regMsg = $('registrationDisabledMsg');
      const regLink = $('registerToggleLink');
      if (!registrationEnabled) {
        regMsg.style.display = 'block';
        regLink.style.display = 'none';
      } else {
        regMsg.style.display = 'none';
        regLink.style.display = 'block';
      }

      const adminLink = $('adminLinkBtn');
      if (isAdmin) adminLink.classList.add('show');
      else adminLink.classList.remove('show');

      const contactBtn = $('contactFloating');
      if (isLoggedIn) contactBtn.classList.add('show');
      else contactBtn.classList.remove('show');

      // Upload tab
      const uploadTab = $('uploadTabBtn');
      const uploadElements = document.querySelectorAll('#uploadForm input, #uploadForm select, #uploadForm textarea, #submitBtn');
      const dropZones = document.querySelectorAll('#uploadForm .drop-zone');
      if (isLoggedIn) {
        uploadTab.disabled = false;
        uploadTab.style.opacity = '1';
        uploadTab.style.cursor = 'pointer';
        uploadElements.forEach(el => el.disabled = false);
        dropZones.forEach(el => el.classList.remove('disabled'));
        $('uploadSubtext').textContent = 'fill in the details and drop your .zip';
      } else {
        uploadTab.disabled = true;
        uploadTab.style.opacity = '0.4';
        uploadTab.style.cursor = 'not-allowed';
        uploadElements.forEach(el => el.disabled = true);
        dropZones.forEach(el => el.classList.add('disabled'));
        $('uploadSubtext').textContent = 'please log in to upload';
      }

      const dropdownLogout = $('dropdownLogoutBtn');
      if (dropdownLogout) {
        dropdownLogout.style.display = isLoggedIn ? 'flex' : 'none';
        dropdownLogout.onclick = isLoggedIn ? logoutUser : null;
      }
    }

    async function fetchNotificationCount() {
      if (!currentUser) return;
      try {
        const data = await apiFetch('/api/user/notifications');
        const unread = data.filter(n => !n.is_read).length;
        const badge = $('notifBadge');
        if (unread > 0) {
          badge.style.display = 'inline';
          badge.textContent = unread;
        } else {
          badge.style.display = 'none';
        }
      } catch (e) { /* ignore */ }
    }

    // ─── STORE ──────────────────────────────────────────────────────────
    let storePage = 1, storePerPage = 10, currentCategory = 'all', searchQuery = '';

    async function loadStore() {
      try {
        const params = new URLSearchParams();
        if (currentCategory !== 'all') params.append('category', currentCategory);
        if (searchQuery) params.append('search', searchQuery);
        const url = '/api/store?' + params.toString();
        const games = await apiFetch(url);
        storeGames = games;
        renderStore(games);
      } catch (e) {
        showToast('Failed to load store', 'error');
      }
    }

    function renderStore(games) {
      const container = $('storeList');
      const count = $('storeCount');
      const total = games.length;
      const totalPages = Math.ceil(total / storePerPage);
      if (storePage > totalPages) storePage = Math.max(1, totalPages);
      const start = (storePage - 1) * storePerPage;
      const end = start + storePerPage;
      const pageItems = games.slice(start, end);

      if (!pageItems.length) {
        container.innerHTML = '<div class="empty"><div class="icon">📦</div><p>nothing yet</p></div>';
        count.textContent = '0 apps available';
        $('storePagination').innerHTML = '';
        return;
      }
      count.textContent = total + ' app' + (total > 1 ? 's' : '') + ' available';

      const categoryMap = { game: 'Games', emulator: 'Emulators', tool: 'Tools' };
      container.innerHTML = pageItems.map(g => {
        const sizeStr = g.file_size ? formatFileSize(g.file_size) : '—';
        const dateStr = g.approved_at ? new Date(g.approved_at).toLocaleDateString() : '—';
        const authorColor = g.author_color || '#ffffff';
        return `
          <div class="card">
            <div class="info">
              <h4>
                ${g.title}
                <span class="category-badge">${categoryMap[g.category] || g.category}</span>
                <span class="size-badge">${sizeStr}</span>
              </h4>
              <p>by <span class="author-link" style="color:${authorColor};cursor:pointer;" onclick="openPublicProfile('${g.author_id}')">${g.display_name || g.author_id}</span> · v${g.version} · added ${dateStr}</p>
              ${g.image_data ? `<img src="${g.image_data}" />` : ''}
              ${g.description ? `<p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px;">${g.description}</p>` : ''}
            </div>
            <div>
              <button class="download-btn" onclick="downloadGame(${g.id})">⬇ Download</button>
            </div>
          </div>
        `;
      }).join('');

      let pagHtml = '';
      if (totalPages > 1) {
        pagHtml = `
          <button onclick="storePage=Math.max(1,storePage-1);loadStore();" ${storePage<=1?'disabled':''}>◀</button>
          <span class="page-info">${storePage} / ${totalPages}</span>
          <button onclick="storePage=Math.min(${totalPages},storePage+1);loadStore();" ${storePage>=totalPages?'disabled':''}>▶</button>
        `;
      }
      $('storePagination').innerHTML = pagHtml;
    }

    async function downloadGame(id) {
      try {
        const resp = await fetch(`${API_BASE}/api/store/download?id=${id}`);
        if (!resp.ok) throw new Error('Download failed');
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const disp = resp.headers.get('Content-Disposition');
        let filename = 'game.zip';
        if (disp) { const match = disp.match(/filename="(.+)"/); if (match) filename = match[1]; }
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
        showToast('⬇ Downloading...', 'success');
      } catch (e) {
        showToast('Error downloading: ' + e.message, 'error');
      }
    }

    // ─── UPLOAD ─────────────────────────────────────────────────────────
    // (Same as before, but uses apiFetch)
    $('uploadForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      if (!currentUser) { showToast('Please log in', 'error'); return; }
      const title = $('uploadTitle').value.trim();
      const version = $('uploadVersion').value.trim() || '1.0';
      const category = $('uploadCategory').value;
      const description = $('uploadDescription').value.trim();
      const file = $('zipInput').files[0];
      const imageFile = $('imageInput').files[0];

      if (!title) { showToast('Please enter a title', 'error'); return; }
      if (title.length > 15) { showToast('Title max 15 characters', 'error'); return; }
      if (!file) { showToast('Please select a .zip file', 'error'); return; }

      const fileData = await readFileAsBase64(file);
      let imageData = '';
      if (imageFile) {
        const imgPreview = $('userPreviewImg');
        if (imgPreview.src) imageData = imgPreview.src;
        else imageData = await readFileAsBase64(imageFile);
      }

      try {
        await apiFetch('/api/submissions', {
          method: 'POST',
          body: JSON.stringify({
            title,
            version,
            category,
            description,
            file_name: file.name,
            file_data: fileData.split(',')[1],
            file_size: file.size,
            image_data: imageData,
          })
        });
        $('uploadMessage').textContent = '✅ submitted for review';
        $('uploadMessage').style.color = 'rgba(80,220,160,0.8)';
        $('uploadForm').reset();
        $('userPreviewImg').classList.remove('visible');
        $('imageInfo').textContent = 'no image selected';
        $('zipInfo').textContent = 'no file selected';
        $('zipFileSize').textContent = '';
        showToast('Game submitted for review!', 'success');
      } catch (e) {
        showToast('Upload failed: ' + e.message, 'error');
      }
    });

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ─── REGISTRATION SETTING ────────────────────────────────────────
    async function fetchRegistrationSetting() {
      try {
        const data = await apiFetch('/api/settings/registration');
        registrationEnabled = data.enabled;
        updateUI();
      } catch (e) { registrationEnabled = true; }
    }

    // ─── INIT ──────────────────────────────────────────────────────────
    async function initApp() {
      await fetchRegistrationSetting();
      handleGitHubCallback();
      const restored = await restoreSession();
      if (restored) {
        switchView('app');
        updateUI();
        loadStore();
        showToast('Welcome back, ' + currentUser.display_name + '!', 'success');
      } else {
        switchView('login');
      }
      // Bind login/register buttons
      $('loginBtnAction').addEventListener('click', async function() {
        const username = $('loginUsername').value.trim();
        const password = $('loginPassword').value.trim();
        if (!username || !password) {
          $('loginStatus').textContent = 'Please fill in both fields';
          $('loginStatus').className = 'status-msg error';
          return;
        }
        if (username === ADMIN_NAME) {
          loginWithGitHub();
          return;
        }
        try {
          await loginUser(username, password);
          $('loginStatus').textContent = 'Login successful!';
          $('loginStatus').className = 'status-msg success';
          switchView('app');
          updateUI();
          loadStore();
          showToast('Welcome back, ' + username + '!', 'success');
        } catch (err) {
          $('loginStatus').textContent = err.message;
          $('loginStatus').className = 'status-msg error';
        }
      });

      $('registerBtnAction').addEventListener('click', async function() {
        const username = $('registerUsername').value.trim();
        const password = $('registerPassword').value.trim();
        const confirm = $('registerPasswordConfirm').value.trim();
        if (!username || !password || !confirm) {
          $('registerStatus').textContent = 'Please fill in all fields';
          $('registerStatus').className = 'status-msg error';
          return;
        }
        if (password !== confirm) {
          $('registerStatus').textContent = 'Passwords do not match';
          $('registerStatus').className = 'status-msg error';
          return;
        }
        try {
          const data = await registerUser(username, password);
          $('registerStatus').textContent = 'Account created! Reset key: ' + data.resetKey;
          $('registerStatus').className = 'status-msg success';
          showToast('Account created! Save your reset key.', 'success');
          setTimeout(() => {
            $('registerForm').style.display = 'none';
            $('loginForm').style.display = 'block';
            $('loginUsername').value = username;
            $('loginPassword').value = password;
            $('loginStatus').textContent = 'Account created! Please log in.';
            $('loginStatus').className = 'status-msg success';
          }, 1500);
        } catch (err) {
          $('registerStatus').textContent = err.message;
          $('registerStatus').className = 'status-msg error';
        }
      });

      $('browseStoreBtn').addEventListener('click', function() {
        currentUser = null;
        setToken(null);
        localStorage.removeItem('jgs_user');
        switchView('app');
        updateUI();
        loadStore();
        showToast('Browsing as guest', 'success');
      });

      // Tabs, dropdown, etc.
      // ... (rest of UI bindings as in your original)
    }

    initApp();
  </script>
</body>
</html>
