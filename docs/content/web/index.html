<!DOCTYPE html>
<html>
<head><title>Joystick Go Store</title></head>
<body>
  <button id="login">Login with GitHub</button>
  <div id="result"></div>
  <script>
    const CONFIG = {
      clientId: 'Ov23limVqQtNIyPGAZtr',  // Public – safe
      proxyUrl: 'https://joystick-store-proxy.joystick-go-store.workers.dev',
      redirect: 'https://joystick-go-store.pages.dev/',
    };

    document.getElementById('login').onclick = () => {
      const url = 'https://github.com/login/oauth/authorize' +
        '?client_id=' + CONFIG.clientId +
        '&redirect_uri=' + CONFIG.redirect +
        '&scope=read:user user:email';
      window.location.href = url;
    };

    // Handle callback
    const code = new URLSearchParams(window.location.search).get('code');
    if (code) {
      fetch(CONFIG.proxyUrl + '/callback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById('result').textContent = 'Logged in as ' + data.user.login;
        console.log(data);
      })
      .catch(err => {
        document.getElementById('result').textContent = 'Error: ' + err.message;
      });
    }
  </script>
</body>
</html>
