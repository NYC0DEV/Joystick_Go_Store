<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin</title>
    <style>
        /* Shared Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #0b0b18; color: #e0e0ee; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px; line-height: 1.5; }
        .bg-wrap { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: url('https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/bg/background.png?raw=true') center/cover no-repeat; }
        .bg-wrap::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(200, 60, 60, 0.45), rgba(180, 80, 220, 0.35)); backdrop-filter: blur(2px); }
        .container { max-width: 960px; width: 100%; background: rgba(18, 18, 40, 0.85); backdrop-filter: blur(6px); border-radius: 32px; padding: 40px 38px; border: 1px solid rgba(255, 255, 255, 0.06); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7); position: relative; z-index: 1; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px;}
        h3 { font-weight: 400; font-size: 22px; color: #fff; }
        .btn-primary, .btn-danger, .btn-approve, .btn-reject, .btn-delete { padding: 6px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
        .btn-primary { background: rgba(255, 255, 255, 0.06); color: #eee; border: 1px solid rgba(255, 255, 255, 0.08); text-decoration: none;}
        .btn-danger { background: rgba(255, 70, 70, 0.1); color: #ff6b6b; border: 1px solid rgba(255, 70, 70, 0.15); }
        .btn-approve { background: rgba(80, 220, 160, 0.12); color: #50dca0; }
        .btn-reject { background: rgba(255, 70, 70, 0.12); color: #ff4646; }
        .btn-delete { background: rgba(255, 70, 70, 0.08); color: #ff6b6b; }
        
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 16px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px;}
        .card .info h4 { font-size: 15px; font-weight: 500; color: #eee; }
        .card .info p { font-size: 12px; color: rgba(255, 255, 255, 0.35); margin-top: 2px; }
        .status { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 12px; border-radius: 40px; text-transform: uppercase; margin-top: 4px; }
        .status-pending { background: rgba(255, 180, 0, 0.12); color: #ffb800; }
        .status-approved { background: rgba(80, 220, 160, 0.12); color: #50dca0; }
        
        .form-row { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-end; flex-wrap:wrap;}
        .form-row label { display: block; font-size: 11px; font-weight: 600; color: rgba(255, 255, 255, 0.3); text-transform: uppercase; margin-bottom: 3px; }
        .form-row input { width: 100%; padding: 10px 14px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px; color: #eee; outline: none; }
    </style>
</head>
<body>
    <script>
        const savedUserStr = localStorage.getItem('jgs_current_user');
        const adminUser = savedUserStr ? JSON.parse(savedUserStr) : null;
        if (!adminUser || adminUser.githubLogin !== 'NYC0DEV') {
            window.location.replace('/'); // Instantly redirect unauthorized users
        }
    </script>

    <div class="bg-wrap"></div>
    <div class="container">
        
        <div class="header">
            <h3>⚙ Admin Dashboard</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="loadAdminData()" class="btn-primary">Refresh Data</button>
                <a href="/" class="btn-primary" style="border-color: #6d5dfb; color: #b8b8ff;">Return to Store</a>
            </div>
        </div>

        <div style="margin-bottom:24px;">
            <h4 style="font-weight:400;font-size:15px;color:rgba(255,255,255,0.5);margin-bottom:10px;">Submissions</h4>
            <div id="submissionList"></div>
        </div>

        <div style="margin-bottom:24px;">
            <h4 style="font-weight:400;font-size:15px;color:rgba(255,255,255,0.5);margin-bottom:10px;">Users</h4>
            <div id="userList"></div>
        </div>

        <div style="margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.04);">
            <h4 style="font-weight:400;font-size:15px;color:rgba(255,255,255,0.5);margin-bottom:10px;">Settings</h4>
            <div class="form-row">
                <div style="flex:1;"><label>Max Upload Size (MB)</label><input type="number" id="maxUploadSize" value="50"></div>
                <div style="flex:2;"><label>Install Folder</label><input type="text" id="installPath" value="sd:\bin\Joystick_Go_Store\games\"></div>
                <div style="flex:2;"><label>Misc Folder</label><input type="text" id="miscPath" value="sd:\Games\Misc\"></div>
                <button id="saveSettingsBtn" class="btn-primary">Save Settings</button>
            </div>
        </div>

    </div>

    <script>
        let users = [];
        let submissions = [];
        let storeGames = [];
        let installPath = 'sd:\\bin\\Joystick_Go_Store\\games\\';
        let miscPath = 'sd:\\Games\\Misc\\';

        const $ = id => document.getElementById(id);

        function loadAdminData() {
            users = JSON.parse(localStorage.getItem('jgs_users') || '[]');
            submissions = JSON.parse(localStorage.getItem('jgs_submissions') || '[]');
            storeGames = JSON.parse(localStorage.getItem('jgs_store') || '[]');
            
            const ip = localStorage.getItem('jgs_installPath'); if(ip) installPath = ip;
            const mp = localStorage.getItem('jgs_miscPath'); if(mp) miscPath = mp;
            const ms = localStorage.getItem('jgs_maxSize'); if(ms) $('maxUploadSize').value = ms;
            
            $('installPath').value = installPath;
            $('miscPath').value = miscPath;
            
            renderUsers();
            renderSubmissions();
        }

        function renderUsers() {
            if(!users.length) { $('userList').innerHTML = '<p style="color:gray;">No users</p>'; return; }
            $('userList').innerHTML = users.map(u => `
                <div class="card">
                    <div class="info">
                        <h4>${u.name} ${u.githubLogin === 'NYC0DEV' ? '⭐ (Admin)' : ''}</h4>
                        <p>Linked: ${u.githubLogin} · Created: ${u.created ? u.created.slice(0,10) : 'recently'}</p>
                    </div>
                    <div>
                        ${u.githubLogin !== 'NYC0DEV' ? `<button class="btn-delete" onclick="deleteUser('${u.name}')">Delete</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function deleteUser(name) {
            if(!confirm(`Delete user ${name}?`)) return;
            users = users.filter(u => u.name !== name);
            localStorage.setItem('jgs_users', JSON.stringify(users));
            renderUsers();
        }

        function renderSubmissions() {
            if(!submissions.length) { $('submissionList').innerHTML = '<p style="color:gray;">No submissions pending</p>'; return; }
            $('submissionList').innerHTML = submissions.map((s, idx) => `
                <div class="card">
                    <div class="info">
                        <h4>${s.title}</h4>
                        <p>by ${s.author} · ${s.category} · v${s.version}</p>
                        <span class="status status-${s.status || 'pending'}">${s.status || 'pending'}</span>
                    </div>
                    <div style="display:flex; gap:6px;">
                        ${s.status === 'pending' ? `
                            <button class="btn-approve" onclick="approveSubmission(${idx})">Approve</button>
                            <button class="btn-reject" onclick="rejectSubmission(${idx})">Reject</button>
                        ` : ''}
                        <button class="btn-delete" onclick="deleteSubmission(${idx})">Delete Log</button>
                    </div>
                </div>
            `).join('');
        }

        function approveSubmission(idx) {
            if (!confirm('Approve this game and push to store?')) return;
            submissions[idx].status = 'approved';
            const s = submissions[idx];
            storeGames.push({
                id: Date.now(), title: s.title, author: s.author, category: s.category, version: s.version, description: s.description, image: s.image,
                installFolder: installPath + s.title + '/', miscFolder: miscPath + s.title + '/', launcher: '', appName: s.title
            });
            localStorage.setItem('jgs_submissions', JSON.stringify(submissions));
            localStorage.setItem('jgs_store', JSON.stringify(storeGames));
            renderSubmissions();
        }

        function rejectSubmission(idx) {
            submissions[idx].status = 'rejected';
            localStorage.setItem('jgs_submissions', JSON.stringify(submissions));
            renderSubmissions();
        }

        function deleteSubmission(idx) {
            submissions.splice(idx, 1);
            localStorage.setItem('jgs_submissions', JSON.stringify(submissions));
            renderSubmissions();
        }

        $('saveSettingsBtn').addEventListener('click', () => {
            localStorage.setItem('jgs_maxSize', $('maxUploadSize').value);
            localStorage.setItem('jgs_installPath', $('installPath').value.trim());
            localStorage.setItem('jgs_miscPath', $('miscPath').value.trim());
            alert('Settings Saved');
        });

        // Init
        loadAdminData();
    </script>
</body>
</html>
