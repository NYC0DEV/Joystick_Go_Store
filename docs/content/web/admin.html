<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Admin Panel — Joystick Go Store</title>
    <style>
        /* ─── RESET ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b0b18;
            color: #e0e0ee;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 960px;
            margin: 0 auto;
            background: rgba(18, 18, 40, 0.92);
            backdrop-filter: blur(6px);
            border-radius: 32px;
            padding: 32px 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 500;
            color: #f0f0ff;
            flex: 1;
        }
        .header h1 small {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            display: block;
        }
        .header .back-link {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
        }
        .header .back-link:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }
        .header .user-badge {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        .header .user-badge strong {
            color: #b8b8ff;
        }

        /* ─── STATS ─── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 16px 20px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 28px;
            font-weight: 600;
            color: #b8b8ff;
        }
        .stat-card .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 2px;
        }

        /* ─── SECTIONS ─── */
        .section {
            margin-bottom: 28px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 400;
            color: #ddd;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title .badge {
            font-size: 12px;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 12px;
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ─── PASSWORD MANAGEMENT ─── */
        .password-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 28px;
        }
        .password-section .row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .password-section .row .field {
            flex: 1 1 160px;
            min-width: 120px;
        }
        .password-section label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 3px;
        }
        .password-section input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: #eee;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }
        .password-section input:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }
        .btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            color: #eee;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .btn-danger {
            background: rgba(255, 70, 70, 0.08);
            border-color: rgba(255, 70, 70, 0.15);
            color: #ff6b6b;
        }
        .btn-danger:hover {
            background: rgba(255, 70, 70, 0.15);
            border-color: rgba(255, 70, 70, 0.25);
        }
        .btn-success {
            background: rgba(80, 220, 160, 0.08);
            border-color: rgba(80, 220, 160, 0.15);
            color: #50dca0;
        }
        .btn-success:hover {
            background: rgba(80, 220, 160, 0.15);
            border-color: rgba(80, 220, 160, 0.25);
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .status-msg {
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
            color: rgba(255, 255, 255, 0.4);
        }
        .status-msg.error {
            color: #ff6b6b;
        }
        .status-msg.success {
            color: #50dca0;
        }
        .status-msg.info {
            color: #8c7eff;
        }

        /* ─── SUBMISSIONS LIST ─── */
        .submission-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .submission-item .info h4 {
            font-size: 15px;
            font-weight: 500;
            color: #eee;
        }
        .submission-item .info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 2px;
        }
        .submission-item .info .pending-badge {
            display: inline-block;
            font-size: 10px;
            background: rgba(255, 200, 50, 0.1);
            color: #ffd866;
            padding: 2px 10px;
            border-radius: 40px;
            border: 1px solid rgba(255, 200, 50, 0.1);
            margin-left: 8px;
        }
        .submission-item .info .approved-badge {
            display: inline-block;
            font-size: 10px;
            background: rgba(80, 220, 160, 0.1);
            color: #50dca0;
            padding: 2px 10px;
            border-radius: 40px;
            border: 1px solid rgba(80, 220, 160, 0.1);
            margin-left: 8px;
        }
        .submission-item .info .rejected-badge {
            display: inline-block;
            font-size: 10px;
            background: rgba(255, 70, 70, 0.1);
            color: #ff6b6b;
            padding: 2px 10px;
            border-radius: 40px;
            border: 1px solid rgba(255, 70, 70, 0.1);
            margin-left: 8px;
        }
        .submission-item .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .submission-item .actions .btn-sm {
            padding: 6px 16px;
            font-size: 12px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .submission-item .actions .btn-sm:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .submission-item .actions .btn-sm.approve {
            color: #50dca0;
            border-color: rgba(80, 220, 160, 0.15);
        }
        .submission-item .actions .btn-sm.approve:hover {
            background: rgba(80, 220, 160, 0.1);
        }
        .submission-item .actions .btn-sm.reject {
            color: #ff6b6b;
            border-color: rgba(255, 70, 70, 0.15);
        }
        .submission-item .actions .btn-sm.reject:hover {
            background: rgba(255, 70, 70, 0.1);
        }
        .submission-item .actions .btn-sm:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255, 255, 255, 0.2);
        }
        .empty-state .icon {
            font-size: 32px;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(18, 18, 40, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 14px 24px;
            color: #eee;
            font-size: 14px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: 0.4s ease;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .toast.success {
            border-color: rgba(80, 220, 160, 0.2);
        }
        .toast.error {
            border-color: rgba(255, 70, 70, 0.2);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            .admin-container {
                padding: 20px 14px;
                border-radius: 20px;
            }
            .header h1 {
                font-size: 20px;
            }
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            .password-section .row {
                flex-direction: column;
            }
            .password-section .row .field {
                flex: 1 1 auto;
                width: 100%;
            }
            .submission-item {
                flex-direction: column;
                align-items: stretch;
            }
            .submission-item .actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="admin-container">
        <!-- Header -->
        <div class="header">
            <h1>⚙ Admin Panel <small>Joystick Go Store</small></h1>
            <span class="user-badge" id="adminUserBadge">👤 <strong id="adminUsername">Loading...</strong></span>
            <a href="index.html" class="back-link">← Back to Store</a>
        </div>

        <!-- Stats -->
        <div class="stats" id="statsContainer">
            <div class="stat-card"><div class="number" id="statUsers">0</div><div class="label">Users</div></div>
            <div class="stat-card"><div class="number" id="statSubmissions">0</div><div class="label">Submissions</div></div>
            <div class="stat-card"><div class="number" id="statGames">0</div><div class="label">Store Games</div></div>
            <div class="stat-card"><div class="number" id="statPending">0</div><div class="label">Pending Review</div></div>
        </div>

        <!-- Password Management -->
        <div class="password-section">
            <h3 style="font-weight:400;font-size:16px;color:#ddd;margin-bottom:12px;">🔐 Admin Password</h3>
            <div class="row">
                <div class="field">
                    <label>Current password</label>
                    <input type="password" id="adminCurrentPwd" placeholder="Enter current password" autocomplete="current-password" />
                </div>
                <div class="field">
                    <label>New password</label>
                    <input type="password" id="adminNewPwd" placeholder="Enter new password" autocomplete="new-password" />
                </div>
                <div class="field">
                    <label>Confirm new password</label>
                    <input type="password" id="adminNewPwdConfirm" placeholder="Confirm new password" autocomplete="new-password" />
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button id="adminSetPasswordBtn" class="btn btn-success">Set / Update</button>
                    <button id="adminRemovePasswordBtn" class="btn btn-danger">Remove Password</button>
                </div>
            </div>
            <div id="adminPwdStatus" class="status-msg"></div>
        </div>

        <!-- Submissions -->
        <div class="section">
            <div class="section-title">
                📦 Submissions
                <span class="badge" id="submissionCount">0 pending</span>
            </div>
            <div id="submissionList">
                <div class="empty-state"><div class="icon">📭</div><p>No submissions yet</p></div>
            </div>
        </div>
    </div>

    <script>
        // ─── CONFIG ──────────────────────────────────────────────────────────────
        const ADMIN_NAME = 'NYC0DEV';
        let users = [];
        let submissions = [];
        let storeGames = [];
        let currentUser = null;
        let githubToken = null;

        const $ = id => document.getElementById(id);

        // ─── TOAST ──────────────────────────────────────────────────────────────
        let toastTimer = null;

        function showToast(msg, type = 'success') {
            const el = $('toast');
            el.textContent = msg;
            el.className = 'toast ' + type + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
        }

        // ─── DATA ──────────────────────────────────────────────────────────────
        function loadData() {
            users = JSON.parse(localStorage.getItem('jgs_users') || '[]');
            submissions = JSON.parse(localStorage.getItem('jgs_submissions') || '[]');
            storeGames = JSON.parse(localStorage.getItem('jgs_store') || '[]');
        }

        function saveUsers() { localStorage.setItem('jgs_users', JSON.stringify(users)); }

        function saveSubmissions() { localStorage.setItem('jgs_submissions', JSON.stringify(submissions)); }

        function saveStore() { localStorage.setItem('jgs_store', JSON.stringify(storeGames)); }

        // ─── SESSION ──────────────────────────────────────────────────────────
        function restoreSession() {
            const saved = localStorage.getItem('jgs_current_user');
            if (saved) {
                const user = JSON.parse(saved);
                loadData();
                const exists = users.find(u => u.username === user.username);
                if (exists && exists.isAdmin) {
                    currentUser = exists;
                    const token = localStorage.getItem('github_token');
                    if (token) githubToken = token;
                    return true;
                } else {
                    localStorage.removeItem('jgs_current_user');
                }
            }
            return false;
        }

        // ─── CHECK ADMIN ──────────────────────────────────────────────────────
        function checkAdmin() {
            if (!restoreSession() || !currentUser || !currentUser.isAdmin) {
                showToast('You must be logged in as admin to access this page.', 'error');
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                return false;
            }
            return true;
        }

        // ─── RENDER ──────────────────────────────────────────────────────────
        function renderDashboard() {
            loadData();

            // Admin username
            if (currentUser) {
                $('adminUsername').textContent = currentUser.username;
                $('adminUserBadge').innerHTML = `👤 <strong>${currentUser.username}</strong> <span style="color:#8c7eff;font-size:11px;margin-left:4px;">admin</span>`;
            }

            // Stats
            const pending = submissions.filter(s => s.status === 'pending').length;
            $('statUsers').textContent = users.length;
            $('statSubmissions').textContent = submissions.length;
            $('statGames').textContent = storeGames.length;
            $('statPending').textContent = pending;
            $('submissionCount').textContent = pending + ' pending';

            // Password status
            const admin = users.find(u => u.username === ADMIN_NAME);
            const statusEl = $('adminPwdStatus');
            if (admin && admin.hasPassword) {
                statusEl.textContent = '✅ Password is set. You can change or remove it below.';
                statusEl.className = 'status-msg success';
                $('adminCurrentPwd').disabled = false;
                $('adminCurrentPwd').placeholder = 'Enter current password';
            } else {
                statusEl.textContent = '⚠️ No password set. Set one below for extra security.';
                statusEl.className = 'status-msg info';
                $('adminCurrentPwd').disabled = true;
                $('adminCurrentPwd').placeholder = 'No password set';
                $('adminCurrentPwd').value = '';
            }

            // Submissions list
            renderSubmissions();
        }

        function renderSubmissions() {
            const container = $('submissionList');
            const pending = submissions.filter(s => s.status === 'pending');

            if (!submissions.length) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No submissions yet</p></div>';
                return;
            }

            container.innerHTML = submissions.map((s, index) => `
                    <div class="submission-item" data-index="${index}">
                        <div class="info">
                            <h4>${s.title} <span class="${s.status}-badge">${s.status}</span></h4>
                            <p>by ${s.author} · ${s.category} · v${s.version} · ${new Date(s.created).toLocaleDateString()}</p>
                            ${s.description ? `<p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px;">${s.description}</p>` : ''}
                            ${s.image ? `<img src="${s.image}" style="max-width:60px;height:auto;border-radius:4px;margin-top:4px;" />` : ''}
                        </div>
                        <div class="actions">
                            ${s.status === 'pending' ? `
                                <button class="btn-sm approve" onclick="approveSubmission(${index})">✅ Approve</button>
                                <button class="btn-sm reject" onclick="rejectSubmission(${index})">❌ Reject</button>
                            ` : `
                                <span style="font-size:12px;color:rgba(255,255,255,0.2);">${s.status === 'approved' ? '✅ Approved' : '❌ Rejected'}</span>
                            `}
                        </div>
                    </div>
                `).join('');
        }

        // ─── SUBMISSION ACTIONS ──────────────────────────────────────────────
        function approveSubmission(index) {
            loadData();
            if (index >= submissions.length) return;
            const sub = submissions[index];
            if (sub.status !== 'pending') return;

            sub.status = 'approved';
            saveSubmissions();

            // Add to store
            storeGames.push({
                title: sub.title,
                author: sub.author,
                version: sub.version,
                category: sub.category,
                description: sub.description,
                image: sub.image || '',
                approvedAt: new Date().toISOString()
            });
            saveStore();

            showToast('✅ Approved: ' + sub.title, 'success');
            renderDashboard();
        }

        function rejectSubmission(index) {
            loadData();
            if (index >= submissions.length) return;
            const sub = submissions[index];
            if (sub.status !== 'pending') return;

            sub.status = 'rejected';
            saveSubmissions();
            showToast('❌ Rejected: ' + sub.title, 'error');
            renderDashboard();
        }

        // ─── PASSWORD MANAGEMENT ──────────────────────────────────────────────
        $('adminSetPasswordBtn').addEventListener('click', function() {
            const currentPwd = $('adminCurrentPwd').value.trim();
            const newPwd = $('adminNewPwd').value.trim();
            const confirmPwd = $('adminNewPwdConfirm').value.trim();

            loadData();
            const admin = users.find(u => u.username === ADMIN_NAME);
            if (!admin) {
                $('adminPwdStatus').textContent = 'Admin account not found.';
                $('adminPwdStatus').className = 'status-msg error';
                return;
            }

            // If password is set, require current password
            if (admin.hasPassword) {
                if (!currentPwd) {
                    $('adminPwdStatus').textContent = 'Please enter your current password.';
                    $('adminPwdStatus').className = 'status-msg error';
                    return;
                }
                if (admin.password !== currentPwd) {
                    $('adminPwdStatus').textContent = 'Current password is incorrect.';
                    $('adminPwdStatus').className = 'status-msg error';
                    return;
                }
            }

            if (!newPwd || newPwd.length < 3) {
                $('adminPwdStatus').textContent = 'New password must be at least 3 characters.';
                $('adminPwdStatus').className = 'status-msg error';
                return;
            }
            if (newPwd !== confirmPwd) {
                $('adminPwdStatus').textContent = 'Passwords do not match.';
                $('adminPwdStatus').className = 'status-msg error';
                return;
            }

            admin.password = newPwd;
            admin.hasPassword = true;
            saveUsers();

            if (currentUser && currentUser.username === ADMIN_NAME) {
                currentUser.password = newPwd;
                currentUser.hasPassword = true;
                localStorage.setItem('jgs_current_user', JSON.stringify(currentUser));
            }

            $('adminPwdStatus').textContent = '✅ Password updated successfully!';
            $('adminPwdStatus').className = 'status-msg success';
            showToast('Admin password updated!', 'success');
            $('adminNewPwd').value = '';
            $('adminNewPwdConfirm').value = '';
            $('adminCurrentPwd').value = '';
            renderDashboard();
        });

        $('adminRemovePasswordBtn').addEventListener('click', function() {
            if (!confirm('Are you sure you want to remove your admin password? This will disable the extra security layer.'))
                return;

            const currentPwd = $('adminCurrentPwd').value.trim();
            loadData();
            const admin = users.find(u => u.username === ADMIN_NAME);
            if (!admin) {
                $('adminPwdStatus').textContent = 'Admin account not found.';
                $('adminPwdStatus').className = 'status-msg error';
                return;
            }

            if (admin.hasPassword) {
                if (!currentPwd) {
                    $('adminPwdStatus').textContent = 'Please enter your current password to remove it.';
                    $('adminPwdStatus').className = 'status-msg error';
                    return;
                }
                if (admin.password !== currentPwd) {
                    $('adminPwdStatus').textContent = 'Current password is incorrect.';
                    $('adminPwdStatus').className = 'status-msg error';
                    return;
                }
            }

            admin.password = '';
            admin.hasPassword = false;
            saveUsers();

            if (currentUser && currentUser.username === ADMIN_NAME) {
                currentUser.password = '';
                currentUser.hasPassword = false;
                localStorage.setItem('jgs_current_user', JSON.stringify(currentUser));
            }

            $('adminPwdStatus').textContent = '✅ Password removed. Admin now uses GitHub-only login.';
            $('adminPwdStatus').className = 'status-msg success';
            showToast('Admin password removed.', 'success');
            $('adminCurrentPwd').value = '';
            renderDashboard();
        });

        // ─── LOGOUT ──────────────────────────────────────────────────────────
        // (Admin can also logout from the store page)

        // ─── INIT ──────────────────────────────────────────────────────────────
        function initAdmin() {
            if (!checkAdmin()) return;
            renderDashboard();
        }

        initAdmin();
        console.log('Admin panel loaded. Manage passwords and submissions here.');
    </script>

</body>
</html>
