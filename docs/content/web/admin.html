<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Admin Panel — Joystick Go Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b0b18;
            color: #e0e0ee;
            min-height: 100vh;
            padding: 20px;
        }
        .admin-container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(18, 18, 40, 0.92);
            backdrop-filter: blur(6px);
            border-radius: 32px;
            padding: 32px 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 500;
            color: #f0f0ff;
            flex: 1;
        }
        .header h1 small {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            display: block;
        }
        .header .back-link {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
        }
        .header .back-link:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }
        .header .user-badge {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        .header .user-badge strong {
            color: #b8b8ff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 14px 16px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 26px;
            font-weight: 600;
            color: #b8b8ff;
        }
        .stat-card .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 2px;
        }

        .admin-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            flex-wrap: wrap;
        }
        .admin-tabs button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            background: transparent;
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            flex: 1 1 auto;
            min-width: 70px;
        }
        .admin-tabs button.active {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .admin-tabs button:hover:not(.active) {
            color: rgba(255, 255, 255, 0.7);
        }

        .tab-panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .tab-panel.active {
            display: block;
        }
        @keyframes fadeIn {
            0% { opacity: 0.3; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .card-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .card-item .info {
            flex: 1 1 200px;
        }
        .card-item .info .title {
            font-size: 15px;
            font-weight: 500;
            color: #eee;
        }
        .card-item .info .meta {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 2px;
        }
        .card-item .info .meta .status-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 40px;
            text-transform: uppercase;
            margin-left: 6px;
        }
        .status-badge.pending {
            background: rgba(255, 200, 50, 0.12);
            color: #ffd866;
        }
        .status-badge.approved {
            background: rgba(80, 220, 160, 0.12);
            color: #50dca0;
        }
        .status-badge.rejected {
            background: rgba(255, 70, 70, 0.12);
            color: #ff6b6b;
        }
        .card-item .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .btn-sm {
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: inline-block;
        }
        .btn-sm:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .btn-sm.success {
            background: rgba(80, 220, 160, 0.08);
            border-color: rgba(80, 220, 160, 0.15);
            color: #50dca0;
        }
        .btn-sm.success:hover {
            background: rgba(80, 220, 160, 0.15);
        }
        .btn-sm.danger {
            background: rgba(255, 70, 70, 0.08);
            border-color: rgba(255, 70, 70, 0.15);
            color: #ff6b6b;
        }
        .btn-sm.danger:hover {
            background: rgba(255, 70, 70, 0.15);
        }
        .btn-sm.warning {
            background: rgba(255, 200, 50, 0.08);
            border-color: rgba(255, 200, 50, 0.15);
            color: #ffd866;
        }
        .btn-sm.warning:hover {
            background: rgba(255, 200, 50, 0.15);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .pagination button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .pagination .page-info {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            padding: 0 8px;
        }

        /* Modals (reuse from index) */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 9998;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-y: auto;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: rgba(18, 18, 40, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 32px 30px;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            animation: modalIn 0.3s ease;
        }
        .modal-box.wide {
            max-width: 720px;
        }
        @keyframes modalIn {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .modal-header h2 {
            font-size: 20px;
            font-weight: 500;
            color: #f0f0ff;
        }
        .modal-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .modal-close:hover {
            color: #fff;
        }
        .modal-box .form-group {
            margin-bottom: 14px;
        }
        .modal-box .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 3px;
        }
        .modal-box .form-group input,
        .modal-box .form-group select,
        .modal-box .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: #eee;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }
        .modal-box .form-group input:focus,
        .modal-box .form-group select:focus,
        .modal-box .form-group textarea:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }
        .modal-box .form-group .color-picker-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .modal-box .form-group input[type="color"] {
            width: 48px;
            height: 48px;
            padding: 4px;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .modal-box .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .modal-box .actions .btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            color: #eee;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            flex: 1;
            text-align: center;
            min-width: 80px;
        }
        .modal-box .actions .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .modal-box .actions .btn-primary {
            background: rgba(80, 220, 160, 0.08);
            border-color: rgba(80, 220, 160, 0.15);
            color: #50dca0;
        }
        .modal-box .actions .btn-primary:hover {
            background: rgba(80, 220, 160, 0.15);
        }
        .modal-box .actions .btn-danger {
            background: rgba(255, 70, 70, 0.08);
            border-color: rgba(255, 70, 70, 0.15);
            color: #ff6b6b;
        }
        .modal-box .actions .btn-danger:hover {
            background: rgba(255, 70, 70, 0.15);
        }
        .modal-box .actions .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
        }
        .modal-box .actions .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .status-msg {
            font-size: 13px;
            margin-top: 6px;
            min-height: 20px;
        }
        .status-msg.error {
            color: #ff6b6b;
        }
        .status-msg.success {
            color: #50dca0;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(18, 18, 40, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 14px 24px;
            color: #eee;
            font-size: 14px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: 0.4s ease;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .toast.success {
            border-color: rgba(80, 220, 160, 0.2);
        }
        .toast.error {
            border-color: rgba(255, 70, 70, 0.2);
        }
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.2);
        }
        .empty .icon {
            font-size: 40px;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        @media (max-width: 640px) {
            .admin-container { padding: 20px 14px; }
            .card-item { flex-direction: column; align-items: stretch; }
            .card-item .actions { justify-content: flex-start; }
            .modal-box { padding: 24px 18px; max-width: 100%; }
            .modal-box.wide { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <!-- Edit Submission Modal -->
    <div id="editSubmissionModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>✏️ Edit Submission</h2>
                <button class="modal-close" onclick="closeEditSubmissionModal()">✕</button>
            </div>
            <div id="editSubmissionContent">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="editSubTitle" maxlength="15" />
                </div>
                <div class="form-group">
                    <label>Version</label>
                    <input type="text" id="editSubVersion" maxlength="10" />
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="editSubCategory">
                        <option value="game">game</option>
                        <option value="emulator">emulator</option>
                        <option value="tool">tool</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description (max 50)</label>
                    <textarea id="editSubDescription" rows="2" maxlength="50"></textarea>
                </div>
                <div id="editSubStatus" class="status-msg"></div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="saveEditSubmission()">Save</button>
                    <button class="btn btn-secondary" onclick="closeEditSubmissionModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Ban User Modal -->
    <div id="banUserModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>🔨 Ban User</h2>
                <button class="modal-close" onclick="closeBanUserModal()">✕</button>
            </div>
            <div id="banUserContent">
                <div class="form-group">
                    <label>Ban Reason</label>
                    <input type="text" id="banReason" placeholder="Reason for ban" />
                </div>
                <div class="form-group">
                    <label>Ban Duration (days, 0 for permanent)</label>
                    <input type="number" id="banDuration" value="7" min="0" />
                </div>
                <div id="banUserStatus" class="status-msg"></div>
                <div class="actions">
                    <button class="btn btn-danger" onclick="confirmBanUser()">Ban User</button>
                    <button class="btn btn-secondary" onclick="closeBanUserModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal-overlay">
        <div class="modal-box wide">
            <div class="modal-header">
                <h2>👤 Edit User</h2>
                <button class="modal-close" onclick="closeEditUserModal()">✕</button>
            </div>
            <div id="editUserContent">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="editUserUsername" disabled />
                </div>
                <div class="form-group">
                    <label>Bio (max 200)</label>
                    <textarea id="editUserBio" rows="3" maxlength="200"></textarea>
                </div>
                <div class="form-group">
                    <label>Username Color</label>
                    <div class="color-picker-row">
                        <input type="color" id="editUserColor" value="#ffffff" />
                        <span class="color-hex" id="editUserColorHex">#ffffff</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Reset Key</label>
                    <input type="text" id="editUserResetKey" disabled style="font-family:monospace;" />
                </div>
                <div class="form-group">
                    <label>Banned</label>
                    <select id="editUserBanned">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </div>
                <div class="form-group" id="editUserBanReasonGroup">
                    <label>Ban Reason</label>
                    <input type="text" id="editUserBanReason" />
                </div>
                <div class="form-group" id="editUserBanUntilGroup">
                    <label>Ban Until</label>
                    <input type="datetime-local" id="editUserBanUntil" />
                </div>
                <div id="editUserStatus" class="status-msg"></div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="saveEditUser()">Save Changes</button>
                    <button class="btn btn-secondary" onclick="closeEditUserModal()">Cancel</button>
                </div>
                <div style="margin-top:12px;">
                    <button class="btn btn-success" style="width:100%;" onclick="sendNotificationFromEdit()">📨 Send Notification</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Modal (for sending to user) -->
    <div id="notificationModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>📨 Send Notification</h2>
                <button class="modal-close" onclick="closeNotificationModal()">✕</button>
            </div>
            <div class="form-group">
                <label>Message to user</label>
                <textarea id="notificationMessage" rows="4" placeholder="Type your message..." maxlength="500"></textarea>
            </div>
            <div id="notificationStatus" class="status-msg"></div>
            <div class="actions">
                <button class="btn btn-primary" onclick="sendNotification()">Send</button>
                <button class="btn btn-secondary" onclick="closeNotificationModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="admin-container">
        <div class="header">
            <h1>🛠 Admin Panel <small>Joystick Go Store</small></h1>
            <div class="user-badge">Logged in as <strong id="adminName">Admin</strong></div>
            <a href="index.html" class="back-link">← Back to Store</a>
            <button class="btn btn-danger" onclick="logoutAdmin()" style="padding:6px 16px;">Logout</button>
        </div>

        <div class="stats" id="statsContainer">
            <div class="stat-card"><div class="number" id="statTotal">0</div><div class="label">Total Games</div></div>
            <div class="stat-card"><div class="number" id="statPending">0</div><div class="label">Pending</div></div>
            <div class="stat-card"><div class="number" id="statUsers">0</div><div class="label">Users</div></div>
            <div class="stat-card"><div class="number" id="statBanned">0</div><div class="label">Banned</div></div>
        </div>

        <div class="admin-tabs">
            <button class="active" data-tab="tabSubmissions">📥 Submissions</button>
            <button data-tab="tabUsers">👥 Users</button>
            <button data-tab="tabSettings">⚙ Settings</button>
        </div>

        <!-- Submissions Panel -->
        <div id="tabSubmissions" class="tab-panel active">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:14px;">
                <h3 style="font-weight:400;font-size:18px;color:#ddd;">All Submissions</h3>
                <span class="text-muted" id="submissionCount"></span>
            </div>
            <div id="submissionsList"></div>
            <div id="submissionsPagination" class="pagination"></div>
        </div>

        <!-- Users Panel -->
        <div id="tabUsers" class="tab-panel">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:14px;">
                <h3 style="font-weight:400;font-size:18px;color:#ddd;">User Management</h3>
                <span class="text-muted" id="userCount"></span>
            </div>
            <div id="usersList"></div>
            <div id="usersPagination" class="pagination"></div>
        </div>

        <!-- Settings Panel -->
        <div id="tabSettings" class="tab-panel">
            <div class="password-section">
                <h4 style="margin-bottom:12px;font-weight:400;color:#ddd;">Change Admin Password</h4>
                <div class="row">
                    <div class="field"><label>New Password</label><input type="password" id="adminNewPassword" placeholder="New password" /></div>
                    <div class="field"><label>Confirm</label><input type="password" id="adminConfirmPassword" placeholder="Confirm" /></div>
                    <button class="btn btn-success" onclick="changeAdminPassword()">Update Password</button>
                </div>
                <div id="adminPwdStatus" class="status-msg"></div>
            </div>
            <div class="password-section">
                <h4 style="margin-bottom:12px;font-weight:400;color:#ddd;">Admin Reset Key</h4>
                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                    <span style="font-family:monospace;font-size:18px;background:rgba(109,93,251,0.08);padding:8px 16px;border-radius:12px;border:1px solid rgba(109,93,251,0.2);color:#b8b8ff;" id="adminResetKeyDisplay">—</span>
                    <button class="btn btn-sm" onclick="copyAdminKey()">Copy</button>
                    <button class="btn btn-sm warning" onclick="regenerateAdminKey()">Regenerate</button>
                </div>
            </div>
            <div style="margin-top:20px;">
                <button class="btn btn-danger" onclick="if(confirm('Reset all data? This cannot be undone!')){localStorage.clear();alert('Data cleared. Reloading...');location.reload();}">⚠ Reset All Data</button>
            </div>
        </div>
    </div>

    <script>
        // ─── CONFIG ──────────────────────────────────────────────────────────
        const ADMIN_NAME = 'NYC0DEV';
        let currentAdmin = null;
        let users = [];
        let submissions = [];
        let storeGames = [];

        // Pagination vars
        let subPage = 1;
        let subPerPage = 10;
        let userPage = 1;
        let userPerPage = 10;

        // Editing state
        let editingSubmissionIndex = null;
        let editingUser = null;
        let notifyingUser = null;

        // ─── TOAST ──────────────────────────────────────────────────────────
        let toastTimer = null;
        function showToast(msg, type = 'success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
        }

        // ─── DATA LOAD/SAVE ──────────────────────────────────────────────────
        function loadData() {
            users = JSON.parse(localStorage.getItem('jgs_users') || '[]');
            submissions = JSON.parse(localStorage.getItem('jgs_submissions') || '[]');
            storeGames = JSON.parse(localStorage.getItem('jgs_store') || '[]');
            // Ensure admin exists
            let admin = users.find(u => u.username === ADMIN_NAME);
            if (!admin) {
                admin = {
                    username: ADMIN_NAME,
                    password: '',
                    created: new Date().toISOString(),
                    isAdmin: true,
                    hasPassword: false,
                    githubLogin: ADMIN_NAME,
                    name: ADMIN_NAME,
                    resetKey: 'ADMIN-KEY-' + Math.random().toString(36).substr(2, 8).toUpperCase(),
                    usernameColor: '#ffffff',
                    bio: 'Store Administrator',
                    banned: false,
                    banReason: '',
                    banUntil: null,
                    notifications: []
                };
                users.push(admin);
                saveUsers();
            } else {
                admin.isAdmin = true;
                if (!admin.resetKey) {
                    admin.resetKey = 'ADMIN-KEY-' + Math.random().toString(36).substr(2, 8).toUpperCase();
                    saveUsers();
                }
            }
            // Ensure each user has notifications array
            users.forEach(u => { if (!u.notifications) u.notifications = []; });
        }

        function saveUsers() { localStorage.setItem('jgs_users', JSON.stringify(users)); }
        function saveSubmissions() { localStorage.setItem('jgs_submissions', JSON.stringify(submissions)); }
        function saveStore() { localStorage.setItem('jgs_store', JSON.stringify(storeGames)); }

        function formatFileSize(bytes) {
            if (bytes === undefined || bytes === null) return '—';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        // ─── AUTH ──────────────────────────────────────────────────────────
        function restoreAdminSession() {
            const saved = localStorage.getItem('jgs_current_user');
            if (saved) {
                const user = JSON.parse(saved);
                loadData();
                const exists = users.find(u => u.username === user.username && u.isAdmin === true);
                if (exists) {
                    currentAdmin = exists;
                    document.getElementById('adminName').textContent = currentAdmin.username;
                    return true;
                }
            }
            // Redirect to login if not admin
            window.location.href = 'index.html';
            return false;
        }

        function logoutAdmin() {
            localStorage.removeItem('jgs_current_user');
            localStorage.removeItem('github_token');
            window.location.href = 'index.html';
        }

        // ─── STATS ──────────────────────────────────────────────────────────
        function updateStats() {
            const total = storeGames.length;
            const pending = submissions.filter(s => s.status === 'pending').length;
            const userCount = users.length;
            const banned = users.filter(u => u.banned).length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statUsers').textContent = userCount;
            document.getElementById('statBanned').textContent = banned;
        }

        // ─── SUBMISSIONS ──────────────────────────────────────────────────
        function renderSubmissions() {
            const container = document.getElementById('submissionsList');
            const countEl = document.getElementById('submissionCount');
            const total = submissions.length;
            const totalPages = Math.ceil(total / subPerPage);
            if (subPage > totalPages) subPage = Math.max(1, totalPages);
            const start = (subPage - 1) * subPerPage;
            const end = start + subPerPage;
            const pageItems = submissions.slice().reverse().slice(start, end);

            countEl.textContent = total + ' submission' + (total > 1 ? 's' : '');

            if (!pageItems.length) {
                container.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No submissions</p></div>';
                document.getElementById('submissionsPagination').innerHTML = '';
                return;
            }

            container.innerHTML = pageItems.map((s, idx) => {
                const realIndex = submissions.length - 1 - (start + idx);
                const statusClass = s.status || 'pending';
                const sizeStr = s.fileSize ? formatFileSize(s.fileSize) : '—';
                return `
                    <div class="card-item">
                        <div class="info">
                            <div class="title">${s.title || 'Untitled'} <span class="status-badge ${statusClass}">${statusClass}</span></div>
                            <div class="meta">
                                by ${s.author} · v${s.version || '1.0'} · ${s.category || 'game'} · ${sizeStr} · ${s.created ? new Date(s.created).toLocaleDateString() : '—'}
                                ${s.description ? '· ' + s.description : ''}
                            </div>
                        </div>
                        <div class="actions">
                            ${s.fileData ? `<button class="btn-sm" onclick="downloadSubmission(${realIndex})">⬇ Download</button>` : ''}
                            <button class="btn-sm warning" onclick="editSubmission(${realIndex})">✎ Edit</button>
                            ${statusClass === 'pending' ? `<button class="btn-sm success" onclick="approveSubmission(${realIndex})">✔ Approve</button>` : ''}
                            ${statusClass !== 'rejected' ? `<button class="btn-sm danger" onclick="rejectSubmission(${realIndex})">✖ Reject</button>` : ''}
                            ${statusClass === 'approved' ? `<button class="btn-sm" onclick="viewInStoreFromAdmin('${s.title}')">👁 View in Store</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            // Pagination
            let pagHtml = '';
            if (totalPages > 1) {
                pagHtml = `
                    <button onclick="subPage=Math.max(1,subPage-1);renderSubmissions();" ${subPage<=1?'disabled':''}>◀</button>
                    <span class="page-info">${subPage} / ${totalPages}</span>
                    <button onclick="subPage=Math.min(${totalPages},subPage+1);renderSubmissions();" ${subPage>=totalPages?'disabled':''}>▶</button>
                `;
            }
            document.getElementById('submissionsPagination').innerHTML = pagHtml;
        }

        function downloadSubmission(index) {
            const s = submissions[index];
            if (!s || !s.fileData) { showToast('No file data available', 'error'); return; }
            try {
                const byteCharacters = atob(s.fileData);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/zip' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (s.title || 'submission') + '.zip';
                a.click();
                URL.revokeObjectURL(url);
                showToast('⬇ Downloaded ' + s.title, 'success');
            } catch (e) {
                showToast('Error downloading file', 'error');
            }
        }

        function approveSubmission(index) {
            const s = submissions[index];
            if (!s) return;
            if (s.status === 'approved') { showToast('Already approved', 'error'); return; }
            // Move to store
            const game = {
                id: 'game_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                title: s.title,
                author: s.author,
                authorColor: s.authorColor || '#ffffff',
                version: s.version || '1.0',
                category: s.category || 'game',
                description: s.description || '',
                fileData: s.fileData,
                fileSize: s.fileSize,
                image: s.image || '',
                approvedAt: new Date().toISOString(),
                installFolder: s.installFolder || '',
                miscFolder: s.miscFolder || ''
            };
            storeGames.push(game);
            saveStore();

            // Update submission status
            s.status = 'approved';
            saveSubmissions();

            // Notify user
            const user = users.find(u => u.username === s.author);
            if (user) {
                if (!user.notifications) user.notifications = [];
                user.notifications.push({
                    message: `🎉 Your game "${s.title}" has been approved and is now in the store!`,
                    timestamp: new Date().toISOString(),
                    read: false
                });
                saveUsers();
            }

            showToast('✅ Approved and added to store!', 'success');
            renderSubmissions();
            updateStats();
        }

        function rejectSubmission(index) {
            const s = submissions[index];
            if (!s) return;
            if (s.status === 'rejected') { showToast('Already rejected', 'error'); return; }
            s.status = 'rejected';
            saveSubmissions();
            // Notify user
            const user = users.find(u => u.username === s.author);
            if (user) {
                if (!user.notifications) user.notifications = [];
                user.notifications.push({
                    message: `❌ Your game "${s.title}" was rejected. Please check the requirements and try again.`,
                    timestamp: new Date().toISOString(),
                    read: false
                });
                saveUsers();
            }
            showToast('❌ Rejected', 'error');
            renderSubmissions();
            updateStats();
        }

        function editSubmission(index) {
            editingSubmissionIndex = index;
            const s = submissions[index];
            if (!s) return;
            document.getElementById('editSubTitle').value = s.title || '';
            document.getElementById('editSubVersion').value = s.version || '1.0';
            document.getElementById('editSubCategory').value = s.category || 'game';
            document.getElementById('editSubDescription').value = s.description || '';
            document.getElementById('editSubStatus').textContent = '';
            document.getElementById('editSubmissionModal').classList.add('show');
        }

        function closeEditSubmissionModal() {
            document.getElementById('editSubmissionModal').classList.remove('show');
            editingSubmissionIndex = null;
        }

        function saveEditSubmission() {
            if (editingSubmissionIndex === null) return;
            const s = submissions[editingSubmissionIndex];
            if (!s) return;
            const title = document.getElementById('editSubTitle').value.trim();
            const version = document.getElementById('editSubVersion').value.trim();
            const category = document.getElementById('editSubCategory').value;
            const description = document.getElementById('editSubDescription').value.trim();
            if (!title) { document.getElementById('editSubStatus').textContent = 'Title required'; return; }
            s.title = title;
            s.version = version || '1.0';
            s.category = category;
            s.description = description;
            saveSubmissions();
            document.getElementById('editSubStatus').textContent = '✅ Saved!';
            document.getElementById('editSubStatus').className = 'status-msg success';
            showToast('Submission updated', 'success');
            renderSubmissions();
            setTimeout(closeEditSubmissionModal, 800);
        }

        function viewInStoreFromAdmin(title) {
            // Switch to store tab in main app? Since we're in admin, just redirect to index.html with a hash or query.
            // We'll open a new window/tab to index.html and show a toast there, but simpler: open index.html and hope user sees it.
            window.open('index.html#store', '_blank');
            // We could also pass a query param, but not needed.
            showToast('Opened store in new tab', 'success');
        }

        // ─── USERS ──────────────────────────────────────────────────────────
        function renderUsers() {
            const container = document.getElementById('usersList');
            const countEl = document.getElementById('userCount');
            const total = users.length;
            const totalPages = Math.ceil(total / userPerPage);
            if (userPage > totalPages) userPage = Math.max(1, totalPages);
            const start = (userPage - 1) * userPerPage;
            const end = start + userPerPage;
            const pageItems = users.slice(start, end);

            countEl.textContent = total + ' user' + (total > 1 ? 's' : '');

            if (!pageItems.length) {
                container.innerHTML = '<div class="empty"><div class="icon">👤</div><p>No users</p></div>';
                document.getElementById('usersPagination').innerHTML = '';
                return;
            }

            container.innerHTML = pageItems.map(u => {
                const isBanned = u.banned ? '🔴 Banned' : '✅ Active';
                const color = u.usernameColor || '#ffffff';
                return `
                    <div class="card-item">
                        <div class="info">
                            <div class="title" style="color:${color};">${u.username} ${u.isAdmin ? '⭐' : ''}</div>
                            <div class="meta">
                                ${isBanned} · ${u.created ? new Date(u.created).toLocaleDateString() : '—'} 
                                ${u.bio ? '· ' + u.bio : ''}
                                ${u.banned && u.banReason ? '· Reason: ' + u.banReason : ''}
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn-sm" onclick="editUser('${u.username}')">✎ Edit</button>
                            ${u.username !== ADMIN_NAME ? (u.banned ? `<button class="btn-sm success" onclick="unbanUser('${u.username}')">🔓 Unban</button>` : `<button class="btn-sm danger" onclick="openBanUserModal('${u.username}')">🔨 Ban</button>`) : ''}
                            <button class="btn-sm" onclick="openNotificationForUser('${u.username}')">📨 Notify</button>
                            ${u.username !== ADMIN_NAME ? `<button class="btn-sm danger" onclick="if(confirm('Delete user ${u.username}? This will also remove their submissions and games.')){deleteUser('${u.username}');}">🗑 Delete</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            // Pagination
            let pagHtml = '';
            if (totalPages > 1) {
                pagHtml = `
                    <button onclick="userPage=Math.max(1,userPage-1);renderUsers();" ${userPage<=1?'disabled':''}>◀</button>
                    <span class="page-info">${userPage} / ${totalPages}</span>
                    <button onclick="userPage=Math.min(${totalPages},userPage+1);renderUsers();" ${userPage>=totalPages?'disabled':''}>▶</button>
                `;
            }
            document.getElementById('usersPagination').innerHTML = pagHtml;
        }

        function editUser(username) {
            const user = users.find(u => u.username === username);
            if (!user) return;
            editingUser = user;
            document.getElementById('editUserUsername').value = user.username;
            document.getElementById('editUserBio').value = user.bio || '';
            document.getElementById('editUserColor').value = user.usernameColor || '#ffffff';
            document.getElementById('editUserColorHex').textContent = user.usernameColor || '#ffffff';
            document.getElementById('editUserResetKey').value = user.resetKey || '—';
            document.getElementById('editUserBanned').value = user.banned ? 'true' : 'false';
            document.getElementById('editUserBanReason').value = user.banReason || '';
            document.getElementById('editUserBanUntil').value = user.banUntil ? new Date(user.banUntil).toISOString().slice(0,16) : '';
            document.getElementById('editUserStatus').textContent = '';
            document.getElementById('editUserModal').classList.add('show');
            // Color picker live update
            const picker = document.getElementById('editUserColor');
            picker.oninput = function() {
                document.getElementById('editUserColorHex').textContent = this.value;
            };
            // Show/hide ban fields based on banned status
            const bannedSelect = document.getElementById('editUserBanned');
            bannedSelect.onchange = function() {
                const show = this.value === 'true';
                document.getElementById('editUserBanReasonGroup').style.display = show ? 'block' : 'none';
                document.getElementById('editUserBanUntilGroup').style.display = show ? 'block' : 'none';
            };
            bannedSelect.dispatchEvent(new Event('change'));
        }

        function closeEditUserModal() {
            document.getElementById('editUserModal').classList.remove('show');
            editingUser = null;
        }

        function saveEditUser() {
            if (!editingUser) return;
            const bio = document.getElementById('editUserBio').value.trim();
            const color = document.getElementById('editUserColor').value;
            const banned = document.getElementById('editUserBanned').value === 'true';
            const banReason = document.getElementById('editUserBanReason').value.trim();
            const banUntil = document.getElementById('editUserBanUntil').value;

            editingUser.bio = bio;
            editingUser.usernameColor = color;
            editingUser.banned = banned;
            editingUser.banReason = banReason;
            editingUser.banUntil = banUntil ? new Date(banUntil).toISOString() : null;

            saveUsers();
            document.getElementById('editUserStatus').textContent = '✅ User updated!';
            document.getElementById('editUserStatus').className = 'status-msg success';
            showToast('User updated', 'success');
            renderUsers();
            updateStats();
            setTimeout(closeEditUserModal, 800);
        }

        function openBanUserModal(username) {
            const user = users.find(u => u.username === username);
            if (!user) return;
            if (user.username === ADMIN_NAME) { showToast('Cannot ban admin', 'error'); return; }
            document.getElementById('banReason').value = '';
            document.getElementById('banDuration').value = 7;
            document.getElementById('banUserStatus').textContent = '';
            document.getElementById('banUserModal').classList.add('show');
            // Store target
            document.getElementById('banUserModal').dataset.target = username;
        }

        function closeBanUserModal() {
            document.getElementById('banUserModal').classList.remove('show');
        }

        function confirmBanUser() {
            const username = document.getElementById('banUserModal').dataset.target;
            const user = users.find(u => u.username === username);
            if (!user) { showToast('User not found', 'error'); return; }
            const reason = document.getElementById('banReason').value.trim() || 'No reason provided';
            const days = parseInt(document.getElementById('banDuration').value) || 0;
            user.banned = true;
            user.banReason = reason;
            user.banUntil = days > 0 ? new Date(Date.now() + days * 86400000).toISOString() : null;
            saveUsers();
            // Notify user
            if (!user.notifications) user.notifications = [];
            const untilMsg = days > 0 ? ` for ${days} days` : ' permanently';
            user.notifications.push({
                message: `🔨 You have been banned${untilMsg}. Reason: ${reason}`,
                timestamp: new Date().toISOString(),
                read: false
            });
            saveUsers();
            showToast(`Banned ${username}`, 'success');
            closeBanUserModal();
            renderUsers();
            updateStats();
        }

        function unbanUser(username) {
            const user = users.find(u => u.username === username);
            if (!user) return;
            user.banned = false;
            user.banReason = '';
            user.banUntil = null;
            saveUsers();
            if (!user.notifications) user.notifications = [];
            user.notifications.push({
                message: '🔓 You have been unbanned. You can now log in again.',
                timestamp: new Date().toISOString(),
                read: false
            });
            saveUsers();
            showToast(`Unbanned ${username}`, 'success');
            renderUsers();
            updateStats();
        }

        function deleteUser(username) {
            if (username === ADMIN_NAME) { showToast('Cannot delete admin', 'error'); return; }
            // Remove user
            users = users.filter(u => u.username !== username);
            // Remove their submissions
            submissions = submissions.filter(s => s.author !== username);
            // Remove their games from store
            storeGames = storeGames.filter(g => g.author !== username);
            saveUsers();
            saveSubmissions();
            saveStore();
            showToast(`Deleted user ${username}`, 'success');
            renderUsers();
            renderSubmissions();
            updateStats();
        }

        // ─── NOTIFICATIONS (from admin) ──────────────────────────────────────
        function openNotificationForUser(username) {
            notifyingUser = username;
            document.getElementById('notificationMessage').value = '';
            document.getElementById('notificationStatus').textContent = '';
            document.getElementById('notificationModal').classList.add('show');
        }

        function closeNotificationModal() {
            document.getElementById('notificationModal').classList.remove('show');
            notifyingUser = null;
        }

        function sendNotification() {
            if (!notifyingUser) { showToast('No user selected', 'error'); return; }
            const msg = document.getElementById('notificationMessage').value.trim();
            if (!msg) { document.getElementById('notificationStatus').textContent = 'Please enter a message'; return; }
            const user = users.find(u => u.username === notifyingUser);
            if (!user) { showToast('User not found', 'error'); return; }
            if (!user.notifications) user.notifications = [];
            user.notifications.push({
                message: '📨 Admin: ' + msg,
                timestamp: new Date().toISOString(),
                read: false
            });
            saveUsers();
            document.getElementById('notificationStatus').textContent = '✅ Notification sent!';
            document.getElementById('notificationStatus').className = 'status-msg success';
            showToast('Notification sent to ' + notifyingUser, 'success');
            setTimeout(closeNotificationModal, 800);
        }

        function sendNotificationFromEdit() {
            // Called from edit user modal
            if (!editingUser) return;
            const msg = prompt('Enter notification message for ' + editingUser.username + ':');
            if (msg === null) return;
            const trimmed = msg.trim();
            if (!trimmed) { showToast('Message cannot be empty', 'error'); return; }
            if (!editingUser.notifications) editingUser.notifications = [];
            editingUser.notifications.push({
                message: '📨 Admin: ' + trimmed,
                timestamp: new Date().toISOString(),
                read: false
            });
            saveUsers();
            showToast('Notification sent to ' + editingUser.username, 'success');
        }

        // ─── SETTINGS ──────────────────────────────────────────────────────
        function changeAdminPassword() {
            const newPwd = document.getElementById('adminNewPassword').value.trim();
            const confirm = document.getElementById('adminConfirmPassword').value.trim();
            const status = document.getElementById('adminPwdStatus');
            if (!newPwd || newPwd.length < 3) {
                status.textContent = 'Password must be at least 3 characters.';
                status.className = 'status-msg error';
                return;
            }
            if (newPwd !== confirm) {
                status.textContent = 'Passwords do not match.';
                status.className = 'status-msg error';
                return;
            }
            const admin = users.find(u => u.username === ADMIN_NAME);
            if (!admin) { status.textContent = 'Admin not found'; return; }
            admin.password = newPwd;
            admin.hasPassword = true;
            saveUsers();
            status.textContent = '✅ Password updated!';
            status.className = 'status-msg success';
            showToast('Admin password changed', 'success');
            document.getElementById('adminNewPassword').value = '';
            document.getElementById('adminConfirmPassword').value = '';
        }

        function copyAdminKey() {
            const keyEl = document.getElementById('adminResetKeyDisplay');
            const key = keyEl.textContent;
            if (key && key !== '—') {
                navigator.clipboard.writeText(key).then(() => {
                    showToast('Key copied!', 'success');
                }).catch(() => {
                    const range = document.createRange();
                    range.selectNode(keyEl);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    showToast('Key copied!', 'success');
                });
            } else {
                showToast('No key to copy', 'error');
            }
        }

        function regenerateAdminKey() {
            const admin = users.find(u => u.username === ADMIN_NAME);
            if (!admin) return;
            if (!confirm('Regenerate admin reset key?')) return;
            const newKey = 'ADMIN-KEY-' + Math.random().toString(36).substr(2, 8).toUpperCase();
            admin.resetKey = newKey;
            saveUsers();
            document.getElementById('adminResetKeyDisplay').textContent = newKey;
            showToast('New admin key generated', 'success');
        }

        // ─── TABS ──────────────────────────────────────────────────────────
        document.querySelectorAll('.admin-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.admin-tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                const panel = document.getElementById(this.dataset.tab);
                if (panel) panel.classList.add('active');
                // Refresh content
                if (this.dataset.tab === 'tabSubmissions') renderSubmissions();
                if (this.dataset.tab === 'tabUsers') renderUsers();
                if (this.dataset.tab === 'tabSettings') {
                    // Load admin key
                    const admin = users.find(u => u.username === ADMIN_NAME);
                    if (admin) document.getElementById('adminResetKeyDisplay').textContent = admin.resetKey || '—';
                }
            });
        });

        // ─── INIT ──────────────────────────────────────────────────────────
        function initAdmin() {
            if (!restoreAdminSession()) return;
            loadData();
            // Ensure admin has resetKey
            const admin = users.find(u => u.username === ADMIN_NAME);
            if (admin && admin.resetKey) {
                document.getElementById('adminResetKeyDisplay').textContent = admin.resetKey;
            }
            renderSubmissions();
            renderUsers();
            updateStats();
            // Show first tab (Submissions)
            document.querySelector('.admin-tabs button[data-tab="tabSubmissions"]').click();
        }

        initAdmin();

        // Close modals on backdrop click
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                }
            });
        });

        console.log('Admin panel loaded. Manage submissions, users, and settings.');
    </script>
</body>
</html>
