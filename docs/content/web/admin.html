<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store Admin</title>
    <style>
        /* ─── RESET & SHARED ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b0b18;
            color: #e0e0ee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px;
            line-height: 1.5;
        }
        .bg-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: url('https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/bg/background.png?raw=true') center/cover no-repeat;
        }
        .bg-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(200, 60, 60, 0.45), rgba(180, 80, 220, 0.35));
            backdrop-filter: blur(2px);
        }
        .container {
            max-width: 960px;
            width: 100%;
            background: rgba(18, 18, 40, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 32px;
            padding: 40px 38px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInContent 0.6s ease forwards;
        }
        @keyframes fadeInContent {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── SPLASH ─── */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: #0b0b18;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            opacity: 1;
            visibility: visible;
        }
        #splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #splash img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }
        #splash .spinner {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.06);
            border-top: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: translateX(-50%) rotate(0deg);
            }
            100% {
                transform: translateX(-50%) rotate(360deg);
            }
        }

        /* ─── MUSIC TOGGLE (off by default) ─── */
        #musicToggle {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9997;
            background: rgba(18, 18, 40, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            color: rgba(255, 255, 255, 0.6);
            user-select: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        #musicToggle:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        #musicToggle.muted {
            opacity: 0.6;
        }

        /* ─── NETWORK ERROR ─── */
        #networkError {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9998;
            background: rgba(11, 11, 24, 0.95);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 32px;
            text-align: center;
        }
        #networkError.show {
            display: flex;
        }
        #networkError .icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        #networkError h2 {
            font-weight: 400;
            font-size: 22px;
            color: #eee;
            margin-bottom: 8px;
        }
        #networkError p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            max-width: 400px;
            margin-bottom: 20px;
        }
        #networkError .btn-retry {
            padding: 10px 32px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            color: #eee;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        #networkError .btn-retry:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        h3 {
            font-weight: 400;
            font-size: 22px;
            color: #fff;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ─── TABS ─── */
        .admin-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            flex-wrap: wrap;
        }
        .admin-tabs button {
            flex: 1 1 auto;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            background: transparent;
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            min-width: 80px;
        }
        .admin-tabs button.active {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .admin-tabs button:hover:not(.active) {
            color: rgba(255, 255, 255, 0.7);
        }
        .admin-panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .admin-panel.active {
            display: block;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0.3;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── BUTTONS ─── */
        .btn-primary,
        .btn-danger,
        .btn-approve,
        .btn-reject,
        .btn-delete,
        .btn-edit,
        .btn-read {
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: rgba(255, 255, 255, 0.06);
            color: #eee;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .btn-danger {
            background: rgba(255, 70, 70, 0.1);
            color: #ff6b6b;
            border: 1px solid rgba(255, 70, 70, 0.15);
        }
        .btn-danger:hover {
            background: rgba(255, 70, 70, 0.2);
        }
        .btn-approve {
            background: rgba(80, 220, 160, 0.12);
            color: #50dca0;
        }
        .btn-approve:hover {
            background: rgba(80, 220, 160, 0.2);
        }
        .btn-reject {
            background: rgba(255, 70, 70, 0.12);
            color: #ff4646;
        }
        .btn-reject:hover {
            background: rgba(255, 70, 70, 0.2);
        }
        .btn-delete {
            background: rgba(255, 70, 70, 0.08);
            color: #ff6b6b;
        }
        .btn-delete:hover {
            background: rgba(255, 70, 70, 0.18);
        }
        .btn-edit {
            background: rgba(109, 93, 251, 0.10);
            color: #b8b8ff;
            border: 1px solid rgba(109, 93, 251, 0.15);
        }
        .btn-edit:hover {
            background: rgba(109, 93, 251, 0.20);
        }
        .btn-save {
            background: rgba(80, 220, 160, 0.12);
            color: #50dca0;
            border: 1px solid rgba(80, 220, 160, 0.15);
        }
        .btn-save:hover {
            background: rgba(80, 220, 160, 0.20);
        }
        .btn-cancel {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-read {
            background: rgba(109, 93, 251, 0.08);
            color: #b8b8ff;
            border: 1px solid rgba(109, 93, 251, 0.1);
        }
        .btn-read:hover {
            background: rgba(109, 93, 251, 0.15);
        }
        .btn-danger-hidden {
            background: rgba(255, 70, 70, 0.15);
            color: #ff4646;
            border: 1px solid rgba(255, 70, 70, 0.2);
            display: none;
        }
        .btn-danger-hidden.enabled {
            display: inline-block;
        }
        .btn-danger-hidden:hover {
            background: rgba(255, 70, 70, 0.25);
        }

        /* ─── CARDS ─── */
        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 8px;
            flex-wrap: wrap;
            transition: 0.2s;
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .card .info h4 {
            font-size: 15px;
            font-weight: 500;
            color: #eee;
        }
        .card .info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 2px;
        }
        .card .info .message-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            padding-left: 10px;
        }
        .card .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .status {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 40px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .status-pending {
            background: rgba(255, 180, 0, 0.12);
            color: #ffb800;
        }
        .status-approved {
            background: rgba(80, 220, 160, 0.12);
            color: #50dca0;
        }
        .status-rejected {
            background: rgba(255, 70, 70, 0.12);
            color: #ff4646;
        }
        .status-unread {
            background: rgba(255, 180, 0, 0.12);
            color: #ffb800;
        }
        .status-read {
            background: rgba(80, 220, 160, 0.08);
            color: rgba(255, 255, 255, 0.3);
        }

        /* ─── FORMS ─── */
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .form-row label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            margin-bottom: 3px;
            letter-spacing: 0.3px;
        }
        .form-row input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: #eee;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .form-row input:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }
        .form-row .field {
            flex: 1 1 160px;
            min-width: 120px;
        }
        .form-row .field-wide {
            flex: 2 1 220px;
            min-width: 160px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }
        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: rgba(255, 70, 70, 0.6);
            cursor: pointer;
        }
        .checkbox-row label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }

        .section-title {
            font-weight: 400;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
        }
        .divider {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .empty-state {
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            padding: 24px 0;
            font-size: 14px;
        }

        /* ─── INLINE EDIT ─── */
        .inline-edit {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .inline-edit input {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #eee;
            font-size: 14px;
            outline: none;
            width: 140px;
        }
        .inline-edit input:focus {
            border-color: rgba(109, 93, 251, 0.3);
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(18, 18, 40, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px 24px;
            color: #eee;
            font-size: 14px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transform: translateY(80px);
            opacity: 0;
            transition: 0.4s ease;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .toast.success {
            border-color: rgba(80, 220, 160, 0.2);
        }
        .toast.error {
            border-color: rgba(255, 70, 70, 0.2);
        }

        @media (max-width: 640px) {
            .container {
                padding: 24px 18px;
            }
            .card {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .card .actions {
                justify-content: flex-start;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-actions {
                width: 100%;
                justify-content: flex-start;
            }
            .form-row {
                flex-direction: column;
            }
            .form-row .field,
            .form-row .field-wide {
                flex: 1 1 auto;
                width: 100%;
            }
            .inline-edit {
                flex-direction: column;
                align-items: stretch;
            }
            .inline-edit input {
                width: 100%;
            }
            #splash .spinner {
                bottom: 40px;
            }
            #musicToggle {
                bottom: 20px;
                left: 20px;
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── SPLASH ─── -->
    <div id="splash">
        <img src="https://github.com/NYC0DEV/Joystick_Go_Store/blob/main/docs/content/bg/splashscreen3.png?raw=true" alt="Splash" />
        <div class="spinner"></div>
    </div>

    <!-- ─── NETWORK ERROR ─── -->
    <div id="networkError">
        <div class="icon">📡</div>
        <h2>No Internet Connection</h2>
        <p>Please check your network and try again.</p>
        <button class="btn-retry" onclick="handleRetry()">🔄 Retry</button>
    </div>

    <!-- ─── MUSIC (off by default) ─── -->
    <div id="musicToggle" title="Toggle music" class="muted">🔇</div>

    <!-- ─── TOAST ─── -->
    <div id="toast" class="toast"></div>

    <!-- ─── MAIN ─── -->
    <div class="bg-wrap"></div>
    <div class="container" id="mainContent">
        <div class="header">
            <h3>⚙ Admin Dashboard</h3>
            <div class="header-actions">
                <button onclick="loadAdminData()" class="btn-primary">⟳ Refresh</button>
                <a href="/" class="btn-primary" style="border-color:#6d5dfb;color:#b8b8ff;">← Store</a>
            </div>
        </div>

        <!-- Admin Tabs -->
        <div class="admin-tabs">
            <button class="active" data-panel="panelSubmissions">📥 Submissions</button>
            <button data-panel="panelUsers">👥 Users</button>
            <button data-panel="panelRequests">📩 Requests</button>
            <button data-panel="panelMessages">✉ Messages</button>
        </div>

        <!-- Panels -->
        <div id="panelSubmissions" class="admin-panel active"><div class="section-title">📥 Submissions</div><div id="submissionList"></div></div>
        <div id="panelUsers" class="admin-panel">
            <div class="section-title">👥 Users</div><div id="userList"></div>
            <div class="divider" style="margin-top:20px;">
                <div class="section-title">⚠️ Dangerous Actions</div>
                <div class="checkbox-row">
                    <input type="checkbox" id="resetEnableCheckbox" />
                    <label for="resetEnableCheckbox">Enable reset all usernames (hidden button)</label>
                </div>
                <button id="resetAllBtn" class="btn-danger-hidden">🔄 Reset All Usernames</button>
                <div style="font-size:11px;color:rgba(255,255,255,0.2);margin-top:6px;">
                    This will rename every user to "user_1", "user_2", etc. It will also update all submissions and store entries.
                </div>
            </div>
        </div>
        <div id="panelRequests" class="admin-panel"><div class="section-title">📩 Name Change Requests</div><div id="requestList"></div></div>
        <div id="panelMessages" class="admin-panel"><div class="section-title">✉ Messages from users</div><div id="messageList"></div></div>
    </div>

    <script>
        // ─── AUTH GUARD ──────────────────────────────────────────────────────────
        (function authGuard() {
            try {
                const savedUserStr = localStorage.getItem('jgs_current_user');
                const adminUser = savedUserStr ? JSON.parse(savedUserStr) : null;
                if (!adminUser || adminUser.githubLogin !== 'NYC0DEV') {
                    window.location.replace('/');
                    return;
                }
            } catch (e) { window.location.replace('/'); }
        })();

        // ─── HELPERS ─────────────────────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        let users = [],
            submissions = [],
            storeGames = [],
            nameRequests = [],
            contactMessages = [];
        let installPath = 'sd:\\bin\\Joystick_Go_Store\\games\\';
        let miscPath = 'sd:\\Games\\Misc\\';
        let splashHidden = false;

        // ─── SPLASH ──────────────────────────────────────────────────────────────
        function hideSplash() {
            if (splashHidden) return;
            splashHidden = true;
            const splash = $('splash');
            splash.classList.add('hidden');
            setTimeout(() => { splash.style.display = 'none'; }, 800);
        }
        setTimeout(hideSplash, 2000);
        $('splash').addEventListener('click', hideSplash);

        // ─── MUSIC ──────────────────────────────────────────────────────────────
        let audio = null,
            isMusicMuted = true;

        function initMusic() {
            try {
                audio = new Audio(
                    'https://github.com/NYC0DEV/Joystick_Go_Store/raw/refs/heads/main/docs/content/tracks/Glass_Marble.mp3'
                );
                audio.loop = true;
                audio.volume = 0.5;
                const toggle = $('musicToggle');
                toggle.addEventListener('click', toggleMusic);
            } catch (e) { /* ignore */ }
        }

        function toggleMusic() {
            if (!audio) return;
            if (isMusicMuted) {
                audio.play().catch(() => {});
                isMusicMuted = false;
                $('musicToggle').textContent = '🎵';
                $('musicToggle').classList.remove('muted');
            } else {
                audio.pause();
                isMusicMuted = true;
                $('musicToggle').textContent = '🔇';
                $('musicToggle').classList.add('muted');
            }
        }

        // ─── NETWORK ERROR ──────────────────────────────────────────────────────
        function showNetworkError() { const overlay = $('networkError');
            overlay.classList.add('show');
            hideSplash(); }

        function hideNetworkError() { const overlay = $('networkError');
            overlay.classList.remove('show'); }

        function handleRetry() { hideNetworkError();
            loadAdminData(); }

        function checkNetwork() { return navigator.onLine; }

        // ─── TOAST ──────────────────────────────────────────────────────────────
        let toastTimer = null;

        function showToast(msg, type = 'success') {
            const el = $('toast');
            el.textContent = msg;
            el.className = 'toast ' + type + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
        }

        // ─── LOAD DATA ──────────────────────────────────────────────────────────
        function loadAdminData() {
            if (!checkNetwork()) { showNetworkError(); return; }
            try {
                users = JSON.parse(localStorage.getItem('jgs_users') || '[]');
                submissions = JSON.parse(localStorage.getItem('jgs_submissions') || '[]');
                storeGames = JSON.parse(localStorage.getItem('jgs_store') || '[]');
                nameRequests = JSON.parse(localStorage.getItem('jgs_name_requests') || '[]');
                contactMessages = JSON.parse(localStorage.getItem('jgs_contact_messages') || '[]');

                // (optional) load paths from localStorage if needed
                // ...

                renderUsers();
                renderSubmissions();
                renderRequests();
                renderMessages();
                hideNetworkError();
                hideSplash();
            } catch (e) {
                showToast('Error loading data', 'error');
            }
        }

        // ─── RENDER FUNCTIONS ──────────────────────────────────────────────────
        function renderUsers() {
            const container = $('userList');
            if (!users.length) { container.innerHTML = '<div class="empty-state">No users yet</div>'; return; }
            container.innerHTML = users.map((u, idx) => {
                const isAdmin = u.githubLogin === 'NYC0DEV';
                return `<div class="card" data-user-idx="${idx}">
                        <div class="info">
                            <h4>${u.name} ${isAdmin ? ' ⭐ <span style="font-weight:400;font-size:12px;color:rgba(255,255,255,0.3);">(admin)</span>' : ''}</h4>
                            <p>GitHub: ${u.githubLogin} · Created: ${u.created ? u.created.slice(0,10) : 'recently'} · ID: ${u.githubId || '—'}</p>
                        </div>
                        <div class="actions">
                            ${!isAdmin ? `
                                <button class="btn-edit" onclick="startEditUsername(${idx})">✎ Rename</button>
                                <button class="btn-delete" onclick="deleteUser(${idx})">🗑 Delete</button>
                            ` : `<span style="font-size:12px;color:rgba(255,255,255,0.2);">🔒 protected</span>`}
                        </div>
                    </div>`;
            }).join('');
        }

        function deleteUser(idx) {
            const u = users[idx];
            if (!u) return;
            if (!confirm(`Delete user "${u.name}" (GitHub: ${u.githubLogin})? This cannot be undone.`)) return;
            users.splice(idx, 1);
            localStorage.setItem('jgs_users', JSON.stringify(users));
            renderUsers();
            showToast(`User "${u.name}" deleted`, 'error');
        }

        function startEditUsername(idx) {
            const u = users[idx];
            if (!u) return;
            const card = document.querySelector(`.card[data-user-idx="${idx}"]`);
            if (!card) return;
            const info = card.querySelector('.info');
            const actions = card.querySelector('.actions');
            const origName = u.name;
            info.innerHTML = `<div class="inline-edit">
                    <div style="flex:1;min-width:100px;">
                        <label style="font-size:10px;color:rgba(255,255,255,0.25);text-transform:uppercase;display:block;margin-bottom:2px;">Username</label>
                        <input type="text" id="editNameInput" value="${u.name}" maxlength="7" pattern="[A-Za-z0-9]+" />
                    </div>
                    <div style="font-size:11px;color:rgba(255,255,255,0.2);">GitHub: ${u.githubLogin}</div>
                </div>`;
            actions.innerHTML = `
                    <button class="btn-save" onclick="saveUsername(${idx})">✓ Save</button>
                    <button class="btn-cancel" onclick="cancelEditUsername(${idx}, '${origName}')">✕ Cancel</button>
                `;
            const input = document.getElementById('editNameInput');
            if (input) { input.focus();
                input.select(); }
        }

        function cancelEditUsername(idx, origName) { renderUsers(); }

        function saveUsername(idx) {
            const u = users[idx];
            if (!u) return;
            const input = document.getElementById('editNameInput');
            if (!input) return;
            const newName = input.value.trim();
            if (!newName) { showToast('Username cannot be empty', 'error'); return; }
            if (newName.length > 7) { showToast('Max 7 characters', 'error'); return; }
            if (!/^[a-zA-Z0-9]+$/.test(newName)) { showToast('Only letters and numbers', 'error'); return; }

            const dup = users.find((other, i) => i !== idx && other.name.toLowerCase() === newName.toLowerCase());
            if (dup) { showToast(`"${newName}" is already taken`, 'error'); return; }

            const oldName = u.name;
            u.name = newName;
            localStorage.setItem('jgs_users', JSON.stringify(users));

            submissions = JSON.parse(localStorage.getItem('jgs_submissions') || '[]');
            submissions.forEach(s => { if (s.author === oldName) s.author = newName; });
            localStorage.setItem('jgs_submissions', JSON.stringify(submissions));

            storeGames = JSON.parse(localStorage.getItem('jgs_store') || '[]');
            storeGames.forEach(g => { if (g.author === oldName) g.author = newName; });
            localStorage.setItem('jgs_store', JSON.stringify(storeGames));

            renderUsers();
            renderSubmissions();
            showToast(`User renamed "${oldName}" → "${newName}"`, 'success');
        }

        function renderSubmissions() {
            const container = $('submissionList');
            if (!submissions.length) { container.innerHTML = '<div class="empty-state">No submissions</div>'; return; }
            container.innerHTML = submissions.map((s, idx) => `
                    <div class="card">
                        <div class="info">
                            <h4>${s.title || 'Untitled'}</h4>
                            <p>by ${s.author || 'unknown'} · ${s.category || 'game'} · v${s.version || '1.0'} ${s.file ? ' · 📎 ' + s.file : ''} ${s.fileSize ? ' · ' + (s.fileSize/1024/1024).toFixed(1) + ' MB' : ''}</p>
                            <span class="status status-${s.status || 'pending'}">${s.status || 'pending'}</span>
                            ${s.description ? `<p style="font-size:11px;color:rgba(255,255,255,0.2);margin-top:4px;">${s.description}</p>` : ''}
                        </div>
                        <div class="actions">
                            ${s.status === 'pending' ? `
                                <button class="btn-approve" onclick="approveSubmission(${idx})">✓ Approve</button>
                                <button class="btn-reject" onclick="rejectSubmission(${idx})">✕ Reject</button>
                            ` : ''}
                            <button class="btn-delete" onclick="deleteSubmission(${idx})">🗑 Remove</button>
                        </div>
                    </div>
                `).join('');
        }

        function approveSubmission(idx) {
            const s = submissions[idx];
            if (!s) return;
            if (!confirm(`Approve "${s.title}" by ${s.author}?`)) return;
            s.status = 'approved';
            const game = {
                id: Date.now(),
                title: s.title,
                author: s.author,
                category: s.category || 'game',
                version: s.version || '1.0',
                description: s.description || '',
                image: s.image || '',
                installFolder: installPath + s.title + '/',
                miscFolder: miscPath + s.title + '/',
                launcher: '',
                appName: s.title,
                submittedAt: s.created || new Date().toISOString()
            };
            storeGames = JSON.parse(localStorage.getItem('jgs_store') || '[]');
            storeGames.push(game);
            localStorage.setItem('jgs_store', JSON.stringify(storeGames));
            localStorage.setItem('jgs_submissions', JSON.stringify(submissions));
            renderSubmissions();
            showToast(`"${s.title}" approved and added to store!`, 'success');
        }

        function rejectSubmission(idx) {
            const s = submissions[idx];
            if (!s) return;
            if (!confirm(`Reject "${s.title}"?`)) return;
            s.status = 'rejected';
            localStorage.setItem('jgs_submissions', JSON.stringify(submissions));
            renderSubmissions();
            showToast(`"${s.title}" rejected`, 'error');
        }

        function deleteSubmission(idx) {
            const s = submissions[idx];
            if (!s) return;
            if (!confirm(`Remove submission "${s.title}"? This is permanent.`)) return;
            submissions.splice(idx, 1);
            localStorage.setItem('jgs_submissions', JSON.stringify(submissions));
            renderSubmissions();
            showToast(`Submission removed`, 'error');
        }

        function renderRequests() {
            const container = $('requestList');
            const pending = nameRequests.filter(r => r.status === 'pending');
            if (!pending.length) { container.innerHTML = '<div class="empty-state">No pending name change requests</div>'; return; }
            container.innerHTML = pending.map((req, idx) => {
                const user = users.find(u => u.githubId === req.userId);
                const currentName = user ? user.name : req.currentName;
                return `<div class="card">
                        <div class="info">
                            <h4>${req.requestedName}</h4>
                            <p>From: ${currentName} (GitHub ID: ${req.userId}) · Requested: ${new Date(req.timestamp).toLocaleString()}</p>
                        </div>
                        <div class="actions">
                            <button class="btn-approve" onclick="approveNameChange('${req.userId}')">✓ Approve</button>
                            <button class="btn-reject" onclick="rejectNameChange('${req.userId}')">✕ Reject</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function approveNameChange(userId) {
            const reqIndex = nameRequests.findIndex(r => r.userId === userId && r.status === 'pending');
            if (reqIndex === -1) return;
            const req = nameRequests[reqIndex];
            const userIndex = users.findIndex(u => u.githubId === userId);
            if (userIndex === -1) { showToast('User not found', 'error'); return; }
            const oldName = users[userIndex].name;
            const newName = req.requestedName;
            const taken = users.find((u, i) => i !== userIndex && u.name === newName);
            if (taken) { showToast('New name is already taken by another user.', 'error'); return; }
            users[userIndex].name = newName;
            localStorage.setItem('jgs_users', JSON.stringify(users));
            submissions.forEach(s => { if (s.author === oldName) s.author = newName; });
            localStorage.setItem('jgs_submissions', JSON.stringify(submissions));
            storeGames.forEach(g => { if (g.author === oldName) g.author = newName; });
            localStorage.setItem('jgs_store', JSON.stringify(storeGames));
            req.status = 'approved';
            localStorage.setItem('jgs_name_requests', JSON.stringify(nameRequests));
            renderUsers();
            renderSubmissions();
            renderRequests();
            showToast(`Name changed from "${oldName}" to "${newName}"`, 'success');
        }

        function rejectNameChange(userId) {
            const reqIndex = nameRequests.findIndex(r => r.userId === userId && r.status === 'pending');
            if (reqIndex === -1) return;
            nameRequests[reqIndex].status = 'rejected';
            localStorage.setItem('jgs_name_requests', JSON.stringify(nameRequests));
            renderRequests();
            showToast('Name change request rejected', 'error');
        }

        function renderMessages() {
            const container = $('messageList');
            if (!contactMessages.length) { container.innerHTML = '<div class="empty-state">No messages from users</div>'; return; }
            const sorted = [...contactMessages].reverse();
            container.innerHTML = sorted.map((msg) => {
                const isUnread = msg.status === 'unread';
                const isSystem = msg.isSystem || false;
                return `<div class="card">
                        <div class="info">
                            <h4>${msg.userName} <span style="font-weight:400;font-size:12px;color:rgba(255,255,255,0.3);">(${msg.userId})</span>
                                ${isSystem ? ' <span style="font-size:10px;color:rgba(80,220,160,0.5);">(system)</span>' : ''}</h4>
                            <p>${new Date(msg.timestamp).toLocaleString()} <span class="status status-${msg.status}">${msg.status}</span></p>
                            <div class="message-text">${msg.message}</div>
                        </div>
                        <div class="actions">
                            ${isUnread ? `<button class="btn-read" onclick="markMessageRead('${msg.id}')">✓ Mark read</button>` : ''}
                            <button class="btn-delete" onclick="deleteMessage('${msg.id}')">🗑 Delete</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function markMessageRead(msgId) {
            const msg = contactMessages.find(m => m.id === msgId);
            if (!msg) return;
            msg.status = 'read';
            localStorage.setItem('jgs_contact_messages', JSON.stringify(contactMessages));
            renderMessages();
            showToast('Message marked as read', 'success');
        }

        function deleteMessage(msgId) {
            if (!confirm('Delete this message?')) return;
            const index = contactMessages.findIndex(m => m.id === msgId);
            if (index !== -1) {
                contactMessages.splice(index, 1);
                localStorage.setItem('jgs_contact_messages', JSON.stringify(contactMessages));
                renderMessages();
                showToast('Message deleted', 'error');
            }
        }

        // ─── RESET ALL USERNAMES ──────────────────────────────────────────────
        function resetAllUsernames() {
            if (!confirm('⚠️ Are you sure you want to reset ALL usernames? This cannot be undone.')) return;
            if (!confirm('⚠️ FINAL WARNING: This will rename every user to "user_1", "user_2", etc. Proceed?')) return;
            let counter = 1;
            users.forEach(u => {
                if (u.githubLogin === 'NYC0DEV') u.name = 'NYC0DEV';
                else u.name = 'user_' + counter++;
            });
            localStorage.setItem('jgs_users', JSON.stringify(users));
            submissions.forEach(s => { const user = users.find(u => u.githubLogin === s.author || u.name === s.author); if (user) s
                    .author = user.name; });
            localStorage.setItem('jgs_submissions', JSON.stringify(submissions));
            storeGames.forEach(g => { const user = users.find(u => u.githubLogin === g.author || u.name === g.author); if (user) g
                    .author = user.name; });
            localStorage.setItem('jgs_store', JSON.stringify(storeGames));
            renderUsers();
            renderSubmissions();
            showToast('All usernames have been reset.', 'success');
        }

        // ─── RESET ALL BUTTON LOGIC ──────────────────────────────────────────
        const resetCheckbox = $('resetEnableCheckbox');
        const resetBtn = $('resetAllBtn');
        resetCheckbox.addEventListener('change', function() {
            if (this.checked) resetBtn.classList.add('enabled');
            else resetBtn.classList.remove('enabled');
        });
        resetBtn.addEventListener('click', function() {
            if (!resetCheckbox.checked) return;
            resetAllUsernames();
        });

        // ─── TABS ──────────────────────────────────────────────────────────────
        document.querySelectorAll('.admin-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.admin-tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
                const panel = document.getElementById(this.dataset.panel);
                if (panel) panel.classList.add('active');
                if (this.dataset.panel === 'panelRequests') renderRequests();
                if (this.dataset.panel === 'panelUsers') renderUsers();
                if (this.dataset.panel === 'panelSubmissions') renderSubmissions();
                if (this.dataset.panel === 'panelMessages') renderMessages();
            });
        });

        // ─── AUTO-REFRESH ON STORAGE CHANGE ──────────────────────────────────
        window.addEventListener('storage', function(e) {
            const keys = ['jgs_users', 'jgs_submissions', 'jgs_store', 'jgs_name_requests', 'jgs_contact_messages'];
            if (keys.includes(e.key)) {
                loadAdminData();
            }
        });

        // ─── NETWORK STATUS MONITOR ──────────────────────────────────────────
        window.addEventListener('online', () => { hideNetworkError();
            loadAdminData();
            showToast('Back online!', 'success'); });
        window.addEventListener('offline', () => { showNetworkError(); });

        // ─── INIT ──────────────────────────────────────────────────────────────
        function initAdmin() {
            const savedUserStr = localStorage.getItem('jgs_current_user');
            const adminUser = savedUserStr ? JSON.parse(savedUserStr) : null;
            if (!adminUser || adminUser.githubLogin !== 'NYC0DEV') {
                window.location.replace('/');
                return;
            }
            if (!checkNetwork()) { showNetworkError(); }
            loadAdminData();
            initMusic();
            hideSplash();
        }
        initAdmin();
    </script>
</body>
</html>
