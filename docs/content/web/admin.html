<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Test – Joystick Store API</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0b0b18;
      color: #e0e0ee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: rgba(18, 18, 40, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 36px 32px;
      max-width: 460px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    h1 { font-weight: 400; font-size: 24px; margin-bottom: 4px; color: #f0f0ff; }
    .sub { font-size: 14px; color: rgba(255,255,255,0.3); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
    input {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;
      color: #eee; font-size: 15px; font-family: inherit; outline: none; transition: 0.2s;
    }
    input:focus { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }
    button {
      width: 100%; padding: 14px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 40px; color: #eee; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: 0.2s; font-family: inherit; margin-top: 4px;
    }
    button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { margin-top: 16px; font-size: 14px; min-height: 24px; color: rgba(255,255,255,0.4); text-align: center; word-break: break-word; }
    #status.error { color: #ff6b6b; }
    #status.success { color: #50dca0; }
    #debug {
      margin-top: 20px; background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04); border-radius: 12px;
      padding: 12px; font-size: 12px; font-family: monospace;
      color: rgba(255,255,255,0.25); max-height: 250px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .link {
      display: inline-block; margin-top: 12px; font-size: 13px;
      color: rgba(255,255,255,0.2); text-decoration: none;
      border-bottom: 1px dotted rgba(255,255,255,0.1); cursor: pointer;
    }
    .link:hover { color: rgba(255,255,255,0.6); }
    .api-url-input {
      width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
      color: #8c7eff; font-size: 13px; font-family: monospace;
      outline: none; transition: 0.2s; margin-top: 4px;
    }
    .api-url-input:focus { border-color: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

<div class="card">
  <h1>🔐 Login Test</h1>
  <div class="sub">Test the D1‑based authentication API</div>

  <div style="margin-bottom:12px;">
    <label>API URL</label>
    <input type="text" class="api-url-input" id="apiUrl" value="https://joystick-store-proxy.joystick-go-store.workers.dev" />
  </div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username" value="NYC0DEV" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" value="admin123" />
  </div>

  <button id="loginBtn">Log In</button>
  <div id="status"></div>

  <div id="debug">Ready. Click "Log In" to test.</div>

  <a class="link" id="clearToken">🗑 Clear stored token</a>
  <span style="margin:0 8px;color:rgba(255,255,255,0.05);">|</span>
  <a class="link" id="checkToken">🔍 Check token</a>
  <span style="margin:0 8px;color:rgba(255,255,255,0.05);">|</span>
  <a class="link" id="testConnection">🌐 Test API connection</a>
</div>

<script>
  // ─── DOM refs ──────────────────────────────────────────────────
  const apiUrlEl = document.getElementById('apiUrl');
  const usernameEl = document.getElementById('username');
  const passwordEl = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const statusEl = document.getElementById('status');
  const debugEl = document.getElementById('debug');

  function getApiBase() {
    let url = apiUrlEl.value.trim();
    if (!url) return 'https://joystick-store-proxy.joystick-go-store.workers.dev';
    // Remove trailing slash if present
    return url.replace(/\/$/, '');
  }

  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + type;
  }

  function debug(msg) {
    debugEl.textContent = '> ' + msg + '\n' + debugEl.textContent;
    if (debugEl.textContent.length > 3000) {
      debugEl.textContent = debugEl.textContent.slice(0, 2500) + '\n... (truncated)';
    }
  }

  function getToken() { return localStorage.getItem('jgs_token'); }
  function setToken(token) { token ? localStorage.setItem('jgs_token', token) : localStorage.removeItem('jgs_token'); }

  // ─── Test connection ──────────────────────────────────────────
  async function testConnection() {
    const apiBase = getApiBase();
    debug('→ Testing connection to: ' + apiBase);
    setStatus('⏳ Testing connection...', '');
    try {
      // Try to fetch the store (public endpoint)
      const resp = await fetch(apiBase + '/api/store');
      if (resp.ok) {
        const data = await resp.json().catch(() => ({}));
        debug('✓ Connection OK! Store has ' + (data.length || 0) + ' games.');
        setStatus('✅ API is reachable!', 'success');
      } else {
        debug('✗ HTTP ' + resp.status + ': ' + resp.statusText);
        setStatus('❌ API returned ' + resp.status + '. Check URL or Worker.', 'error');
      }
    } catch (err) {
      debug('✗ Connection failed: ' + err.message);
      setStatus('❌ Cannot reach API: ' + err.message, 'error');
    }
  }

  // ─── Login ────────────────────────────────────────────────────
  async function apiLogin(username, password) {
    const apiBase = getApiBase();
    const url = apiBase + '/api/login';
    debug('→ POST ' + url);
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
    return data;
  }

  async function handleLogin() {
    const username = usernameEl.value.trim();
    const password = passwordEl.value.trim();
    if (!username || !password) { setStatus('Please enter both fields.', 'error'); return; }
    loginBtn.disabled = true;
    setStatus('⏳ Logging in...', '');
    try {
      const data = await apiLogin(username, password);
      setToken(data.token);
      setStatus(`✅ Welcome ${data.user.display_name || data.user.username}!`, 'success');
      debug(`✓ Token: ${data.token.slice(0, 24)}…\n✓ User: ${JSON.stringify(data.user, null, 2)}`);
    } catch (err) {
      setStatus('❌ ' + err.message, 'error');
      debug('✗ Error: ' + err.message);
    } finally {
      loginBtn.disabled = false;
    }
  }

  // ─── Check token ──────────────────────────────────────────────
  async function checkToken() {
    const token = getToken();
    if (!token) { setStatus('No token.', 'error'); debug('No token found.'); return; }
    const apiBase = getApiBase();
    debug('→ GET ' + apiBase + '/api/user');
    try {
      const resp = await fetch(apiBase + '/api/user', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
      setStatus(`✅ Token valid. User: ${data.user.display_name}`, 'success');
      debug(`✓ User: ${JSON.stringify(data.user, null, 2)}`);
    } catch (err) {
      setStatus('❌ Token invalid: ' + err.message, 'error');
      debug('✗ ' + err.message);
    }
  }

  function clearToken() {
    setToken(null);
    setStatus('Token cleared.', '');
    debug('Token removed.');
  }

  // ─── Event bindings ────────────────────────────────────────────
  loginBtn.addEventListener('click', handleLogin);
  document.getElementById('clearToken').addEventListener('click', clearToken);
  document.getElementById('checkToken').addEventListener('click', checkToken);
  document.getElementById('testConnection').addEventListener('click', testConnection);

  [usernameEl, passwordEl].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  });

  // ─── Init ──────────────────────────────────────────────────────
  debug('Page loaded.');
  const t = getToken();
  debug(t ? `Found token: ${t.slice(0, 20)}…` : 'No token.');
  debug('Click "Test API connection" first to verify the endpoint.');
</script>
</body>
</html>
