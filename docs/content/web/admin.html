<script>
// ============================================================
// Admin Panel – uses Worker API
// ============================================================

const API_BASE = 'https://joystick-store-proxy.joystick-go-store.workers.dev/api';

// ---- Auth Guard ----
(function authGuard() {
  try {
    const savedUserStr = localStorage.getItem('jgs_current_user');
    const adminUser = savedUserStr ? JSON.parse(savedUserStr) : null;
    if (!adminUser || (!adminUser.is_admin && adminUser.githubLogin !== 'NYC0DEV')) {
      window.location.replace('/');
      return;
    }
  } catch (e) {
    window.location.replace('/');
  }
})();

// ---- Globals ----
let users = [];
let submissions = [];
let storeGames = [];
let nameRequests = [];
let contactMessages = [];
let editingGameIndex = -1;
let editingUserIndex = -1;

const $ = id => document.getElementById(id);
let toastTimer = null;

function showToast(msg, type = 'success') {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

// ---- Data Loaders ----
async function loadAllData() {
  await Promise.all([
    loadUsers(),
    loadSubmissions(),
    loadStore(),
    loadRequests(),
    loadMessages(),
  ]);
  renderStats();
}

async function loadUsers() {
  const res = await fetch(`${API_BASE}/users`);
  users = await res.json();
  renderUsers();
}

async function loadSubmissions() {
  const res = await fetch(`${API_BASE}/submissions`);
  submissions = await res.json();
  renderSubmissions();
}

async function loadStore() {
  const res = await fetch(`${API_BASE}/store`);
  storeGames = await res.json();
  renderStoreGames();
}

async function loadRequests() {
  const res = await fetch(`${API_BASE}/requests`);
  nameRequests = await res.json();
  renderRequests();
}

async function loadMessages() {
  const res = await fetch(`${API_BASE}/messages`);
  contactMessages = await res.json();
  renderMessages();
}

// ---- Stats ----
function renderStats() {
  const pending = submissions.filter(s => s.status === 'pending').length;
  const pendingRequests = nameRequests.filter(r => r.status === 'pending').length;
  $('statUsers').textContent = users.length;
  $('statSubmissions').textContent = submissions.length;
  $('statGames').textContent = storeGames.length;
  $('statPending').textContent = pending;
  $('statMessages').textContent = contactMessages.length;
  $('statRequests').textContent = pendingRequests;
}

// ---- RENDER FUNCTIONS (similar to your original, but with API data) ----
function renderSubmissions() {
  const container = $('submissionList');
  const pending = submissions.filter(s => s.status === 'pending').length;
  $('submissionCount').textContent = pending + ' pending';
  if (!submissions.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No submissions</p></div>';
    return;
  }
  container.innerHTML = submissions.map(s => `
    <div class="item-card">
      <div class="info">
        <h4>
          ${s.title || 'Untitled'}
          <span class="badge-status ${s.status || 'pending'}">${s.status || 'pending'}</span>
          ${s.file_size ? `<span class="size-badge">${formatFileSize(s.file_size)}</span>` : ''}
        </h4>
        <p>by ${s.author || 'unknown'} · ${s.category || 'game'} · v${s.version || '1.0'} ${s.file_name ? '· 📎 ' + s.file_name : ''}</p>
        ${s.description ? `<p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:2px;">${s.description}</p>` : ''}
      </div>
      <div class="actions">
        <button class="btn-sm view" onclick="openSubmissionDetail(${s.id})">👁 View</button>
        ${s.status === 'pending' ? `
          <button class="btn-sm approve" onclick="approveSubmission(${s.id})">✓ Approve</button>
          <button class="btn-sm reject" onclick="rejectSubmission(${s.id})">✕ Reject</button>
        ` : ''}
        ${s.file_data ? `<button class="btn-sm download" onclick="downloadSubmissionFile(${s.id})">⬇ Download</button>` : ''}
        <button class="btn-sm delete" onclick="deleteSubmission(${s.id})">🗑 Delete</button>
      </div>
    </div>
  `).join('');
}

function renderStoreGames() {
  const container = $('storeGameList');
  if (!storeGames.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🛒</div><p>No games in store</p></div>';
    return;
  }
  container.innerHTML = storeGames.map(g => {
    const sizeStr = g.file_size ? formatFileSize(g.file_size) : '—';
    return `
      <div class="item-card" data-store-idx="${g.id}">
        <div class="info">
          <div class="checkbox-wrap">
            <input type="checkbox" class="store-select" data-id="${g.id}" />
            <div>
              <h4>
                ${g.title}
                <span class="badge-status approved">approved</span>
                <span class="size-badge">${sizeStr}</span>
              </h4>
              <p>by <span style="color:${g.author_color || '#ffffff'};">${g.author}</span> · ${g.category} · v${g.version} · added ${g.approved_at ? new Date(g.approved_at).toLocaleDateString() : '—'}</p>
              ${g.image ? `<img src="${g.image}" style="max-width:60px;height:auto;border-radius:4px;margin-top:4px;" />` : ''}
              ${g.description ? `<p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:2px;">${g.description}</p>` : ''}
              <p style="font-size:10px;color:rgba(255,255,255,0.15);margin-top:2px;">Install: ${g.install_folder || '—'} · Misc: ${g.misc_folder || '—'}</p>
            </div>
          </div>
        </div>
        <div class="actions">
          <button class="btn-sm view" onclick="openEditGameModal(${g.id})">✎ Edit</button>
          ${g.file_data ? `<button class="btn-sm download" onclick="downloadStoreGame(${g.id})">⬇ Download</button>` : ''}
          <button class="btn-sm delete" onclick="deleteStoreGame(${g.id})">🗑 Delete</button>
        </div>
      </div>
    `;
  }).join('');
  updateStoreSelectedCount();
}

function renderUsers() {
  const container = $('userList');
  if (!users.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">👤</div><p>No users</p></div>';
    return;
  }
  container.innerHTML = users.map(u => {
    const isAdmin = u.is_admin === 1;
    const banned = u.banned ? '🚫' : '✅';
    return `<div class="item-card">
      <div class="info">
        <h4>${u.name || 'unnamed'} ${isAdmin ? ' ⭐ <span style="font-weight:400;font-size:12px;color:rgba(255,255,255,0.3);">(admin)</span>' : ''} <span style="font-size:12px;color:${u.banned ? '#ff6b6b' : '#50dca0'};">${banned}</span></h4>
        <p>${u.github_login ? 'GitHub: ' + u.github_login : 'Registered via form'} · Reset Key: <span style="font-family:monospace;color:#b8b8ff;">${u.reset_key || 'N/A'}</span> · Created: ${u.created ? u.created.slice(0,10) : 'recently'}</p>
        ${u.banned ? `<p style="font-size:11px;color:#ff6b6b;">Banned: ${u.ban_reason || 'No reason'} ${u.ban_until ? 'until ' + new Date(u.ban_until).toLocaleString() : 'permanently'}</p>` : ''}
      </div>
      <div class="actions">
        ${!isAdmin ? `
          <button class="btn-sm view" onclick="openEditUserModal('${u.username}')">✎ Edit</button>
          <button class="btn-sm reset-pwd" onclick="resetUserPassword('${u.username}')">🔑 Reset Password</button>
          <button class="btn-sm delete" onclick="deleteUser('${u.username}')">🗑 Delete</button>
        ` : `<span style="font-size:12px;color:rgba(255,255,255,0.15);">🔒 protected</span>`}
      </div>
    </div>`;
  }).join('');
}

function renderRequests() {
  const container = $('requestList');
  const pending = nameRequests.filter(r => r.status === 'pending');
  $('requestCount').textContent = pending.length + ' pending';
  if (!pending.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📩</div><p>No pending name change requests</p></div>';
    return;
  }
  container.innerHTML = pending.map(req => `
    <div class="item-card">
      <div class="info">
        <h4>${req.requested_name}</h4>
        <p>From: ${req.current_name} · User ID: ${req.user_id} · ${new Date(req.timestamp).toLocaleString()}</p>
      </div>
      <div class="actions">
        <button class="btn-sm approve" onclick="approveNameChange(${req.id})">✓ Approve</button>
        <button class="btn-sm reject" onclick="rejectNameChange(${req.id})">✕ Reject</button>
      </div>
    </div>
  `).join('');
}

function renderMessages() {
  const container = $('messageList');
  $('messageCount').textContent = contactMessages.length + ' total';
  if (!contactMessages.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>No messages</p></div>';
    return;
  }
  const sorted = [...contactMessages].reverse();
  container.innerHTML = sorted.map(msg => {
    const isUnread = msg.status === 'unread';
    return `<div class="item-card">
      <div class="info">
        <h4>
          ${msg.user_name}
          <span style="font-weight:400;font-size:12px;color:rgba(255,255,255,0.3);">(${msg.user_id})</span>
          <span class="badge-status ${msg.status}">${msg.status}</span>
        </h4>
        <p>${new Date(msg.timestamp).toLocaleString()}</p>
        <div class="message-text">${msg.message}</div>
      </div>
      <div class="actions">
        ${isUnread ? `<button class="btn-sm read" onclick="markMessageRead(${msg.id})">✓ Mark read</button>` : ''}
        <button class="btn-sm delete" onclick="deleteMessage(${msg.id})">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ---- SUBMISSION ACTIONS ----
async function approveSubmission(id) {
  if (!confirm('Approve this submission?')) return;
  const s = submissions.find(s => s.id === id);
  if (!s) return;
  try {
    await fetch(`${API_BASE}/submissions/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'approved' })
    });
    // Add to store
    const gameData = {
      title: s.title,
      author: s.author,
      authorColor: s.author_color || '#ffffff',
      category: s.category || 'game',
      version: s.version || '1.0',
      description: s.description || '',
      image: s.image || '',
      fileData: s.file_data || '',
      fileSize: s.file_size || 0,
      installFolder: 'sd:\\bin\\Joystick_Go_Store\\games\\' + s.title + '\\',
      miscFolder: 'sd:\\Games\\Misc\\' + s.title + '\\'
    };
    await fetch(`${API_BASE}/store`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(gameData)
    });
    await loadAllData();
    showToast(`✅ "${s.title}" approved!`, 'success');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function rejectSubmission(id) {
  if (!confirm('Reject this submission?')) return;
  try {
    await fetch(`${API_BASE}/submissions/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'rejected' })
    });
    await loadAllData();
    showToast('Submission rejected', 'error');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function deleteSubmission(id) {
  if (!confirm('Delete this submission permanently?')) return;
  try {
    await fetch(`${API_BASE}/submissions/${id}`, { method: 'DELETE' });
    await loadAllData();
    showToast('Submission deleted', 'error');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

// ---- STORE ACTIONS ----
async function deleteStoreGame(id) {
  if (!confirm('Delete this game from store?')) return;
  try {
    await fetch(`${API_BASE}/store/${id}`, { method: 'DELETE' });
    await loadAllData();
    showToast('Game removed from store', 'error');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

function downloadStoreGame(id) {
  const g = storeGames.find(g => g.id === id);
  if (!g) return;
  if (g.file_data) {
    try {
      const byteCharacters = atob(g.file_data);
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }
      const byteArray = new Uint8Array(byteNumbers);
      const blob = new Blob([byteArray], { type: 'application/zip' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = g.title + '.zip';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Downloaded ' + g.title, 'success');
    } catch (e) {
      showToast('Error downloading file', 'error');
    }
  } else {
    showToast('No file data', 'error');
  }
}

// ---- USER ACTIONS ----
async function resetUserPassword(username) {
  if (!confirm(`Reset password for "${username}"?`)) return;
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let newPwd = '';
  for (let i = 0; i < 8; i++) newPwd += chars.charAt(Math.floor(Math.random() * chars.length));
  try {
    await fetch(`${API_BASE}/users/${username}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: newPwd })
    });
    showToast(`New password for "${username}" is: ${newPwd}`, 'success');
    await loadAllData();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function deleteUser(username) {
  if (!confirm(`Delete user "${username}" permanently?`)) return;
  try {
    await fetch(`${API_BASE}/users/${username}`, { method: 'DELETE' });
    await loadAllData();
    showToast(`User "${username}" deleted`, 'error');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

// ---- NAME REQUESTS ----
async function approveNameChange(id) {
  try {
    const req = nameRequests.find(r => r.id === id);
    if (!req) return;
    // Update user name
    await fetch(`${API_BASE}/users/${req.user_id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: req.requested_name })
    });
    // Update request status
    await fetch(`${API_BASE}/requests/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'approved' })
    });
    await loadAllData();
    showToast(`Name changed to "${req.requested_name}"`, 'success');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function rejectNameChange(id) {
  try {
    await fetch(`${API_BASE}/requests/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'rejected' })
    });
    await loadAllData();
    showToast('Request rejected', 'error');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

// ---- MESSAGES ----
async function markMessageRead(id) {
  try {
    await fetch(`${API_BASE}/messages/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'read' })
    });
    await loadAllData();
    showToast('Marked as read', 'success');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function deleteMessage(id) {
  if (!confirm('Delete this message?')) return;
  try {
    await fetch(`${API_BASE}/messages/${id}`, { method: 'DELETE' });
    await loadAllData();
    showToast('Message deleted', 'error');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

// ---- BROADCAST NOTIFICATION ----
async function sendBroadcastNotification() {
  const msg = document.getElementById('broadcastMessage').value.trim();
  const statusEl = document.getElementById('broadcastStatus');
  if (!msg) {
    statusEl.textContent = 'Please enter a message.';
    statusEl.style.color = '#ff6b6b';
    return;
  }
  if (!confirm(`Send "${msg}" to all users?`)) return;
  try {
    // For each user, send a notification
    for (const u of users) {
      if (u.is_admin) continue;
      await fetch(`${API_BASE}/notifications`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: u.username, message: msg })
      });
    }
    statusEl.textContent = `✅ Notification sent to ${users.filter(u => !u.is_admin).length} users.`;
    statusEl.style.color = '#50dca0';
    document.getElementById('broadcastMessage').value = '';
    showToast('Broadcast sent!', 'success');
  } catch (err) {
    statusEl.textContent = 'Error: ' + err.message;
    statusEl.style.color = '#ff6b6b';
  }
}

// ---- PATHS AND SETTINGS ----
async function savePaths() {
  const ip = document.getElementById('installPath').value.trim();
  const mp = document.getElementById('miscPath').value.trim();
  try {
    await fetch(`${API_BASE}/settings/paths`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ installPath: ip, miscPath: mp })
    });
    document.getElementById('pathStatus').textContent = '✅ Paths saved!';
    document.getElementById('pathStatus').style.color = 'rgba(80,220,160,0.6)';
    setTimeout(() => { document.getElementById('pathStatus').textContent = ''; }, 3000);
    showToast('Paths saved!', 'success');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

async function saveRegistrationSetting() {
  const enabled = document.getElementById('registrationToggle').checked;
  try {
    await fetch(`${API_BASE}/settings/registration`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled })
    });
    document.getElementById('regSettingStatus').textContent = `✅ Registration ${enabled ? 'enabled' : 'disabled'}!`;
    document.getElementById('regSettingStatus').style.color = '#50dca0';
    showToast(`Registration ${enabled ? 'enabled' : 'disabled'}`, 'success');
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

// ---- ADMIN PASSWORD ----
async function setAdminPassword() {
  // ... similar to original, but using API
  // We'll keep this simple – you can extend later
  showToast('Admin password update via API is not yet implemented. Use the database directly.', 'error');
}

// ---- RESET ALL USERNAMES ----
async function resetAllUsernames() {
  if (!confirm('⚠️ Reset ALL usernames? This cannot be undone.')) return;
  if (!confirm('⚠️ FINAL WARNING: Proceed?')) return;
  let counter = 1;
  for (const u of users) {
    if (u.username === 'NYC0DEV') continue;
    const newName = 'user_' + counter++;
    await fetch(`${API_BASE}/users/${u.username}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName })
    });
  }
  await loadAllData();
  showToast('All usernames reset.', 'success');
}

// ---- INIT ----
document.addEventListener('DOMContentLoaded', function() {
  // Load data
  loadAllData();

  // Tabs
  document.querySelectorAll('.admin-tabs button').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.admin-tabs button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      const panel = document.getElementById(this.dataset.tab);
      if (panel) panel.classList.add('active');
      // Refresh data if needed
      if (this.dataset.tab === 'tabSubmissions') renderSubmissions();
      if (this.dataset.tab === 'tabStore') renderStoreGames();
      if (this.dataset.tab === 'tabUsers') renderUsers();
      if (this.dataset.tab === 'tabRequests') renderRequests();
      if (this.dataset.tab === 'tabMessages') renderMessages();
    });
  });

  // Event listeners
  document.getElementById('adminSetPasswordBtn').addEventListener('click', setAdminPassword);
  document.getElementById('savePathsBtn')?.addEventListener('click', savePaths);
  document.getElementById('saveRegistrationBtn')?.addEventListener('click', saveRegistrationSetting);
  document.getElementById('resetAllBtn')?.addEventListener('click', resetAllUsernames);
  document.getElementById('broadcastBtn')?.addEventListener('click', sendBroadcastNotification);

  // Reset checkbox
  const resetCheckbox = document.getElementById('resetEnableCheckbox');
  const resetBtn = document.getElementById('resetAllBtn');
  if (resetCheckbox && resetBtn) {
    resetCheckbox.addEventListener('change', function() {
      if (this.checked) resetBtn.classList.add('enabled');
      else resetBtn.classList.remove('enabled');
    });
  }

  // Load registration setting
  (async () => {
    try {
      const res = await fetch(`${API_BASE}/settings/registration`);
      const data = await res.json();
      document.getElementById('registrationToggle').checked = data.enabled;
    } catch (e) {
      // default enabled
    }
  })();

  // Load paths
  (async () => {
    try {
      const res = await fetch(`${API_BASE}/settings/paths`);
      const data = await res.json();
      document.getElementById('installPath').value = data.installPath || '';
      document.getElementById('miscPath').value = data.miscPath || '';
    } catch (e) {
      // ignore
    }
  })();

  console.log('Admin panel loaded. API:', API_BASE);
});
</script>
